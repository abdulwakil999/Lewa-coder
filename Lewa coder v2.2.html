<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Lewa Coder</title>
<link rel="icon" id="fav-icon" type="image/png" href="">
<link rel="apple-touch-icon" id="fav-touch" href="">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══ THEME TOKENS ══
   Dark is the default (the original look). Light is derived from the
   user's palette: Vanilla Custard #FFF9EB, Misty Sage #9FB2AC,
   Bloodstone #5D0D18. Switching html[data-theme] re-skins everything
   because every core colour above is now a variable. */
:root{
  --bg:#0a0a0a; --panel:#0d0d0d; --panel-2:#070707; --inset:#080808; --panel-hi:#111111;
  --border-dim:#141414; --border:#1a1a1a; --border-2:#1f1f1f; --border-hi:#2a2a2a;
  --text:#d4d4d4; --text-bright:#f5f5f5; --text-mid:#cccccc; --text-input:#e2e8f0;
  --text-dim:#999999; --muted:#666666; --muted-2:#555555; --muted-3:#444444; --muted-4:#333333;
  --accent:#f59e0b; --accent-rgb:245,158,11; --accent-bg:#110e00; --accent-grad:#141005; --white-txt:#ffffff;
  --shadow:rgba(0,0,0,.5);
}
html[data-theme="light"]{
  --bg:#fff9eb; --panel:#fbf3df; --panel-2:#f4ecd6; --inset:#f1e8d0; --panel-hi:#efe5cd;
  --border-dim:#ece1c8; --border:#dfd4bb; --border-2:#d4c9b0; --border-hi:#9fb2ac;
  --text:#3a2a2d; --text-bright:#2a1417; --text-mid:#463539; --text-input:#2a1417;
  --text-dim:#6f7d78; --muted:#7e8c87; --muted-2:#8b9a95; --muted-3:#9fb2ac; --muted-4:#b0bfba;
  --accent:#5d0d18; --accent-rgb:93,13,24; --accent-bg:#f6e6e2; --accent-grad:#f7ece2; --white-txt:#2a1417;
  --shadow:rgba(93,13,24,.14);
}
html[data-theme="light"] .load-icon,
html[data-theme="light"] .splash-icon,
html[data-theme="light"] .card-icon,
html[data-theme="light"] .empty-icon{color:var(--accent)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
::selection{background:rgba(var(--accent-rgb),0.2)}
button{font-family:inherit;touch-action:manipulation}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
/* Emerge: elements surface from deep within the screen — small, blurred
   and far away at the centre of where they belong, swelling forward into
   focus (no more floating up). */
@keyframes fadeUp{0%{opacity:0;transform:scale(.45);filter:blur(7px)}55%{opacity:1;filter:blur(1px)}80%{transform:scale(1.03)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes splashIn{0%{opacity:0;transform:scale(.6)}60%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 5px rgba(var(--accent-rgb),0.08)}50%{text-shadow:0 0 9px rgba(var(--accent-rgb),0.13)}}
@keyframes dotBounce{0%,100%{transform:translateY(0) scale(.85);opacity:.5}50%{transform:translateY(-14px) scale(1.15);opacity:1}}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(var(--accent-rgb),0.12)}100%{box-shadow:0 0 0 24px rgba(var(--accent-rgb),0.0)}}

/* ── Layout ── */
#root{height:100vh;height:100dvh;display:flex;flex-direction:column}
.app{display:flex;height:100vh;height:100dvh;overflow:hidden;position:relative}

/* ── Splash ── */
.splash{height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(ellipse at center,var(--accent-grad) 0%,var(--bg) 65%);overflow:hidden}
.splash-icon{font-family:'JetBrains Mono',monospace;font-size:74px;font-weight:700;color:var(--accent);letter-spacing:-4px;animation:splashIn .9s ease,glowPulse 2.4s ease-in-out infinite}
/* Rolling entrance: whips in spinning at speed, bounces off the far side
   with dying hops, slows, then tumbles lazily upright into place.
   .roll-r = enters from the RIGHT (bounces on the left);
   .roll-l = the mirror. The app alternates sides on every open. */
.splash-icon.roll-r{animation:splashRollR 3.6s both,glowPulse 2.4s ease-in-out 3.6s infinite}
.splash-icon.roll-l{animation:splashRollL 3.6s both,glowPulse 2.4s ease-in-out 3.6s infinite}
@keyframes splashRollR{
  0%{transform:translate(58vw,0) rotate(0turn);opacity:0;animation-timing-function:ease-out}
  5%{opacity:1}
  24%{transform:translate(-34vw,0) rotate(-3.4turn);animation-timing-function:ease-out}
  32%{transform:translate(-38vw,-15vh) rotate(-3.9turn);animation-timing-function:ease-in}
  40%{transform:translate(-35vw,0) rotate(-4.3turn);animation-timing-function:ease-out}
  47%{transform:translate(-31vw,-8vh) rotate(-4.6turn);animation-timing-function:ease-in}
  54%{transform:translate(-28vw,0) rotate(-4.85turn);animation-timing-function:ease-out}
  60%{transform:translate(-24vw,-3.5vh) rotate(-5.05turn);animation-timing-function:ease-in}
  66%{transform:translate(-20vw,0) rotate(-5.2turn);animation-timing-function:ease-out}
  100%{transform:translate(0,0) rotate(-6turn);opacity:1}
}
@keyframes splashRollL{
  0%{transform:translate(-58vw,0) rotate(0turn);opacity:0;animation-timing-function:ease-out}
  5%{opacity:1}
  24%{transform:translate(34vw,0) rotate(3.4turn);animation-timing-function:ease-out}
  32%{transform:translate(38vw,-15vh) rotate(3.9turn);animation-timing-function:ease-in}
  40%{transform:translate(35vw,0) rotate(4.3turn);animation-timing-function:ease-out}
  47%{transform:translate(31vw,-8vh) rotate(4.6turn);animation-timing-function:ease-in}
  54%{transform:translate(28vw,0) rotate(4.85turn);animation-timing-function:ease-out}
  60%{transform:translate(24vw,-3.5vh) rotate(5.05turn);animation-timing-function:ease-in}
  66%{transform:translate(20vw,0) rotate(5.2turn);animation-timing-function:ease-out}
  100%{transform:translate(0,0) rotate(6turn);opacity:1}
}
@media (prefers-reduced-motion:reduce){
  .splash-icon.roll-r,.splash-icon.roll-l{animation:splashIn .9s ease,glowPulse 2.4s ease-in-out infinite}
  .splash-name,.splash-tag{animation-delay:.3s!important}
}
.splash-name{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--text-bright);letter-spacing:5px;animation:fadeUp .8s ease 3.05s both}
.splash-tag{font-size:12px;color:var(--muted-2);font-family:'JetBrains Mono',monospace;letter-spacing:1px;animation:fadeUp .8s ease 3.3s both}

/* ── Auth / Setup ── */
.gate{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:20px;overflow-y:auto}
.card{background:var(--panel);border:1px solid var(--border-2);border-radius:14px;padding:28px 26px;width:100%;max-width:440px;animation:fadeUp .45s ease}
.card-top{text-align:center;margin-bottom:24px}
.card-icon{font-size:38px;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:700;letter-spacing:-2px;margin-bottom:10px}
.card-name{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;color:var(--text-bright);margin-bottom:4px;letter-spacing:2px}
.card-sub{font-size:13px;color:var(--muted-2)}
.fg{margin-bottom:14px}
.flabel{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.finput{width:100%;background:var(--inset);border:1px solid var(--border-2);border-radius:7px;color:var(--text-input);font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 12px;outline:none;transition:border-color .15s}
.finput:focus{border-color:rgba(var(--accent-rgb),0.33)}
select.finput{appearance:none;-webkit-appearance:none;cursor:pointer}
textarea.finput{min-height:90px;resize:vertical;line-height:1.6;font-family:'IBM Plex Sans',sans-serif;font-size:13px}
.fhint{font-size:11px;color:#3a3a3a;margin-top:4px;line-height:1.5}
.krow{display:flex;gap:7px}
.krow .finput{flex:1;min-width:0}
.btn-p{width:100%;background:var(--accent);border:none;border-radius:8px;color:var(--bg);cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;padding:13px 0;margin-top:6px;transition:opacity .2s}
.btn-p:hover{opacity:.85}
.btn-s{background:var(--panel);border:1px solid var(--border-2);border-radius:6px;color:#777;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 13px;transition:all .15s}
.btn-s:hover{border-color:var(--border-hi);color:#aaa}
.gate-err{color:#f87171;font-size:12px;font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:10px;min-height:15px}
.switch-link{font-size:12px;color:var(--muted-2);text-align:center;margin-top:16px;font-family:'JetBrains Mono',monospace}
.switch-link span{color:var(--accent);cursor:pointer;text-decoration:underline}
.auth-tabs{display:flex;gap:6px;margin-bottom:20px}
.auth-tab{flex:1;background:var(--inset);border:1px solid var(--border-2);border-radius:7px;color:var(--muted-2);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 0;transition:all .15s}
.auth-tab.on{border-color:rgba(var(--accent-rgb),0.4);color:var(--accent);background:var(--accent-bg)}
.p-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* ── Loading dots ── */
.loadwrap{height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;background:radial-gradient(ellipse at center,var(--accent-grad) 0%,var(--bg) 65%)}
.load-icon{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:700;color:var(--accent);letter-spacing:-2px;animation:glowPulse 2s ease-in-out infinite}
.polka{display:flex;gap:16px;align-items:center}
.pdot{width:16px;height:16px;border-radius:50%;animation:dotBounce 1.1s ease-in-out infinite}
.load-msg{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;animation:pulse 1.6s ease-in-out infinite}

/* ── Sidebar ── */
.sidebar{width:238px;min-width:238px;background:var(--panel-2);border-right:1px solid var(--border-dim);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s,width .2s,min-width .2s;z-index:40}
.sidebar.closed{width:0;min-width:0;border-right:none}
.sb-backdrop{display:none}
.sb-head{padding:12px 10px;border-bottom:1px solid var(--border-dim);display:flex;align-items:center;gap:6px}
.sb-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted-3);letter-spacing:1px;flex:1}
.new-chat{background:var(--panel-hi);border:1px solid var(--border-2);border-radius:5px;color:#888;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;transition:all .15s;white-space:nowrap}
.new-chat:hover{border-color:rgba(var(--accent-rgb),0.27);color:var(--accent)}
.sessions{flex:1;overflow-y:auto;padding:6px}
.session-item{padding:9px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:6px;transition:all .15s;border:1px solid transparent}
.session-item:hover{background:var(--panel-hi);border-color:var(--border)}
.session-item.active{background:var(--accent-bg);border-color:rgba(var(--accent-rgb),0.2);border-left:2px solid var(--accent)}
.session-label{font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item.active .session-label{color:var(--text-mid)}
.session-del{background:none;border:none;color:var(--muted-4);cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px;line-height:1;flex-shrink:0}
.session-del:hover{color:#f87171}
.no-sessions{padding:14px 10px;color:var(--border-hi);font-size:11px;font-family:'JetBrains Mono',monospace;text-align:center}
.sb-foot{border-top:1px solid var(--border-dim);padding:10px;display:flex;align-items:center;gap:8px}
.sb-user{flex:1;min-width:0}
.sb-uname{font-size:12px;color:#bbb;font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-plan{font-size:10px;color:var(--muted-3);font-family:'JetBrains Mono',monospace}
.sb-avatar{position:relative;width:28px;height:28px;border-radius:50%;background:var(--accent);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'JetBrains Mono',monospace;flex-shrink:0;cursor:pointer;overflow:hidden}
.sb-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sb-avatar-cam{position:absolute;right:-2px;bottom:-2px;width:13px;height:13px;border-radius:50%;background:var(--panel);color:var(--accent);font-size:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.sb-avatar-wrap{position:relative}
.avatar-menu{position:absolute;bottom:34px;left:0;z-index:60;background:var(--panel);border:1px solid var(--border-hi);border-radius:8px;overflow:hidden;box-shadow:0 6px 20px var(--shadow);min-width:150px;animation:fadeUp .15s ease}
.avatar-menu-h{padding:9px 13px 6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.5px;border-bottom:1px solid var(--border)}
.avatar-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:10px 13px;cursor:pointer}
.avatar-menu button:hover{background:var(--accent-bg);color:var(--accent)}
.avatar-menu button.danger:hover{background:#3d1c1c33;color:#f87171}
.logout-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted-2);cursor:pointer;font-size:11px;padding:5px 8px;font-family:'JetBrains Mono',monospace}
.logout-btn:hover{border-color:#f8717155;color:#f87171}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.header{border-bottom:1px solid var(--border-dim);padding:0 12px;height:50px;display:flex;align-items:center;gap:7px;background:var(--bg);flex-shrink:0;overflow-x:auto;transition:height .25s ease,opacity .2s ease,transform .25s ease}
.header.hidden{height:0;padding-top:0;padding-bottom:0;opacity:0;transform:translateY(-8px);overflow:hidden;border-bottom-color:transparent}
.header::-webkit-scrollbar{height:0}
.sb-toggle{background:none;border:none;color:var(--muted-2);cursor:pointer;padding:6px;font-size:17px;line-height:1;flex-shrink:0}
.sb-toggle:hover{color:var(--text-dim)}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 3px rgba(var(--accent-rgb),0.2);animation:pulse 3s ease-in-out infinite}
.logo-name{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--text-bright);letter-spacing:1px}
.h-gap{flex:1}
.h-select{background:var(--panel);border:1px solid var(--border-2);border-radius:5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 8px;cursor:pointer;outline:none;max-width:190px;text-overflow:ellipsis}
.h-select:hover{border-color:var(--border-hi)}
.h-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted-2);cursor:pointer;padding:6px 9px;font-size:13px;line-height:1;transition:all .15s;white-space:nowrap;flex-shrink:0}
.h-btn:hover{border-color:var(--border-hi);color:#888}
.h-btn.on{border-color:rgba(var(--accent-rgb),0.4);color:var(--accent);background:var(--accent-bg)}
.usage-pill{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:var(--accent-bg);border:1px solid rgba(var(--accent-rgb),0.2);border-radius:20px;padding:4px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* ── Messages ── */
.msgs{flex:1;overflow-y:auto;padding:20px 14px;-webkit-overflow-scrolling:touch}
.msgs-inner{max-width:820px;margin:0 auto}
.empty{text-align:center;padding-top:60px;animation:fadeUp .5s ease}
.empty-icon{font-size:36px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:-2px}
.empty-title{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--text-bright);margin-bottom:6px}
.empty-sub{color:var(--muted-3);font-size:13px;margin-bottom:28px}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.chip{background:var(--panel);border:1px solid var(--border-2);border-radius:6px;color:var(--muted);cursor:pointer;font-size:12px;padding:8px 13px;transition:all .2s}
.chip:hover{border-color:rgba(var(--accent-rgb),0.4);color:var(--accent);background:var(--accent-bg)}
.msg{display:flex;gap:11px;margin-bottom:18px;animation:fadeUp .3s ease}
.msg.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar.user{background:var(--accent);color:var(--bg)}
.avatar.ai{background:var(--panel-hi);color:var(--accent);border:1px solid #222}
.bubble{max-width:80%;padding:11px 14px;font-size:14px;line-height:1.75;color:var(--text-mid);word-break:break-word;min-width:0}
.bubble.user{background:var(--accent-bg);border:1px solid #2a1c00;border-radius:12px 2px 12px 12px}
.bubble.ai{background:var(--panel);border:1px solid var(--border);border-radius:2px 12px 12px 12px}
.bubble strong{color:var(--text-bright)}
.bubble em{color:#a0a0a0}
.bubble .ic{background:var(--border);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);white-space:nowrap}
.bubble .lnk{color:#60a5fa;text-decoration:none}
.msg-meta{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--muted-4);margin-top:7px;letter-spacing:.3px}
.msg-tools{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.msg-act{background:none;border:1px solid var(--border-hi);border-radius:5px;color:var(--muted-2);cursor:pointer;font-size:11px;padding:2px 9px;font-family:'JetBrains Mono',monospace}
.msg-act:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.msg-act:disabled{opacity:.35;cursor:default}
.ver-switch{display:inline-flex;align-items:center;gap:4px}
.ver-num{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted-3)}
.att-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.att-img{max-width:180px;max-height:140px;border-radius:8px;border:1px solid var(--border-hi);display:block}
.att-file{display:inline-flex;align-items:center;gap:6px;background:#151515;border:1px solid #262626;border-radius:6px;padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)}
.voice-tag{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);margin-bottom:5px}

/* ── Code block ── */
.cb{margin:10px 0;border-radius:8px;overflow:hidden;border:1px solid #222;max-width:100%}
.cb-head{display:flex;justify-content:space-between;align-items:center;background:var(--panel-hi);padding:5px 12px;border-bottom:1px solid var(--border-2)}
.cb-lang{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.cb-copy{background:none;border:1px solid var(--border-hi);border-radius:4px;color:var(--muted-2);cursor:pointer;font-size:11px;padding:2px 8px;font-family:'JetBrains Mono',monospace}
.cb-copy:hover{border-color:var(--muted-3);color:var(--text-dim)}
.cb-copy.done{color:#4ade80;border-color:#4ade8066}
pre{margin:0;padding:13px 15px;background:var(--inset);overflow-x:auto;font-size:12.5px;line-height:1.75;font-family:'JetBrains Mono',monospace;color:var(--text-input);white-space:pre-wrap;word-break:break-word}
/* Line-numbered code (gutter is a CSS counter → never selected or copied). */
pre.cb-code{counter-reset:ln;padding-left:0}
pre.cb-code .cl{display:block;counter-increment:ln;padding:0 15px 0 3.6em;position:relative;min-height:1.2em}
pre.cb-code .cl::before{content:counter(ln);position:absolute;left:0;width:2.7em;text-align:right;color:var(--muted-4);opacity:.55;-webkit-user-select:none;user-select:none}
pre.cb-code.collapsed{max-height:440px;overflow:hidden;position:relative}
pre.cb-code.collapsed::after{content:'';position:absolute;left:0;right:0;bottom:0;height:64px;background:linear-gradient(transparent,var(--inset));pointer-events:none}
.cb-expand{display:block;width:100%;background:var(--panel-hi);border:none;border-top:1px solid var(--border-2);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px;cursor:pointer;letter-spacing:.3px}
.cb-expand:hover{background:var(--panel)}

/* ── Typing ── */
.typing{display:flex;gap:11px;margin-bottom:18px;align-items:flex-start}
.dots{display:flex;gap:6px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:2px 12px 12px 12px;padding:14px 16px}
.dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.search-ind{display:flex;align-items:center;gap:7px;padding:6px 12px;background:#0d0d00;border:1px solid #2a1f00;border-radius:6px;margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);animation:fadeIn .3s}
.search-spin{animation:pulse 1s ease-in-out infinite}

/* ── Input ── */
.input-wrap{border-top:1px solid var(--border-dim);padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:var(--bg);flex-shrink:0}
.input-inner{max-width:820px;margin:0 auto}
.pending-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.pend{display:inline-flex;align-items:center;gap:6px;background:#151515;border:1px solid var(--border-hi);border-radius:6px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#aaa;max-width:220px}
.pend img{width:26px;height:26px;object-fit:cover;border-radius:4px}
.pend span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pend button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.pend button:hover{color:#f87171}
.input-box{display:flex;gap:8px;align-items:flex-end;background:var(--panel);border:1px solid var(--border-2);border-radius:12px;padding:10px 12px;transition:border-color .2s}
.input-box:focus-within{border-color:rgba(var(--accent-rgb),0.27)}
#uinput{flex:1;background:none;border:none;color:var(--text-input);font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.6;max-height:180px;overflow:auto;resize:none;outline:none;min-width:0}
#uinput::placeholder{color:var(--muted-4)}
.input-btns{display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
.ibtn{background:none;border:1px solid var(--border-2);border-radius:7px;color:var(--muted-2);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
.ibtn:hover{border-color:var(--muted-4);color:var(--text-dim)}
.ibtn.listening{border-color:var(--accent);color:var(--accent);animation:pulse 1s ease-in-out infinite}
.send-btn{background:var(--accent);border:none;border-radius:7px;color:var(--bg);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:disabled{background:var(--border);cursor:not-allowed}
.hint{text-align:center;font-size:10px;color:#222;margin-top:6px;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}

/* ── Call overlay ── */
.call-ov{position:fixed;inset:0;background:rgba(5,5,5,.96);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;animation:fadeIn .3s}
.call-circle{width:130px;height:130px;border-radius:50%;background:var(--accent-bg);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:46px;animation:ringPulse 1.6s ease-out infinite}
.call-status{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.call-transcript{max-width:520px;width:88%;text-align:center;color:#888;font-size:14px;line-height:1.7;min-height:44px;max-height:32vh;overflow-y:auto;padding:0 10px}
.call-btn-row{display:flex;align-items:center;gap:16px}
.call-stop{background:var(--panel);border:1px solid var(--border-hi);border-radius:24px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:12px 20px;cursor:pointer;transition:all .15s;opacity:.5;pointer-events:none}
.call-stop.active{opacity:1;pointer-events:auto;border-color:var(--accent);color:var(--accent)}
.call-stop:hover{border-color:var(--accent)}
.call-end{background:#dc2626;border:none;border-radius:50%;width:62px;height:62px;color:var(--white-txt);font-size:24px;cursor:pointer;transition:transform .15s}
.call-end:hover{transform:scale(1.08)}
.call-hint{font-size:11px;color:var(--muted-3);font-family:'JetBrains Mono',monospace;max-width:420px;text-align:center;padding:0 16px}
.call-min{position:absolute;top:16px;left:16px;background:none;border:1px solid var(--border-hi);border-radius:20px;color:#888;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px}
.call-min:hover{border-color:rgba(var(--accent-rgb),0.4);color:var(--accent)}
.call-pill{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;align-items:center;gap:9px;background:var(--accent-grad);border:1px solid rgba(var(--accent-rgb),0.33);border-radius:24px;padding:7px 9px 7px 13px;z-index:120;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.5);max-width:90%}
.call-pill-dot{font-size:15px;animation:pulse 1.4s ease-in-out infinite}
.call-pill-txt{display:flex;flex-direction:column;min-width:0;font-family:'JetBrains Mono',monospace}
.call-pill-txt b{font-size:11px;color:var(--accent)}
.call-pill-sub{font-size:10px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.call-pill-end{background:#dc2626;border:none;border-radius:50%;width:24px;height:24px;color:var(--white-txt);font-size:12px;cursor:pointer;flex-shrink:0}

/* ── Qur'an player ── */
.quran{margin:10px 0;border:1px solid #1c2a1c;background:#080b08;border-radius:12px;overflow:hidden}
.quran-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;background:#0c130c;border-bottom:1px solid #16241a;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#7dd39b;font-weight:600}
.quran-meta{padding:6px 14px 0;font-family:'JetBrains Mono',monospace;font-size:10px;color:#4a6a52}
.quran-controls{display:flex;align-items:center;gap:8px;padding:10px 14px}
.quran-reciter{background:#0e1a12;border:1px solid #24422e;border-radius:7px;color:#8fe0a8;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11.5px;padding:7px 9px;outline:none;-webkit-appearance:none;appearance:none}
html[data-theme="light"] .quran-reciter{background:#eef4ef;border-color:#bcd2c2;color:#2c5138}
.quran-btn{background:#0e1a12;border:1px solid #24422e;border-radius:7px;color:#8fe0a8;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 13px;transition:all .15s}
.quran-btn:hover{border-color:#3ea56a;color:#b6f0c6}
.quran-btn.primary{background:#1c7d47;border-color:#1c7d47;color:#eafff0;font-weight:700}
.quran-btn.primary:hover{filter:brightness(1.08)}
.quran-prog{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#4a6a52}
.quran-bism{text-align:center;font-size:22px;color:#cfe9d6;padding:10px 14px 2px;line-height:1.9;font-family:'Amiri','Scheherazade New','Traditional Arabic',serif}
.quran-text{padding:6px 16px 14px;direction:rtl;text-align:right;font-size:23px;line-height:2.5;color:#e8f3ea;font-family:'Amiri','Scheherazade New','Traditional Arabic',serif;max-height:60vh;overflow-y:auto}
.quran-ayah{cursor:pointer;border-radius:6px;padding:1px 2px;transition:background .2s}
.quran-ayah:hover{background:#12261a}
.quran-ayah.on{background:#1c7d4733;box-shadow:0 0 0 1px #1c7d4766}
.quran-num{color:#5ca877;font-size:16px;font-family:'JetBrains Mono',monospace}
.quran-note{font-size:10.5px;color:#3f5a47;line-height:1.55;padding:2px 14px 12px}
.quran-err{color:#f87171;font-family:'JetBrains Mono',monospace;font-size:12px;padding:12px 14px}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s;padding:14px}
.modal{background:var(--panel);border:1px solid var(--border-2);border-radius:12px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:2}
.m-title{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-bright);font-weight:700}
.m-close{background:none;border:none;color:var(--muted-3);cursor:pointer;font-size:22px;line-height:1;padding:2px 6px}
.m-close:hover{color:#888}
.m-body{padding:20px}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.mem-on{color:var(--accent)!important;border-color:rgba(var(--accent-rgb),0.4)!important}

/* ── Usage ── */
.u-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.u-tile{background:var(--inset);border:1px solid var(--border-2);border-radius:8px;padding:12px;text-align:center}
.u-num{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--accent)}
.u-lbl{font-size:9.5px;color:var(--muted-2);font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-top:4px;text-transform:uppercase}
.u-table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:10.5px}
.u-table th{text-align:left;color:var(--muted-2);padding:6px 8px;border-bottom:1px solid var(--border);font-weight:400;letter-spacing:.5px}
.u-table td{padding:6px 8px;border-bottom:1px solid var(--border-dim);color:var(--text-dim)}
.u-table td:first-child{color:var(--text-mid);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-note{font-size:10.5px;color:#3a3a3a;margin-top:12px;line-height:1.6}

/* ── Speaker (listen) button under AI bubbles — very small ── */
.spk-btn{margin-top:7px;background:none;border:1px solid #1e1e1e;border-radius:20px;color:#4a4a4a;cursor:pointer;width:22px;height:22px;font-size:10px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.spk-btn:hover{border-color:rgba(var(--accent-rgb),0.33);color:var(--accent)}
.spk-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);animation:pulse 1.1s ease-in-out infinite}

/* ── Code block actions / downloads ── */
.cb-actions{display:flex;gap:6px}
.cb-dl{background:none;border:1px solid var(--border-hi);border-radius:4px;color:var(--muted-2);cursor:pointer;font-size:11px;padding:2px 8px;font-family:'JetBrains Mono',monospace}
.cb-dl:hover{border-color:rgba(var(--accent-rgb),0.33);color:var(--accent)}
.out-media{margin:8px 0}
.out-media audio{width:100%;max-width:320px;height:36px}
.dl-link{display:inline-block;margin-top:5px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);text-decoration:none;border:1px solid rgba(var(--accent-rgb),0.27);border-radius:5px;padding:3px 9px;background:none;cursor:pointer}
.dl-link:hover{background:var(--accent-bg)}
.gen-actions{display:flex;gap:7px;margin-top:6px}
.gen-actions .dl-link{margin-top:0}
.att-file[href]{cursor:pointer}
.att-file[href]:hover{border-color:rgba(var(--accent-rgb),0.33);color:var(--accent)}
.att-file audio{height:30px;max-width:150px}

/* ── Scroll-to-latest arrow ── */
.scroll-down{position:absolute;right:16px;bottom:96px;width:40px;height:40px;border-radius:50%;background:var(--accent-grad);border:1px solid rgba(var(--accent-rgb),0.4);color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .2s,transform .2s;z-index:20;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.scroll-down.show{opacity:1;pointer-events:auto;transform:translateY(0)}

/* ── Stop button (interrupt AI) ── */
.stop-btn{background:#dc2626;border:none;border-radius:7px;color:var(--white-txt);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:pulse 1.3s ease-in-out infinite}
.stop-btn:hover{background:#b91c1c}

/* ── Toast ── */
#toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:#161616;border:1px solid var(--border-hi);color:#ddd;font-size:12.5px;padding:10px 16px;border-radius:8px;max-width:88%;text-align:center;z-index:400;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Model picker ── */
.model-pill{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border-2);border-radius:20px;color:#cfcfcf;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;cursor:pointer;max-width:190px;transition:all .15s;flex-shrink:0}
.model-pill:hover{border-color:rgba(var(--accent-rgb),0.27);color:var(--text-bright)}
.model-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.model-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-caret{color:var(--muted-2);font-size:9px}
.model-list{display:flex;flex-direction:column;gap:14px;max-height:56vh;overflow-y:auto}
.ml-group{display:flex;flex-direction:column;gap:3px}
.ml-head{font-family:'JetBrains Mono',monospace;font-size:10px;color:#777;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;padding:2px 2px 6px;position:sticky;top:0;background:var(--panel);z-index:1}
.ml-loading{color:var(--accent);text-transform:none;letter-spacing:0;animation:pulse 1.2s ease-in-out infinite}
.ml-item{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--inset);border:1px solid var(--border);border-radius:7px;color:var(--text);cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;padding:9px 11px;text-align:left;transition:all .12s;width:100%}
.ml-item:hover{border-color:rgba(var(--accent-rgb),0.33);background:var(--accent-bg);transform:translateX(2px)}
.ml-item.on{border-color:var(--accent);background:var(--accent-bg);color:var(--text-bright)}
.ml-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ml-meta{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--accent);white-space:nowrap}

/* ── Loading status text ── */
.dots-wrap{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.ai-status{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent);letter-spacing:.4px;animation:fadeIn .3s;padding-left:2px}
.ai-status::after{content:'';display:inline-block;width:0}

/* ── Generated image ── */
.gen-img{border:1px solid var(--border-2);border-radius:12px;padding:10px;background:#0b0b0b;max-width:340px}
.gen-img-cap{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;margin-bottom:8px}
.att-img.gen{width:100%;max-width:320px;max-height:none;min-height:180px;background:linear-gradient(100deg,var(--panel-hi) 30%,var(--border) 50%,var(--panel-hi) 70%);background-size:200% 100%;animation:shimmer 1.3s linear infinite;opacity:.85;transition:opacity .4s}
.att-img.gen.ready{animation:none;background:none;opacity:1}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.gen-img-prompt{font-size:11px;color:var(--muted);margin:8px 0 4px;line-height:1.5;font-style:italic}
.gen-fail{color:#f87171;font-size:12px;font-family:'JetBrains Mono',monospace;padding:6px 0}

/* ── Send button VFX ── */
.send-btn{background:linear-gradient(135deg,#fcd34d 0%,var(--accent) 60%,#d97706 100%);box-shadow:0 2px 6px rgba(0,0,0,.35);transition:transform .12s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,filter .2s;position:relative;overflow:hidden}
.send-btn::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.25),transparent 60%);opacity:0;transition:opacity .2s}
.send-btn:hover{transform:translateY(-1px) scale(1.05);box-shadow:0 3px 9px rgba(0,0,0,.4);filter:brightness(1.05)}
.send-btn:hover::after{opacity:1}
.send-btn:active{transform:scale(.88)}
.send-btn svg{transition:transform .15s}
.send-btn:hover svg{transform:translate(1px,-1px) rotate(6deg)}
.input-box:focus-within{border-color:rgba(var(--accent-rgb),0.27)}
.ibtn:active{transform:scale(.9)}
.chip:hover{transform:translateY(-1px)}

/* ── Toggle switch ── */
.toggle-row{display:flex;align-items:flex-start;gap:14px;justify-content:space-between}
.toggle-title{font-size:13px;color:#e2e2e2;font-weight:600;margin-bottom:3px}
.toggle-sub{font-size:11.5px;color:var(--muted-2);line-height:1.55;max-width:340px}
.switch{flex-shrink:0;width:42px;height:24px;border-radius:14px;background:var(--border);border:1px solid var(--border-hi);cursor:pointer;position:relative;transition:background .2s,border-color .2s;padding:0}
.switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted-2);transition:transform .2s,background .2s}
.switch.on{background:var(--accent-bg);border-color:rgba(var(--accent-rgb),0.4)}
.switch.on .knob{transform:translateX(18px);background:var(--accent)}

/* ── Action cards ── */
.act-card{margin:10px 0;border:1px solid #26210f;background:#0e0c06;border-radius:10px;padding:12px 14px}
.act-card.danger{border-color:#3a2c0a}
.act-card.err{border-color:#3a1414;color:#f87171;font-family:'JetBrains Mono',monospace;font-size:12px}
.act-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.act-ico{color:var(--accent)}
.act-title{font-weight:600;color:#eee;font-size:13.5px;flex:1}
.act-badge{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);border:1px solid rgba(var(--accent-rgb),0.27);border-radius:4px;padding:1px 5px;text-transform:uppercase}
.act-why{font-size:12px;color:#888;margin-bottom:8px;line-height:1.5}
.act-args{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;background:var(--inset);border:1px solid #171717;border-radius:7px;padding:8px 10px}
.act-arg{display:flex;gap:8px;font-size:11.5px;font-family:'JetBrains Mono',monospace}
.act-arg span{color:var(--muted);min-width:64px;flex-shrink:0}
.act-arg code{color:#cbcbcb;word-break:break-all}
.act-run{background:var(--accent);border:none;border-radius:7px;color:var(--bg);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;padding:8px 14px;cursor:pointer}
.act-run:hover{filter:brightness(1.05)}
.act-run:disabled{opacity:.6;cursor:default}
.act-hint{display:block;font-size:10px;color:#3a3a3a;margin-top:6px;font-family:'JetBrains Mono',monospace}
.act-result{font-size:12px;font-family:'JetBrains Mono',monospace;line-height:1.5;word-break:break-word}
.act-result.ok{color:#4ade80}
.act-result.err{color:#f87171}

/* ── File cards (downloadable files) ── */
.filecard{margin:10px 0;border:1px solid #242424;border-radius:10px;overflow:hidden;background:#0b0b0b;max-width:100%}
.fc-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--panel-hi);border-bottom:1px solid var(--border-2)}
.fc-icon{font-size:15px;flex-shrink:0}
.fc-name{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--text-bright);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-meta{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--muted-2);white-space:nowrap;flex-shrink:0}
.fc-body{max-height:340px;overflow:auto;margin:0}
.fc-check{padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;border-top:1px solid var(--border)}
.fc-check.ok{color:#4ade80;background:#07130a}
.fc-check.warn{color:var(--accent);background:#130e02}
.fc-check.err{color:#f87171;background:#130707}
.fc-actions{display:flex;flex-wrap:wrap;gap:7px;padding:9px 12px;border-top:1px solid var(--border);background:var(--panel)}

   API if we have it, otherwise the curated built-in defaults. */

`# Identity
You are Lewa Coder, an expert AI coding agent — a full alternative to Claude and Claude Code. You write EVERY computer language completely: programming languages (JS/TS, Python, C/C++, C#, Java, Go, Rust, Ruby, PHP, Swift, Kotlin and more), stylesheets (CSS, SCSS, Tailwind), markup (HTML, XML, Markdown), queries (SQL), configs (JSON, YAML, TOML), and shell. None is second-class: CSS is real code and you write it as fully and carefully as any function. Talk like a warm, sharp human pair-programmer: natural and concise, never robotic. Do NOT use emoji (they get read aloud). Match effort to the request — a quick question gets a short answer; a real feature gets real rigour. Don't over-engineer trivial asks.

# Response mode
- "Build / write / create / fix X" → return mostly CODE, plus a short note on what it does and how to run it.
- "Explain / why / how / compare X" → return mostly EXPLANATION with small illustrative snippets.
Don't bury code in essays or answer a question with a giant code dump.

# Teaching mode
When the user is learning (says "teach me", "I'm new", or clearly a beginner): teach through DOING — small game-like challenges with a goal, a hint, and a win condition (the way Flexbox Froggy teaches CSS or Elevator Saga teaches JS), one concept at a time, celebrating progress. Briefly explain each technical term the first time you use it. Never condescend.

# Code output
- Give COMPLETE, runnable code. Never truncate, summarise, or placeholder any part of a file. Forbidden: "// ... rest of code", "/* unchanged */", "// keep existing code", "... (truncated)", "for brevity" — eliding code deletes it and breaks the app. If a 600-line file needs one change, output all 600 lines with that change.
- CSS ESPECIALLY: stylesheets are the part models love to skip — you never do. "/* your styles here */", "/* add styling */", an empty <style> tag, or a class used in HTML but never defined in CSS all count as broken output. Every page you build ships with its full, working CSS.
- If a previous message was cut off, CONTINUE from exactly where it stopped — never restart or repeat. The app auto-continues across length limits, so length is never a reason to shorten.
- Wrap code in fenced blocks tagged with the language.

# Editing existing files
- You are EDITING, not rewriting. Change ONLY the lines the request requires; leave everything else intact — structure, formatting, comments, imports, unrelated code. Do not refactor, rename, or "improve" untouched code unless the user explicitly asks. (This is about preserving THEIR existing code — it never means avoid writing CSS/styling; when styling is requested, write all of it.) Then output the whole updated file.
- Large attachments arrive as an EXCERPT (head + tail, marked "… [N omitted] …") — context can't hold gigabytes. Work with what you're shown; if you need an unseen part, ask the user to paste that section rather than guessing.

# Don't hallucinate — and it is OK to say "I can't" or "I'm not sure"
Never invent APIs, package names, SDK/library methods, CLI commands or flags, config keys, file paths, pricing, documentation, or framework features. Use only what you're confident is real.
Admitting a limit is a CORRECT answer, not a failure. When you don't know, don't have the information, can't verify something, or can't actually do what's asked, SAY SO plainly and briefly — "I'm not sure", "I can't do that from here", "I don't have that information", "that library may not exist — check the docs". A short honest "I can't" always beats a confident guess. Never fabricate a fact, a result, an API, or a success to seem more capable; a made-up answer that looks right is worse than no answer because it wastes the user's time and breaks trust. If you're partly sure, say what you're confident about and flag the rest as uncertain. Prefer standard, well-known approaches over obscure ones you can't stand behind.

# Ask when information is missing
Don't silently decide things that materially change the result. E.g. "add authentication" → ask which (OAuth / JWT / session / Firebase / Supabase / local); "add a database" → ask which. Suggest 1–2 sensible defaults, but confirm the approach before committing when the choice matters.

# Plan before building (non-trivial work)
For anything beyond a small snippet — a real feature, app, or multi-file project — briefly lay out the plan FIRST: the architecture, the data model/schema, the main API or component surface, the folder structure, and how it'll be tested. Keep it short. Then build. For a big one-line ask ("build me a food-delivery app"), state the plan and the sensible scope you'll deliver, then produce a complete, consistent project (frontend, backend shape, data model, docs) rather than a fragment.

# Debugging workflow
When fixing a bug, don't just rewrite. First: (1) name the bug, (2) explain the root cause, (3) how to reproduce it, (4) the fix and why it works — THEN give the corrected code as a minimal change to the affected lines. If you're given real runtime errors (e.g. from Autopilot), fix the ACTUAL cause they point to, not a guess.

# Project awareness
When files belong to one project, keep imports, names and paths consistent across them, respect the existing architecture and conventions, and don't let a change to one file break another. When the user has shared a project, a digest of its structure, dependencies and conventions is provided above — use it so your changes fit in as if written by someone who knows the codebase; when they say something like "make the dashboard feel more like Discord", identify exactly which files to touch and touch only those.

# Screenshots & visual input
If the user attaches a screenshot or image of a UI: describe what you see, then recreate it faithfully as code, note concrete improvements you'd make, and implement them if asked.

# Self-improvement
After finishing something substantial, take one honest pass: could this be meaningfully better (clarity, correctness, security, performance, UX)? If yes and the win is real, apply it and say what you improved. Don't pad with trivial churn or loop forever — stop when there's no meaningful gain left.

# Performance (apply where it matters; explain each term in one line)
Default to: caching/memoization, skeleton loaders, pagination (fetch ~20, load more — never ship all 5,000 rows to render 20), no N+1 queries (batch lookups), async/non-blocking work, lazy loading, code splitting, image optimisation, compression/gzip, tree-shaking, request batching, input debounce/throttle, and virtual scrolling for long lists.
Also: move heavy processing off the main thread (Web Workers / background jobs) instead of running it synchronously; optimise LCP (largest contentful paint — preload the hero image/font, minimise render-blocking assets); keep scroll handlers cheap, passive and throttled (janky scroll = heavy logic firing per scroll event); at scale, separate read and write database paths (read replicas) so reads don't block writes.

# Security (always watch for)
XSS, SQL/command injection, CSRF, secrets committed in code, weak or missing auth, missing input validation, and over-permissive CORS. Validate and escape untrusted input; keep secrets in env/config, never hardcoded.
When you build LOGIN / AUTH for a user's app, avoid the five classic mistakes: (1) session tokens in localStorage (use httpOnly cookies — localStorage is readable by any XSS), (2) admin/role checks done client-side only (always re-check on the server), (3) no email verification or 2FA option, (4) no rate limiting on login and password-reset endpoints (brute-forceable), (5) no password rules or leaked-password check. Build these in by default and say so.
PRE-LAUNCH CHECKLIST — when a user is about to deploy/launch, walk them through: privacy policy if any user data is collected; OWASP basics checked (SQLi, XSS, broken auth); .env in .gitignore and never committed; no secrets in API responses or logs; rate limits on every public endpoint (or someone will run up their API bill overnight).

# Accessibility
Semantic HTML, keyboard navigation, visible focus, sufficient contrast, alt text, and ARIA labels where needed.

# Mobile & responsive
Beyond fluid layouts: adequate touch-target sizes, safe-area insets (notches), landscape, tablet/foldable widths, and graceful behaviour on slow networks.

# When you change code, report
Briefly note: files modified, any breaking changes, migration/setup steps, and new dependencies to install.

# Documentation
For a real project, include the docs that matter: a README (what it is, install, run, usage), and when relevant an API reference, a short architecture overview, and a changelog entry. Keep them accurate to the actual code — never document features that aren't there.

You can act on GitHub and deploy through the action blocks below (commit files, open PRs, create repos, enable GitHub Pages) — but only propose an action; it runs when the user clicks Run and you get an "[Action result]". Write clear, conventional commit messages and explain what a change does. For static sites, GitHub Pages is the zero-config deploy path; for anything needing a server, say plainly that a host/backend is required and outline the steps rather than pretending you deployed it.

When the user is learning or asks "why", optionally add a short "Why this / trade-offs / common mistakes" note after an edit so Lewa Coder teaches as it builds. Keep it tight; skip it for experts moving fast.

# Testing
Offer meaningful tests when useful — unit + integration, key edge cases, and a short manual test checklist — without burying a small answer in tests.

# Self-review before sending
Re-read your output and check: syntax, imports resolve, no undefined variables, no missing referenced files, valid JSON, correct HTML nesting, sane CSS selectors, no broken links. Fix problems before replying. End non-trivial answers with a one-line "Confidence: High/Medium/Low" — and when it's not High, say why (e.g. "Medium — API docs weren't provided").

const acct=()=>S.user?S.accounts[S.user]:null;
/* ── Persistence — BATCHED, DEBOUNCED, OFF the critical path ────
   Before: every keystroke-level change serialized ALL account data
   (potentially megabytes) synchronously — the storage equivalent of
   N+1 queries, and it blocked the main thread. Now: changes mark the
   state dirty and ONE write happens ~250ms later during idle time.
   A flush on tab-hide/close guarantees nothing is ever lost. */
let _saveT=null,_dirty=false;
function _writeAccts(){
  _dirty=false;
  try{sv(AK,S.accounts);}
  catch(_){
    pruneAttachments();                 // quota hit → drop old blobs, retry once
    try{sv(AK,S.accounts);}catch(__){}
  }
  if(S.user)localStorage.setItem(UK,S.user);
}
const _idle=(fn)=>('requestIdleCallback' in window)?requestIdleCallback(fn,{timeout:400}):setTimeout(fn,0);
const saveAccts=()=>{                   // debounced (batches bursts of changes)
  _dirty=true;
  if(_saveT)return;
  _saveT=setTimeout(()=>{_saveT=null;if(_dirty)_idle(_writeAccts);},250);
};
const saveAcctsNow=()=>{                // immediate — for logout/delete/unload
  if(_saveT){clearTimeout(_saveT);_saveT=null;}
  _writeAccts();
};
addEventListener('visibilitychange',()=>{if(document.hidden&&_dirty)saveAcctsNow();});
addEventListener('pagehide',()=>{if(_dirty)saveAcctsNow();});
function pruneAttachments(){
  Object.values(S.accounts).forEach(a=>{
    (a.sessions||[]).forEach(s=>{
      (s.messages||[]).forEach(m=>{
        if(m.attachments)m.attachments.forEach(att=>{
          if(att.dataUrl&&att.dataUrl.length>200000){att.dataUrl='';att.pruned=true;}
          if(att.text&&att.text.length>8000)att.text=att.text.slice(0,8000);
        });
        // Drop large generated-image data URLs from older messages to free space.
        if(m.gen)Object.keys(m.gen).forEach(k=>{if((m.gen[k]||'').length>200000)delete m.gen[k];});
      });
    });
  });
}

// ── Auth ───────────────────────────────────────────────────────
/* Brute-force guard: after 5 failed password attempts the target
   (login:<user> / unlock:<user>) locks with exponential backoff
   (30s → 60s → … capped at 15 min). Client-side, but it makes
   casually guessing someone's password on a shared device slow. */
const RL_KEY='lw3_rl';
const _rlAll=()=>{try{return JSON.parse(localStorage.getItem(RL_KEY))||{}}catch(_){return{}}};
function rlWait(id){const r=_rlAll()[id];if(!r||!r.until)return 0;const w=r.until-Date.now();return w>0?Math.ceil(w/1000):0;}
function rlFail(id){
  const all=_rlAll();const r=all[id]||{n:0,until:0};
  r.n++;
  if(r.n>=5)r.until=Date.now()+Math.min(30*Math.pow(2,r.n-5),900)*1000;
  all[id]=r;localStorage.setItem(RL_KEY,JSON.stringify(all));
}
function rlClear(id){const all=_rlAll();if(all[id]){delete all[id];localStorage.setItem(RL_KEY,JSON.stringify(all));}}

async function doSignup(){
  const u=document.getElementById('au').value.trim();
  const p=document.getElementById('ap').value;
  const c=document.getElementById('ac').value;
  if(!u||u.length<3){S.authErr='Username must be at least 3 characters.';return render();}
  // Min 4 real characters — letters, numbers and symbols all count, spaces don't.
  if(p.replace(/\s/g,'').length<4){S.authErr='Password must be at least 4 characters (spaces don\'t count).';return render();}
  if(p!==c){S.authErr='Passwords do not match.';return render();}
  if(S.accounts[u]){S.authErr='That username already exists — sign in instead.';return render();}
  if(await sha256(normId(u))===_ID.nameH){S.authErr='That username is reserved.';return render();}
  S.accounts[u]=blankAccount(await sha256(u+':'+p));
  S.user=u;S.isAdmin=false;S.authErr='';saveAccts();
  S.screen='setup';render();
}
async function doLogin(){
  const u=document.getElementById('au').value.trim();
  const p=document.getElementById('ap').value;
  const wait=rlWait('login:'+u);
  if(wait){S.authErr=`Too many attempts — try again in ${wait}s.`;return render();}
  // Hidden developer/admin sign-in — recognised by hash; credentials never appear in this source.
  if(await sha256(normId(u)+'::adm::'+p)===_ID.admin){
    const dn=devName();
    if(!S.accounts[dn])S.accounts[dn]=blankAccount(await sha256(dn+':'+p));
    S.accounts[dn].isDev=true;
    S.user=dn;S.isAdmin=true;S.authErr='';saveAccts();
    const a=S.accounts[dn];
    const hasKey=Object.values(a.apiKeys).some(k=>k&&k.trim());
    return hasKey?startLoading():(S.screen='setup',render());
  }
  const a=S.accounts[u];
  if(!a){S.authErr='No account with that username.';return render();}
  if(a.passHash!==await sha256(u+':'+p)){rlFail('login:'+u);S.authErr='Wrong password.';return render();}
  rlClear('login:'+u);
  S.user=u;S.isAdmin=false;S.authErr='';saveAccts();
  if(S.pendingORKey){ // key from the OpenRouter Connect redirect
    a.apiKeys.openrouter=KeyVault.enc(S.pendingORKey);
    a.cfg.provider='openrouter';a.cfg.model=OR_FREE_MODEL;
    S.pendingORKey=null;saveAccts();refreshCredits();
    return startLoading();
  }
  const hasKey=Object.values(a.apiKeys).some(k=>k&&k.trim());
  if(hasKey){startLoading();}else{S.screen='setup';render();}
}
function doLogout(){
  stopSTT();stopTTS();endCall();stopAI();
  saveAcctsNow();                        // flush any pending batched writes
  S.user=null;S.isAdmin=false;localStorage.removeItem(UK);
  S.screen='auth';S.authMode='login';render();
}

function pickAvatar(){
  S.avatarMenu=false;
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0];if(!f)return;

    img.onload=()=>{

      const ctx=c.getContext('2d');
      const s=Math.min(img.width,img.height);

      const a=acct();if(a){a.cfg.avatar=url;saveAccts();render();toast('Profile picture updated.');}
    };

  };

// ── API calls ──────────────────────────────────────────────────
/* ── Key routing — any key serves every model it possibly can ───
   Native keys call their own provider directly. An OpenRouter key
   is a UNIVERSAL key: every model in the picker has an OpenRouter
   equivalent (orId), so when a model's native key is missing the
   call is transparently re-routed through OpenRouter instead of
   failing. Pick any model — if any compatible key exists, it runs. */
function resolveRoute(provider,model){
  const a=acct();
  const native=KeyVault.dec(a?.apiKeys[provider]||'');
  if(native)return{provider,model,key:native};
  const or=KeyVault.dec(a?.apiKeys.openrouter||'');
  if(or){
    if(provider==='openrouter')return{provider,model,key:or};
    const mi=modelInfo(provider,model);
    if(mi.orId)return{provider:'openrouter',model:mi.orId,key:or};
  }
  throw new Error(`No key can reach this model. In ⚙ Settings add a ${PROVIDERS[provider]?.name||provider} key — or a single OpenRouter key, which works for every model here.`);
}
function hasRouteFor(provider){
  const a=acct();if(!a)return false;
  return !!(KeyVault.dec(a.apiKeys[provider]||'')||KeyVault.dec(a.apiKeys.openrouter||''));
}

/* ── SMART MODEL ROUTING (Auto strategy only) ──────────────────
   Classify how hard the turn is, then use the CHEAPEST model that can
   handle it — but only ever swap WITHIN the session's own provider (no
   surprise cross-provider switches) and only to a model the user can
   actually reach. A short question shouldn't burn a flagship model;
   a real build/debug should get the strongest one. Saves money and,
   for simple turns, answers faster. */
function classifyComplexity(text){
  const t=(text||'').toLowerCase();
  const words=t.trim().split(/\s+/).filter(Boolean).length;
  // Hard signals: building, multi-file, architecture, tricky debugging.
  if(/\b(architect|design|refactor|migrate|optimi[sz]e|debug|full[- ]?stack|whole app|entire|end[- ]to[- ]end|multi[- ]?file|scal(e|able|ing)|concurren|security audit|performance)\b/.test(t)) return 'hard';
  if(/\b(build|create|make|implement|write|generate)\b/.test(t)&&words>12) return 'hard';
  // Easy signals: short factual/explanatory asks.
  if(words<=14&&/\b(what|why|how|explain|difference|meaning|is|are|does|when|which|define)\b/.test(t)) return 'easy';
  if(words<=6) return 'easy';
  return 'medium';
}
/* Return {provider,model} to actually use for this turn. */
function routeModel(text,provider,model){
  if(S.modelStrategy!=='auto')return{provider,model};   // only Auto reroutes
  try{
    const list=modelsFor(provider).filter(m=>m&&m.id);
    if(list.length<2)return{provider,model};
    // Rank by output price (proxy for capability/cost). Cheapest first.
    const ranked=[...list].sort((a,b)=>(a.pout||0)-(b.pout||0));
    const cx=classifyComplexity(text);
    let pick;
    if(cx==='easy')pick=ranked[0];                       // cheapest
    else if(cx==='hard')pick=ranked[ranked.length-1];    // strongest
    else pick=list.find(m=>m.id===model)||ranked[Math.floor(ranked.length/2)];
    if(pick&&pick.id&&hasRouteFor(provider))return{provider,model:pick.id};
  }catch(_){}
  return{provider,model};
}

/* ── Live model catalogues ──────────────────────────────────────
   Ask each provider's API for the full list of models it supports and
   let the user pick any of them. These list endpoints are FREE — they
   spend zero tokens — so this stays token-friendly. Results are cached
   per account. On any failure we quietly fall back to the curated list. */
async function fetchModels(provider,key){
  try{
    if(provider==='openrouter'){
      const r=await fetch('https://openrouter.ai/api/v1/models',{signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.data||[]).map(m=>({id:m.id,label:m.name||m.id,
        pin:(+m.pricing?.prompt||0)*1e6,pout:(+m.pricing?.completion||0)*1e6}))
        .sort((a,b)=>a.label.localeCompare(b.label));
    }
    if(provider==='openai'){
      const r=await fetch('https://api.openai.com/v1/models',{headers:{Authorization:'Bearer '+key},signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.data||[]).map(m=>m.id)
        .filter(id=>/^(gpt-|o1|o3|o4|chatgpt)/.test(id)&&!/(audio|realtime|embedding|tts|whisper|image|moderation|transcribe|search)/.test(id))
        .sort().map(id=>({id,label:id,pin:0,pout:0}));
    }
    if(provider==='anthropic'){
      const r=await fetch('https://api.anthropic.com/v1/models?limit=100',{headers:{'x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.data||[]).map(m=>({id:m.id,label:m.display_name||m.id,pin:0,pout:0}));
    }
    if(provider==='gemini'){
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models?key='+encodeURIComponent(key)+'&pageSize=200',{signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent')&&/gemini/i.test(m.name))
        .map(m=>({id:m.name.replace('models/',''),label:m.displayName||m.name.replace('models/',''),pin:0,pout:0}));
    }
    if(provider==='xai'){
      const r=await fetch('https://api.x.ai/v1/models',{headers:{Authorization:'Bearer '+key},signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.data||[]).map(m=>({id:m.id,label:m.id,pin:0,pout:0}));
    }
  }catch(_){}
  return null;
}
/* Fetch (once, cached ~6h) the catalogues for every provider that has a key. */
async function ensureModels(force){
  const a=acct();if(!a)return;
  a.models=a.models||{};a.modelsAt=a.modelsAt||{};
  let changed=false;
  await Promise.all(Object.keys(PROVIDERS).map(async p=>{
    const key=KeyVault.dec(a.apiKeys[p]||'');
    if(!key)return;
    const fresh=a.models[p]&&a.models[p].length&&a.modelsAt[p]&&(Date.now()-a.modelsAt[p]<216e5);
    if(fresh&&!force)return;
    const list=await fetchModels(p,key);
    if(list&&list.length){a.models[p]=list;a.modelsAt[p]=Date.now();changed=true;}
  }));
  if(changed){saveAccts();if(S.modal==='models')renderModelList();
    else if(S.screen==='app')render();}
}

// Build provider-specific message payloads. Images go as real vision inputs;
// other file types are described/inlined as text (see attachmentContext).
const imgAtts=(m)=>(m.attachments||[]).filter(x=>x.dataUrl&&(x.type||'').startsWith('image/'));
/* PROMPT CACHING — the big system prompt barely changes between turns, so
   we mark it cacheable. Anthropic then reuses it across a conversation
   (5-min window) instead of re-reading it every message: noticeably
   faster replies and much cheaper input tokens. Sent as a content-block
   array (the format cache_control requires). */
function anthropicSystem(sys){
  return [{type:'text',text:String(sys||''),cache_control:{type:'ephemeral'}}];
}
function toAnthropicMsgs(msgs){
  return msgs.map(m=>{
    const imgs=imgAtts(m);
    if(!imgs.length)return{role:m.role,content:m.content};
    return{role:m.role,content:[
      ...imgs.map(x=>({type:'image',source:{type:'base64',media_type:x.type,data:x.dataUrl.split(',')[1]}})),
      {type:'text',text:m.content||'(see attached image)'},
    ]};
  });
}
function toOpenAIMsgs(msgs){
  return msgs.map(m=>{
    const imgs=imgAtts(m);
    if(!imgs.length)return{role:m.role,content:m.content};
    return{role:m.role,content:[
      {type:'text',text:m.content||'(see attached image)'},
      ...imgs.map(x=>({type:'image_url',image_url:{url:x.dataUrl}})),
    ]};
  });
}
function toGeminiContents(msgs){
  return msgs.map(m=>{
    const parts=[];
    imgAtts(m).forEach(x=>parts.push({inlineData:{mimeType:x.type,data:x.dataUrl.split(',')[1]}}));
    parts.push({text:m.content||'(see attached image)'});
    return{role:m.role==='assistant'?'model':'user',parts};
  });
}
function usageFromOpenAI(d){return{tin:d.usage?.prompt_tokens||0,tout:d.usage?.completion_tokens||0};}

/* Turn an API failure into a clear, specific, human sentence — the status
   code, what it means, and what to do — instead of a bare "API Error". */
function apiErrorMessage(provider,status,body){
  const name={anthropic:'Anthropic',openai:'OpenAI',gemini:'Gemini',xai:'Grok (xAI)',openrouter:'OpenRouter'}[provider]||provider||'The API';
  const raw=(body&&(body.error?.message||body.error||body.message))||'';
  const detail=typeof raw==='string'&&raw?` — ${raw}`:'';
  const byCode={
    400:`${name} rejected the request (400 bad request)${detail}. This usually means the model name or a parameter is off.`,
    401:`${name} says your API key is invalid or missing (401). Re-check the key in ⚙ Settings.`,
    402:(/afford/i.test(raw)?`${name} doesn't have enough credit for this reply (402). Your input was large, so the model's reserved output cost more credit than your balance. Try a shorter message/fewer files, or add credits.`:`${name} needs payment/credits (402). Add credits to your ${name} account.`)+detail,
    403:`${name} refused access (403)${detail}. The key may lack permission for this model, or your region is blocked.`,
    404:`${name} couldn't find that model (404). Pick a different model — the id may be wrong or retired.`,

async function callOpenAICompat(url,extraHeaders,msgs,key,model,sys,maxT,signal){
  const _prov=_provOf(url);

  const body={model,messages:[{role:'system',content:sys},...toOpenAIMsgs(msgs)],
      /* Reasoning models (Nemotron, DeepSeek R1…) otherwise burn the budget on
         hidden thoughts — keep effort minimal, don't return them on non-stream. */
      ...(isOR?{reasoning:{effort:'low',exclude:true}}:{})};
  const cap=maxT||(isOR?CFG.OR_MAX:0);   // OpenRouter always gets a ceiling (see CFG)
  if(cap)body.max_tokens=cap;
  const r=await fetch(url,{
    method:'POST',signal,
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key,...extraHeaders},
    body:JSON.stringify(body),
  });
  if(!r.ok){
    // Balance too low for even the capped reservation → retry with what fits.
    const raw=await r.clone().json().catch(()=>({}));
    const afford=affordFromError(raw?.error?.message||raw?.message||'');
    if(afford&&!maxT&&afford>256)return callOpenAICompat(url,extraHeaders,msgs,key,model,sys,Math.floor(afford*0.9),signal);
    throw await apiError(_prov,r);
  }
  const d=await r.json();

  let out=_msg.content;
  if(Array.isArray(out))out=out.map(c=>c?.text||'').join('');
  out=cleanModelOutput(out);
  /* If reasoning ate the whole budget, content comes back empty. Only salvage
     text that appears AFTER a fully closed think block — raw unfinished
     thoughts must never reach the user. */
  if(!out&&_msg.reasoning){
    const parts=String(_msg.reasoning).split(/<\/think>/i);
    out=parts.length>1?cleanModelOutput(parts.pop()):'';

/* ════════════════════════════════════════════════════════════
   STREAMING — live reasoning + answer, like Claude / Claude Code.
   onDelta('reasoning'|'text', chunk) fires as tokens arrive so the
   thinking panel updates in realtime and can be stopped mid-thought.
   ════════════════════════════════════════════════════════════ */
async function readSSE(r,onLine){
  const reader=r.body.getReader();const dec=new TextDecoder();let buf='';
  for(;;){
    const {done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value,{stream:true});
    let nl;
    while((nl=buf.indexOf('\n'))>=0){
      const line=buf.slice(0,nl).replace(/\r$/,'').trim();
      buf=buf.slice(nl+1);
      if(line)onLine(line);
    }
  }
  if(buf.trim())onLine(buf.trim());
}
async function streamOpenAICompat(url,extraHeaders,msgs,key,model,sys,signal,onDelta,maxT){
  const _prov=_provOf(url);
  const isOR=url.includes('openrouter');
  const body={model,stream:true,messages:[{role:'system',content:sys},...toOpenAIMsgs(msgs)]};
  const cap=maxT||(isOR?CFG.OR_MAX:0);   // OpenRouter always gets a ceiling (see CFG)
  if(cap)body.max_tokens=cap;
  if(isOR)body.reasoning={effort:'low'}; // stream thoughts (no exclude)
  const r=await fetch(url,{method:'POST',signal,headers:{'Content-Type':'application/json','Authorization':'Bearer '+key,...extraHeaders},body:JSON.stringify(body)});
  if(!r.ok||!r.body){
    const raw=await r.clone().json().catch(()=>({}));
    const afford=affordFromError(raw?.error?.message||raw?.message||'');
    if(afford&&!maxT&&afford>256)return streamOpenAICompat(url,extraHeaders,msgs,key,model,sys,signal,onDelta,Math.floor(afford*0.9));
    throw await apiError(_prov,r);
  }
  let text='',reasoning='',usage={tin:0,tout:0},finish='';
  await readSSE(r,line=>{
    if(!line.startsWith('data:'))return;
    const p=line.slice(5).trim();if(!p||p==='[DONE]')return;
    let j;try{j=JSON.parse(p);}catch{return;}
    if(j.usage)usage={tin:j.usage.prompt_tokens||0,tout:j.usage.completion_tokens||0};
    const ch=j.choices?.[0]||{};
    if(ch.finish_reason)finish=ch.finish_reason;
    const d=ch.delta||{};
    const rc=d.reasoning||d.reasoning_content;
    if(rc){reasoning+=rc;onDelta('reasoning',rc);}
    if(d.content){text+=d.content;onDelta('text',d.content);}
  });
  return{text:cleanModelOutput(text)||text,reasoning,usage,truncated:finish==='length'};
}
async function streamAnthropic(msgs,key,model,sys,signal,onDelta){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',signal,
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model,max_tokens:CFG.ANTHROPIC_MAX,system:anthropicSystem(sys),stream:true,messages:toAnthropicMsgs(msgs)})});
  if(!r.ok||!r.body){throw await apiError('anthropic',r);}
  let text='',reasoning='',usage={tin:0,tout:0},stop='';
  await readSSE(r,line=>{
    if(!line.startsWith('data:'))return;
    const p=line.slice(5).trim();if(!p)return;let j;try{j=JSON.parse(p);}catch{return;}
    if(j.type==='message_start')usage.tin=j.message?.usage?.input_tokens||0;
    if(j.type==='content_block_delta'){const dl=j.delta||{};
      if(dl.type==='text_delta'&&dl.text){text+=dl.text;onDelta('text',dl.text);}
      if(dl.type==='thinking_delta'&&dl.thinking){reasoning+=dl.thinking;onDelta('reasoning',dl.thinking);}}

  });
  return{text:cleanModelOutput(text)||text,reasoning,usage,truncated:stop==='max_tokens'};
}
async function streamGemini(msgs,key,model,sys,signal,onDelta){
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${encodeURIComponent(key)}`,{
    method:'POST',signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:toGeminiContents(msgs),systemInstruction:{parts:[{text:sys}]}})}); // no maxOutputTokens cap
  if(!r.ok||!r.body){throw await apiError('gemini',r);}

    if(!line.startsWith('data:'))return;

}

const fmtTok=(n)=>n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n);

// ── Cross-session memory (auto recall across ALL account chats) ─
const trunc=(s,n)=>{s=(s||'').replace(/\s+/g,' ').trim();return s.length>n?s.slice(0,n)+'…':s;};

/* Deterministic (zero-token) digest of every prior chat on this account,
   newest first. Recent chats get more detail; older ones a one-liner. The
   whole thing is capped so it stays token-friendly.
   CACHED: rebuilding on every send re-walked every message of every chat;
   now it recomputes only when the chats actually change. */
let _recallCache={key:'',val:''};
function buildRecall(){
  const a=acct();if(!a)return'';
  if(a.cfg.recall===false)return'';   // user turned cross-chat memory off
  const key=S.user+'|'+a.currentId+'|'+a.sessions.length+'|'+a.sessions.reduce((n,s)=>n+s.messages.length,0);
  if(_recallCache.key===key)return _recallCache.val;
  const val=_buildRecallRaw(a);
  _recallCache={key,val};

}
function _buildRecallRaw(a){
  const others=a.sessions
    .filter(s=>s.id!==a.currentId&&s.messages.some(m=>m.content&&!/^❌/.test(m.content)))
    .sort((x,y)=>(y.createdAt||0)-(x.createdAt||0));
  let budget=3600;const out=[];
  others.forEach((s,idx)=>{
    if(budget<=0)return;
    const detailed=idx<4; // richer summary for the 4 most recent chats
    const turns=s.messages.filter(m=>m.content&&!/^❌/.test(m.content));
    let block=`— "${trunc(s.title,52)}"${s.createdAt?` (${dateLabel(s.createdAt)})`:''}:`;
    if(detailed){
      const pairs=[];
      for(let i=0;i<turns.length&&pairs.length<3;i++){
        if(turns[i].role==='user'){
          const u=turns[i];const nx=turns[i+1];
          pairs.push(`\n   • you asked: ${trunc(u.content,150)}`+(nx&&nx.role==='assistant'?`\n     Lewa Coder: ${trunc(nx.content,190)}`:''));
        }
      }
      block+=pairs.join('');
    }else{
      const fu=turns.find(m=>m.role==='user');
      block+=` ${trunc(fu?.content,120)}`;
    }
    if(block.length>budget)block=block.slice(0,budget)+'…';
    budget-=block.length;out.push(block);
  });
  return out.join('\n');
}

/* WHY system notifications get "blocked no matter what": browsers only
   grant the Notification permission to SECURE origins — https:// or
   localhost. A page opened as a local file (file://) is treated as
   untrusted, so Chrome/Edge/Android auto-deny the permission without
   even showing a prompt, and nothing inside the page can override it.
   Fix: fall back to IN-APP notifications (banner + chime + vibration +
   tab-title flash) that work everywhere. Real system notifications
   activate automatically once Lewa Coder is served over https or
   wrapped in the Android app. */

function notifyBlocked(){
  return !notifySupported()||location.protocol==='file:'||Notification.permission==='denied';

async function ensureNotifyPermission(){
  if(!notifySupported())return false;

let _titleFlash=null;
function _flashTitle(msg){
  if(_titleFlash||document.hasFocus())return;
  const orig=document.title;let on=false;
  _titleFlash=setInterval(()=>{document.title=(on=!on)?'● '+msg:orig;},900);
  const stop=()=>{if(_titleFlash){clearInterval(_titleFlash);_titleFlash=null;document.title=orig;}};
  addEventListener('focus',stop,{once:true});
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)stop();},{once:true});
}
function _chime(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended')return; // no gesture yet — stay silent
    const t=ctx.currentTime;
    [[880,0],[1174.66,.12]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.14,t+d+.02);g.gain.exponentialRampToValueAtTime(.001,t+d+.5);
      o.connect(g).connect(ctx.destination);o.start(t+d);o.stop(t+d+.55);
    });
    setTimeout(()=>ctx.close(),900);
  }catch(_){}
}

    if(window.LewaAndroid&&window.LewaAndroid.notify){window.LewaAndroid.notify(String(title),String(body||''));return true;}
  }catch(_){}
  // 2) Hosted site with sw.js → device notification tray (works on Android Chrome).
  if(_swReg&&notifySupported()&&Notification.permission==='granted'){
    try{_swReg.showNotification(title,{body,icon:LEWA_ICON,badge:LEWA_ICON,tag:'lewa-coder'});return true;}catch(_){}

async function gh(path,opts={}){

/* Edit a file IN PLACE by exact text replacement. The app fetches the full
   file itself and swaps the text locally, so the AI can edit very large files
   (like this app's own index.html) without ever holding the whole content —
   no more truncated-read corruption. */
async function ghEditFile(owner,repo,path,find,replace,message,branch){
  if(!find)throw new Error('editFile needs the exact text to find');
  const cur=await ghGetFile(owner,repo,path,branch);
  const n=cur.content.split(find).length-1;
  if(n===0)throw new Error(`Text not found in ${path} — the "find" string must match the file exactly (check whitespace).`);
  if(n>1)throw new Error(`"find" matches ${n} places in ${path} — add surrounding context to make it unique.`);
  const next=cur.content.replace(find,replace==null?'':replace);
  const body={message:message||`Edit ${path} via Lewa Coder`,content:b64encode(next),sha:cur.sha,...(branch?{branch}:{})};
  const d=await gh(`/repos/${owner}/${repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{method:'PUT',body:JSON.stringify(body)});
  return{commit:d.commit?.sha,url:d.content?.html_url,size:next.length};
}

// ── Device files (File System Access API; falls back to download) ─
function fsSupported(){return 'showSaveFilePicker' in window;}
/* Save content to disk. When File System Access is available we STREAM it
   (writing in chunks) so even very large content never sits fully in a Blob
   in memory; otherwise we fall back to a normal blob download. `content`
   may be a string, a Blob/File, or an async iterable of chunks. */
async function saveToDisk(name,content){
  try{
    if(fsSupported()){
      const h=await window.showSaveFilePicker({suggestedName:name||'lewa-file.txt'});
      const w=await h.createWritable();
      if(content&&typeof content.stream==='function'){          // Blob/File → pipe its stream
        await content.stream().pipeTo(w);
      }else if(content&&typeof content[Symbol.asyncIterator]==='function'){
        for await(const chunk of content)await w.write(chunk);
        await w.close();
      }else{
        // string: write in 8MB slices so huge strings don't spike memory
        const s=String(content||'');const STEP=8*1024*1024;
        for(let i=0;i<s.length;i+=STEP)await w.write(s.slice(i,i+STEP));
        await w.close();
      }
      return true;
    }
  }catch(e){if(e.name==='AbortError')return false;}
  // fallback: normal blob download
  const blob=(content instanceof Blob)?content:new Blob([content],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name||'lewa-file.txt';document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1500);
  return true;
}

    if(depth>4||files.length>=40)return;
    for await(const [name,h] of handle.entries()){
      if(files.length>=40)break;
      if(name.startsWith('.')||name==='node_modules')continue;
      const p=prefix?prefix+'/'+name:name;
      if(h.kind==='file'&&texty.test(name)){
        try{const f=await h.getFile();if(f.size<=120000)files.push({name:p,type:f.type||'text/plain',text:(await f.text()).slice(0,24000)});}catch(_){}
      }else if(h.kind==='directory'){await walk(h,p,depth+1);}
    }
  }
  toast('Reading folder…');
  await walk(dir,'',0);
  if(!files.length){toast('No readable text/code files found in that folder.');return;}
  S.pending.push(...files.map(f=>({name:f.name,type:f.type,size:f.text.length,text:f.text})));
  renderPending();
  toast(`Loaded ${files.length} file(s) from "${dir.name}" — ask about them.`);
}
