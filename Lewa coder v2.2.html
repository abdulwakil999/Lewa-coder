function mailtoCompose(to,subject,body){
  const url=`mailto:${encodeURIComponent(to||'')}?subject=${encodeURIComponent(subject||'')}&body=${encodeURIComponent(body||'')}`;
  window.location.href=url;
}
const emailjsReady=()=>{const ej=integ()?.emailjs;return !!(ej&&ej.service&&ej.template&&ej.pubkey);};
/* Send via EmailJS REST API. Template should expose the variables
   {{to_email}}, {{subject}}, {{message}} and (optionally) {{from_name}}. */
async function emailjsSendRaw(to,subject,body){
  const ej=integ().emailjs;
  // Trim hard — pasted keys/IDs often carry stray spaces or a trailing newline,
  // which is the usual cause of EmailJS "id not found" (404) errors.
  const clean=s=>String(s||'').replace(/[\s​]+/g,'').trim();
  const service=clean(ej.service),template=clean(ej.template),pubkey=clean(ej.pubkey),priv=clean(ej.privatekey);
  const payload={service_id:service,template_id:template,user_id:pubkey,
    template_params:{to_email:to,subject:subject||'',message:body||'',from_name:ej.from||'Lewa Coder'}};
  if(priv)payload.accessToken=priv; // required when the account has "Use Private Key" on
  const r=await fetch('https://api.emailjs.com/api/v1.0/email/send',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const t=(await r.text().catch(()=>'')).trim();
  if(!r.ok){
    const low=t.toLowerCase();
    let hint='';
    if(r.status===404||/account not found/.test(low))
      hint=' — 404 means an ID does not match an account. Most often the Public Key is wrong: re-copy it from EmailJS → Account → General (it is NOT your private key), and make sure the Service ID (service_...) and Template ID (template_...) are pasted with no extra spaces.';
    else if(/public key|user_id/.test(low))hint=' — check your Public Key.';
    else if(/template/.test(low))hint=' — check your Template ID.';
    else if(/service/.test(low))hint=' — check your Service ID.';
    else if(/private key|api calls|non-browser|forbidden/.test(low))hint=' — turn on "Allow EmailJS API" or paste your Private Key.';
    else if(/recipient|to_email|no recipients/.test(low))hint=' — your template\'s To field must be {{to_email}}.';
    throw new Error('EmailJS '+r.status+': '+(t||'request failed')+hint);
  }
  return 'sent';
}
async function emailSend(to,subject,body){
  if(emailjsReady())return emailjsSendRaw(to,subject,body);
  mailtoCompose(to,subject,body);   // no provider configured → open the mail app

}

// ── Web search (cached 10 min per query — no repeat fetches) ───
const _wsCache=new Map();
async function webSearch(q){
  const key=q.toLowerCase().trim();
  const hit=_wsCache.get(key);
  if(hit&&Date.now()-hit.t<600000)return hit.v;
  let out;
  try{
    const ddg=`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=1`;
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(ddg)}`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok)throw new Error('proxy error');
    const d=await r.json();
    const parts=[];
    if(d.AbstractText)parts.push(d.AbstractText);
    if(d.Answer)parts.push('Quick answer: '+d.Answer);
    (d.RelatedTopics||[]).slice(0,4).forEach(t=>t.Text&&parts.push('• '+t.Text));
    out=parts.length?`[Web results for "${q}"]:\n${parts.join('\n')}`:`[No web results for "${q}"]`;
  }catch(e){return `[Web search unavailable: ${e.message}]`;}   // errors are NOT cached
  if(_wsCache.size>60)_wsCache.clear();
  _wsCache.set(key,{t:Date.now(),v:out});
  return out;
}

      // picker isn't full of repeats. Number any genuine same-label variants.
      const byName=new Set(),labelCount={},out=[];

  if(chosen){const v=_voices.find(x=>x.name===chosen);if(v)return v;}
  const pref=['Google US English','Microsoft Aria Online (Natural) - English (United States)','Microsoft Jenny Online (Natural) - English (United States)','Samantha','Microsoft Aria','Microsoft Jenny','Google UK English Female','Microsoft Zira - English (United States)'];
  for(const n of pref){const v=_voices.find(x=>x.name===n);if(v)return v;}

   so every voice feature silently no-op'd. The Android wrapper now
   exposes a native bridge (device SpeechRecognizer + TextToSpeech);
   this layer prefers it and falls back to Web Speech in browsers. */
const androidSTT=()=>!!(window.LewaAndroid&&window.LewaAndroid.startSTT);
const androidTTS=()=>!!(window.LewaAndroid&&window.LewaAndroid.speak);

   asking the wrapper to run a foreground media service. No-op in a
   plain browser — there the tab keeps playing on its own anyway. */

        else window.LewaAndroid.startAudioService(label||'Lewa Coder audio');

}
function sttSupported(){return androidSTT()||!!(window.SpeechRecognition||window.webkitSpeechRecognition);}
/* Turn raw recognizer errors (incl. native Android "code-N") into plain English. */
function sttErrorMsg(err){
  const map={
    'code-1':'Network timed out — check your connection and try again.',
    'code-2':'No network — speech recognition needs internet for best accuracy.',
    'code-3':'Couldn’t access the microphone. Close other apps using the mic and retry.',
    'code-4':'The speech server had a problem — try again in a moment.',
    'code-5':'Recognition hiccup — please try again.',
    'code-6':'I didn’t hear anything — tap the mic and speak clearly.',
    'code-7':'I couldn’t make out the words — please say that again.',
    'code-8':'The microphone is busy — wait a second and try again.',
    'code-9':'Microphone permission is needed — allow it in Settings.',
    'no-permission':'Microphone permission is needed — allow it, then tap the mic again.',
    'unsupported':'Speech recognition isn’t available on this device.',
    'not-allowed':'Microphone permission is blocked — enable it in settings.',
  };

/* A single active-listener object drives both voice-note and call modes.
   Native results arrive via window._lewaOnSTT(kind,text) from Java. */
let _sttActive=null;
window._lewaOnSTT=function(kind,text){
  if(!_sttActive)return;
  if(kind==='partial')_sttActive.onPartial&&_sttActive.onPartial(text||'');
  else if(kind==='final')_sttActive.onFinal&&_sttActive.onFinal(text||'');
  else if(kind==='error')_sttActive.onError&&_sttActive.onError(text||'error');
  else if(kind==='end')_sttActive.onEnd&&_sttActive.onEnd();
};
/* Unified recognizer: {continuous, onPartial, onFinal, onError, onEnd}.
   Returns a handle with .stop(). Bridges to native when in the app. */
function beginRecognition(opts){
  if(androidSTT()){
    _sttActive=opts;
    try{window.LewaAndroid.startSTT(!!opts.continuous);}catch(e){opts.onError&&opts.onError(e.message);}
    return {stop(){try{window.LewaAndroid.stopSTT();}catch(_){ }},_native:true};
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){opts.onError&&opts.onError('unsupported');return {stop(){}};}
  const rec=new SR();
  rec.lang='en-US';rec.continuous=!!opts.continuous;rec.interimResults=true;
  let finalText='';
  rec.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){finalText+=e.results[i][0].transcript+' ';}
      else interim+=e.results[i][0].transcript;
    }
    if(interim&&opts.onPartial)opts.onPartial((finalText+interim).trim());
    if(finalText&&opts.onFinal)opts.onFinal(finalText.trim());
  };
  rec.onerror=ev=>opts.onError&&opts.onError(ev.error||'error');
  rec.onend=()=>opts.onEnd&&opts.onEnd();
  try{rec.start();}catch(err){opts.onError&&opts.onError(err.message);}
  return {stop(){try{rec.stop();}catch(_){ }},_rec:rec};
}

async function startSTT(){
  if(!sttSupported()){toast('Voice input needs Chrome, Edge, Chrome on Android, or the Lewa Coder app.');return;}
  // Browser (not the app) needs a secure context + mic permission.
  if(!androidSTT()){
    if(!window.isSecureContext&&location.hostname!=='localhost'){
      toast('The microphone only works on an https:// address (or localhost), not a local file. It works in the Lewa Coder app.');return;
    }

        const stream=await navigator.mediaDevices.getUserMedia({audio:true});

      toast('Microphone blocked ('+(err.name||'error')+'). Allow mic access for this site in your browser settings.');
      return;
    }

  S.recognition=beginRecognition({
    continuous:true,
    onPartial:t=>{const ta=document.getElementById('uinput');if(ta){ta.value=t;autoResize(ta);}},
    onFinal:t=>{finalText=t;const ta=document.getElementById('uinput');if(ta){ta.value=t;autoResize(ta);}},
    onError:err=>{S.listening=false;updateMic();

// ── Voice call mode (hands-free loop) ──────────────────────────
async function startCall(){

  stopSTT();
  // Browser path: pre-flight the mic so the call doesn't silently die.
  if(!androidSTT()&&!window.isSecureContext&&location.hostname!=='localhost'){
    toast('Voice calls need an https:// address (or the Lewa Coder app) — the mic is blocked on local files.');return;
  }

    catch(err){toast('Microphone blocked ('+(err.name||'error')+'). Allow mic access to start a call.');return;}
  }

  bgAudio(true,'On a call with Lewa Coder',true);   // call → needs the mic in the background
  render();callListen();

/* Conversational call engine — the mic stays open the WHOLE call so it
   feels like talking to a person:
   • BARGE-IN: if you start speaking while Lewa is talking, she stops
     instantly and listens to you.
   • You can also tap "Stop talking" to cut her off.
   • After you pause (~1s of silence) your turn is sent automatically.
   One long-lived recognizer runs throughout; onEnd restarts it. */
function callListen(){
  if(!S.call)return;
  if(S.recognition)return;           // already listening — don't stack recognizers
  S.recognition=beginRecognition({
    continuous:true,
    onPartial:t=>handleCallSpeech(t),
    onFinal:t=>handleCallSpeech(t,true),
    onError:e=>{ if(!S.call)return;
      // transient errors: drop the recognizer and respin shortly
      S.recognition=null;
      if(!['not-allowed','service-not-allowed'].includes(e))setTimeout(callListen,700);
      else{S.call.transcript='Microphone permission is needed for the call.';updateCallUI();}
    },
    onEnd:()=>{ S.recognition=null; if(S.call)setTimeout(callListen,250); }  // keep listening
  });

function handleCallSpeech(text,isFinal){
  if(!S.call)return;
  const txt=(text||'').trim();
  if(!txt)return;
  // BARGE-IN: user speaks while Lewa is talking → cut her off and listen.
  if(S.call.status==='speaking'){ stopTTS(); S.call.status='listening'; }
  if(S.call.status==='thinking')return;   // mid API call — ignore stray audio
  S.call.transcript=txt; S.call.pending=txt; updateCallUI();
  // Send the turn once the user pauses.
  clearTimeout(S.call._turnT);
  S.call._turnT=setTimeout(processCallTurn, isFinal?300:1000);

async function processCallTurn(){
  if(!S.call||S.call.status==='thinking')return;
  const text=(S.call.pending||'').trim();
  if(!text)return;
  S.call.pending='';S.call.status='thinking';updateCallUI();
  const reply=await callSendVoice(text);
  if(!S.call)return;
  if(reply){
    S.call.status='speaking';S.call.transcript=trunc(reply,420);updateCallUI();
    // Mic stays open during speech so barge-in works; onend → back to listening.
    speak(reply,()=>{ if(S.call&&S.call.status==='speaking'){S.call.status='listening';S.call.transcript='';updateCallUI();} });
  }else{ S.call.status='listening';updateCallUI(); }
  callListen();
}
/* Tap "Stop talking" — cut Lewa off so you can correct or clarify. */
function callStopSpeaking(){
  stopTTS();
  if(S.call){S.call.status='listening';S.call.transcript='';updateCallUI();}
  callListen();
}
async function callSendVoice(text){

  if(sess.title==='New Chat')sess.title='📞 '+trunc(text,40);
  saveAccts();
  try{
    S._curQuery=text;
    const sys=SYS(a.memory,buildRecall(),buildExtra());

async function playCurrentAyah(id){

/* ── Large-file handling ────────────────────────────────────────

   reference to a multi-GB file costs almost no memory — we only pay
   when we READ it. So: keep every attached file's Blob in a session
   store (never serialized to localStorage), give the MODEL only a

  if(file.size<=TEXT_HEAD+TEXT_TAIL)return{text:head,truncated:false};
  const tail=await file.slice(file.size-TEXT_TAIL).text();
  return{text:head+`\n\n… [${fmtSize(file.size-TEXT_HEAD-TEXT_TAIL)} of this file omitted from the model — ask for a specific part by line/section] …\n\n`+tail,truncated:true};

  let html=`<div style="margin:4px 0">${renderMD(cleaned)}</div>`;
  html+=media.map(x=>mediaEl(x.url,x.mime)).join('');
  return html;
}
function mediaEl(url,mime){
  const ext=(mime.split('/')[1]||'bin').split(';')[0];
  const dl=(name)=>`<div><button class="dl-link media-dl" data-name="${name}">download</button></div>`;
  if(mime.startsWith('image/'))return `<div class="out-media"><img class="att-img" src="${url}" alt="generated image"><br>${dl('lewa-image.'+ext)}</div>`;
  if(mime.startsWith('audio/'))return `<div class="out-media"><audio controls src="${url}"></audio>${dl('lewa-audio.'+ext)}</div>`;
  if(mime.startsWith('video/'))return `<div class="out-media"><video controls src="${url}" style="max-width:100%;border-radius:8px"></video>${dl('lewa-video.'+ext)}</div>`;
  return `<div class="out-media"><a class="dl-link" href="${url}" download="lewa-file.${ext}">download ${esc(ext)} file</a></div>`;

// ── PROJECT ANALYZER ──
// Automatically index uploaded project files to understand structure, dependencies, and estimate complexity.
function analyzeProject(files){
  const idx={files:[],structure:{},deps:new Set(),estimate:0};
  const langCounts={};
  files.forEach(f=>{
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    if(!langCounts[ext])langCounts[ext]=0;
    langCounts[ext]++;
    idx.files.push({name:f.name,size:f.size,ext,type:f.type});
    idx.estimate+=Math.log(f.size+1);
    // Quick parse for common dependencies
    const text=f.text||'';
    if(/import|require|from ['"]/.test(text)){
      const pkgs=text.match(/(?:import|require)\s*\(?\s*['"]([^'"]+)['"]/g)||[];
      pkgs.forEach(p=>{const m=p.match(/['"]([^'"]+)['"]/);if(m)idx.deps.add(m[1]);});
    }
  });
  idx.structure={langs:langCounts,fileCount:idx.files.length,depCount:idx.deps.size};
  idx.deps=Array.from(idx.deps);
  return idx;
}

// ── DIFF GENERATOR ──
// Create a minimal unified diff to show changes before applying.
function genDiff(original,proposed,lang='text'){
  if(!original||!proposed)return null;
  const origLines=original.split('\n');const propLines=proposed.split('\n');
  const changes={added:0,removed:0,modified:0,lines:[]};
  let i=0,j=0;
  while(i<origLines.length||j<propLines.length){
    if(origLines[i]===propLines[j]){i++;j++;continue;}
    if(i<origLines.length){changes.lines.push({type:'del',line:origLines[i],num:i+1});changes.removed++;i++;}
    if(j<propLines.length&&(i>=origLines.length||propLines[j]!==origLines[i])){
      changes.lines.push({type:'add',line:propLines[j],num:j+1});changes.added++;j++;
    }
  }
  changes.percent=origLines.length>0?Math.round(100*(changes.removed+changes.added)/origLines.length):0;
  return changes;
}

// ── SYNTAX VALIDATOR — the guardrail loop ──
// Don't just trust the model's output: every generated file is passed
// through a programmatic check before the user relies on it.
function validateSyntax(code,lang){
  const errs=[];
  const l=(lang||'').toLowerCase();
  if(!String(code||'').trim()){errs.push({type:'empty',msg:'Empty file'});return errs;}
  if(['js','javascript','jsx','mjs'].includes(l)){
    // new Function can't parse ES-module syntax — skip those to avoid false alarms.
    if(!/^\s*(import|export)\b/m.test(code)){
      try{new Function(code);}catch(e){errs.push({type:'syntax',msg:e.message.split('\n')[0].slice(0,110)});}
    }
  }else if(l==='json'){
    try{JSON.parse(code);}catch(e){errs.push({type:'syntax',msg:'Invalid JSON: '+e.message.slice(0,90)});}
  }else if(l==='html'){
    // Balance check on common container tags (self-closing-safe).
    for(const tag of ['div','span','section','main','ul','ol','table','form','script','style']){
      const open=(code.match(new RegExp('<'+tag+'(\\s|>)','gi'))||[]).length;
      const close=(code.match(new RegExp('</'+tag+'>','gi'))||[]).length;
      if(open!==close){errs.push({type:'warn',msg:`<${tag}> tags unbalanced (${open} open / ${close} close)`});break;}
    }
  }
  // Truncation guard: catches elided output that slipped through.
  if(/\/\/\s*\.\.\.|\/\*\s*\.\.\.|rest of (the )?code|for brevity|unchanged (code|content)/i.test(code))
    errs.push({type:'warn',msg:'Looks truncated/elided — ask the AI for the complete file'});
  // CSS-stub guard: models love to skip stylesheets — catch it.
  if(/\/\*\s*(your |add |insert |put )?(styles?|css)( here| go(es)? here)?\s*\*\//i.test(code))
    errs.push({type:'warn',msg:'CSS is stubbed out — ask the AI for the full stylesheet'});
  if(l==='html'&&/<style>\s*<\/style>/i.test(code))
    errs.push({type:'warn',msg:'Empty <style> tag — ask the AI for the full CSS'});
  return errs;
}
/* Cache: validating the same content twice is free. */
const _valCache=new Map();
function validateCached(code,lang){
  const key=lang+':'+code.length+':'+code.slice(0,40)+code.slice(-40);
  if(!_valCache.has(key)){
    if(_valCache.size>300)_valCache.clear();
    _valCache.set(key,validateSyntax(code,lang));
  }
  return _valCache.get(key);
}

// Choose appropriate model tier based on task type.
function pickModelTier(taskType='general'){
  const provider=S.setupProvider||'anthropic';
  const models=PROVIDERS[provider]?.models||[];
  if(S.modelStrategy==='fast')return models.find(m=>m.label?.includes('Haiku'))||models[0];
  if(S.modelStrategy==='reasoning')return models.find(m=>m.label?.includes('Opus'))||models[models.length-1];
  if(S.modelStrategy==='cheap')return models.find(m=>m.id?.includes('free'))||models[0];
  if(taskType==='explain'||taskType==='debug')return models.find(m=>m.label?.includes('Sonnet'))||models[Math.floor(models.length/2)];
  return models[models.length-1]; // default: strongest
}

function scrollBot(){

  if(S.atBottom===false&&S.stream)return;            // user scrolled up mid-stream — leave them be
  // ALWAYS instant. A smooth animation here fought layout shifts (images
  // loading, etc.) and produced the jarring up/down bounce when the chat

function autoResize(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,180)+'px';}
/* Auto-hide the header on scroll-down and reveal it on scroll-up; show the
   jump-to-latest arrow whenever we're not near the bottom of the chat. */
/* Close the mobile sidebar overlay — used when the user scrolls or
   double-taps the chat, instead of on a single (often accidental) tap. */
function closeSidebarMobile(){
  const a=acct();
  if(a&&a.cfg.sbOpen&&window.innerWidth<=700){
    a.cfg.sbOpen=false;saveAccts();
    S._noScrollBot=true;      // closing the menu must NOT re-jump the chat
    render();return true;
  }
  return false;
}
function wireScroll(){
  const el=document.getElementById('msgs');if(!el)return;
  let last=el.scrollTop,ticking=false;
  // rAF-throttled: scroll can fire dozens of times a frame on touch
  // devices — coalescing the DOM work to once per frame keeps it smooth.
  // NOTE: this handler no longer touches the sidebar — it fires for the
  // app's OWN programmatic scrolls too, which used to close the menu the
  // instant the chat opened. Sidebar closing is now bound to real user
  // gestures only (touchmove / wheel), below.
  let hdrHidden=false,accum=0,lastFlip=0;
  el.onscroll=()=>{
    if(ticking)return;
    ticking=true;
    requestAnimationFrame(()=>{
      ticking=false;
      const st=el.scrollTop;
      const nearBottom=el.scrollHeight-st-el.clientHeight<48;
      S.atBottom=nearBottom;
      const btn=document.getElementById('scroll-down');
      if(btn)btn.classList.toggle('show',!nearBottom);
      // Header hide/reveal with HYSTERESIS + cooldown so it can't flicker.
      // Accumulate movement in one direction; only flip after 64px of
      // sustained scroll and at most once every 350ms → no more shaking.
      const hdr=document.getElementById('appHeader');
      if(hdr){
        const dy=st-last;
        if((dy>0)===(accum>0))accum+=dy; else accum=dy;   // reset on direction change
        const now=Date.now();
        if(now-lastFlip>350){
          if(!hdrHidden&&accum>64&&st>80){hdr.classList.add('hidden');hdrHidden=true;accum=0;lastFlip=now;}
          else if(hdrHidden&&(accum<-64||st<40)){hdr.classList.remove('hidden');hdrHidden=false;accum=0;lastFlip=now;}
        }
      }
      last=st;
    });
  };
  // Close the mobile sidebar ONLY on a genuine user scroll gesture
  // (finger swipe or mouse wheel) — never on the app's auto-scroll.
  let sy=0;
  el.addEventListener('touchstart',e=>{sy=e.touches&&e.touches[0]?e.touches[0].clientY:0;},{passive:true});
  el.addEventListener('touchmove',e=>{
    const y=e.touches&&e.touches[0]?e.touches[0].clientY:0;
    if(Math.abs(y-sy)>24){closeSidebarMobile();sy=y;}
  },{passive:true});
  el.addEventListener('wheel',()=>closeSidebarMobile(),{passive:true});
  // Double-tap the chat area also closes it.
  let lastTap=0;
  el.addEventListener('pointerdown',()=>{
    const now=Date.now();
    if(now-lastTap<320)closeSidebarMobile();
    lastTap=now;
  });
}
function jumpToLatest(){
  const el=document.getElementById('msgs');
  if(el)el.scrollTo({top:el.scrollHeight,behavior:'smooth'});
  const hdr=document.getElementById('appHeader');if(hdr)hdr.classList.remove('hidden');
}

/* ── Splash SFX — synthesized live with WebAudio (no asset, works
   offline) and timed to the animation: whoosh on the fly-in, three
   dying boings on the bounces, a soft thud as it settles.
   NOTE: browsers mute audio until the user has interacted with the
   page at least once (autoplay policy) — if blocked, we stay silent
   rather than erroring. Inside the Android app audio is allowed. */
let _splashCtx=null;
function stopSplashSfx(){if(_splashCtx){try{_splashCtx.close();}catch(_){}_splashCtx=null;}}
function playSplashSfx(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    stopSplashSfx();
    const ctx=new AC();_splashCtx=ctx;
    const go=()=>{
      if(ctx.state!=='running'){try{ctx.close();}catch(_){ } if(_splashCtx===ctx)_splashCtx=null; return;}
      const t=ctx.currentTime;
      // Whoosh: filtered noise sweeping across the stereo field.
      const len=Math.floor(ctx.sampleRate*1.1);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
      const src=ctx.createBufferSource();src.buffer=buf;
      const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.Q.value=1.1;
      bp.frequency.setValueAtTime(420,t);
      bp.frequency.exponentialRampToValueAtTime(2600,t+.5);
      bp.frequency.exponentialRampToValueAtTime(700,t+1.05);
      const wg=ctx.createGain();
      wg.gain.setValueAtTime(0,t);wg.gain.linearRampToValueAtTime(.3,t+.12);
      wg.gain.exponentialRampToValueAtTime(.001,t+1.1);
      src.connect(bp).connect(wg).connect(ctx.destination);src.start(t);
      // Boings on each bounce impact (times match the CSS keyframes),
      // each softer and lower than the last.
      [[1.15,560,.2],[1.44,470,.15],[1.94,410,.11],[2.38,360,.07]].forEach(([at,f,v])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='triangle';
        o.frequency.setValueAtTime(f,t+at);
        o.frequency.exponentialRampToValueAtTime(f*.28,t+at+.3);
        g.gain.setValueAtTime(0,t+at);g.gain.linearRampToValueAtTime(v,t+at+.015);
        g.gain.exponentialRampToValueAtTime(.001,t+at+.34);
        o.connect(g).connect(ctx.destination);o.start(t+at);o.stop(t+at+.4);
      });
      // Settle thud as the tumble halts.
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.type='sine';
      o2.frequency.setValueAtTime(130,t+3.45);
      o2.frequency.exponentialRampToValueAtTime(55,t+3.7);
      g2.gain.setValueAtTime(0,t+3.45);g2.gain.linearRampToValueAtTime(.22,t+3.47);
      g2.gain.exponentialRampToValueAtTime(.001,t+3.78);
      o2.connect(g2).connect(ctx.destination);o2.start(t+3.45);o2.stop(t+3.85);
      setTimeout(()=>{try{ctx.close();}catch(_){}if(_splashCtx===ctx)_splashCtx=null;},4300);
    };
    (ctx.state==='suspended'?ctx.resume():Promise.resolve()).then(go).catch(()=>{try{ctx.close();}catch(_){}});
  }catch(_){}
}
function renderSplash(){
  const side=splashSide();
  setTimeout(playSplashSfx,50);
  return `<div class="splash" ondblclick="skipSplash()">
    <div class="splash-icon ${side==='R'?'roll-r':'roll-l'}">&lt;/&gt;</div>

/* Regenerate + version history controls under an assistant reply. */
function msgTools(m,i){
  const sess=curSess();if(!sess)return'';
  const isLast=i===sess.messages.length-1&&!S.loading;
  const nver=m.versions?m.versions.length:0;
  const cur=(m.vIdx==null?nver-1:m.vIdx);
  let sw='';
  if(nver>1)sw=`<span class="ver-switch" title="Switch between versions of this reply">
    <button class="msg-act" onclick="switchVersion(${i},-1)" ${cur<=0?'disabled':''} aria-label="Previous version">‹</button>
    <span class="ver-num">v${cur+1}/${nver}</span>
    <button class="msg-act" onclick="switchVersion(${i},1)" ${cur>=nver-1?'disabled':''} aria-label="Next version">›</button></span>`;
  const regen=isLast?`<button class="msg-act" onclick="regenMsg(${i})" title="Generate a fresh reply (the current one is kept)">🔁 Regenerate</button>`:'';
  const undo=isLast&&nver>1&&cur>0?`<button class="msg-act" onclick="switchVersion(${i},-1)" title="Go back to the previous reply">↩ Undo</button>`:'';
  if(!sw&&!regen)return'';
  return `<div class="msg-tools">${regen}${undo}${sw}</div>`;
}
/* Flip the visible version of a regenerated reply (compare / undo / restore). */
function switchVersion(i,dir){
  const sess=curSess();if(!sess)return;
  const m=sess.messages[i];if(!m||!m.versions)return;
  const nver=m.versions.length;
  let v=(m.vIdx==null?nver-1:m.vIdx)+dir;
  v=Math.max(0,Math.min(nver-1,v));
  m.vIdx=v;
  const ver=m.versions[v];
  m.content=ver.content;m.reasoning=ver.reasoning||'';m.meta=ver.meta||null;
  saveAccts();render();
}
/* Re-ask the model for the same turn; the old answer is preserved as a version. */
async function regenMsg(i){
  if(S.loading)return;
  const sess=curSess();if(!sess)return;
  const m=sess.messages[i];if(!m||m.role!=='assistant')return;
  // Preserve every existing variant, then re-run from the prompting user turn.
  const variants=m.versions?m.versions.slice():[{content:m.content,reasoning:m.reasoning||'',meta:m.meta||null,at:m.at||Date.now()}];
  let uIdx=i-1;while(uIdx>=0&&sess.messages[uIdx].role!=='user')uIdx--;
  if(uIdx<0)return;
  const uMsg=sess.messages[uIdx];
  sess.messages=sess.messages.slice(0,i);      // drop this answer (and anything after)
  S._pendingVersions=variants;                 // carried onto the fresh answer
  S._curQuery=uMsg.content;
  S.atBottom=true;S._noScrollBot=false;
  await generateReply(sess,{text:uMsg.content||'',content:uMsg.content||'',isVoice:!!uMsg.voice,atts:uMsg.attachments||[]});
}

    </div></div>`;
}

  </div></div>`;

/* Local, zero-token progress narration under the dots. Phases are inferred from
   the user's request — no API call is made to produce these. */
function inferPhases(text,atts){
  const t=(text||'').toLowerCase();const ph=[];
  if(atts&&atts.length)ph.push('Reading your files');
  ph.push('Thinking');
  if(/\b(image|picture|logo|illustration|draw|icon|diagram|art|render)\b/.test(t))ph.push('Generating an image');
  if(/\b(fix|bug|error|debug|crash|broken|fail)\b/.test(t))ph.push('Analyzing the problem','Tracing the issue');
  if(/\b(build|create|make|write|code|function|script|app|component|website|page|api|class)\b/.test(t))ph.push('Writing code');
  if(/\b(review|refactor|optimi[sz]e|improve|clean)\b/.test(t))ph.push('Reviewing the code');
  if(/\b(explain|how|why|what|difference|compare)\b/.test(t))ph.push('Working it out');
  ph.push('Composing the reply','Finishing up');
  return [...new Set(ph)];
}
function startStatus(phases){
  stopStatus();
  S._phases=phases&&phases.length?phases:['Thinking','Composing the reply'];
  S._pi=0;updateStatusText();
  S.statusTimer=setInterval(()=>{
    if(S._pi<S._phases.length-1){S._pi++;updateStatusText();}
  },1700);
}
function stopStatus(){if(S.statusTimer){clearInterval(S.statusTimer);S.statusTimer=null;}S._phases=null;S._pi=0;}
function updateStatusText(){const el=document.getElementById('ai-status');if(el&&S._phases)el.textContent=S._phases[S._pi]+'…';}

function copyEjTemplate(){
  const body=`Subject: {{subject}}\nTo: {{to_email}}\n\n{{message}}\n\n— sent via {{from_name}} (Lewa Coder)`;
  navigator.clipboard.writeText(body).then(()=>toast('Template body copied — paste it into your EmailJS template.'),()=>toast('Copy failed — select the fields manually.'));
}
async function sendTestEmail(){
  saveEmailJS(true);
  const to=(document.getElementById('ej-test')?.value||'').trim();
  if(!to){toast('Enter an email address to send the test to.');return;}
  if(!emailjsReady()){toast('Fill in Service ID, Template ID and Public Key first.');return;}
  toast('Sending test email…');
  try{
    await emailjsSendRaw(to,'Lewa Coder test email','This is a test from Lewa Coder. If you received this, EmailJS is set up correctly.');
    toast('Test sent to '+to+' — check the inbox.');
  }catch(e){S.integErr=e.message;render();}
}
async function connectGitHub(){
  const el=document.getElementById('gh-token');
  const t=el?el.value.trim():'';
  const i=integ();
  if(!t){i.github='';i.ghUser='';saveAccts();S.integErr='';render();return;}
  S.integErr='';toast('Verifying GitHub token…');
  try{
    const login=await ghVerify(t);
    i.github=KeyVault.enc(t);i.ghUser=login;saveAccts();
    toast('GitHub connected as '+login);render();
  }catch(e){S.integErr='GitHub: '+e.message;render();}
}
function disconnectGitHub(){const i=integ();i.github='';i.ghUser='';saveAccts();render();}
function testNotify(){if(!notify('Lewa Coder','This is a test notification.'))toast('Enable notifications first.');}
function saveEmailJS(silent){
  const i=integ();const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  i.emailjs={service:g('ej-service'),template:g('ej-template'),pubkey:g('ej-pubkey'),privatekey:g('ej-private'),from:g('ej-from')};
  saveAccts();
  if(!silent){toast(emailjsReady()?'EmailJS saved — Lewa Coder can send email now.':'Saved. Add Service ID, Template ID and Public Key to enable sending.');render();}
}

async function saveKeys(){
  const a=acct();
  const vals={};
  Object.keys(PROVIDERS).forEach(id=>{
    const el=document.getElementById('key-'+id);
    if(el)vals[id]=el.value.trim();
  });
  const btn=document.getElementById('save-keys-btn');
  if(btn){btn.disabled=true;btn.textContent='Verifying…';}
  S.keysErr='';
  for(const id of Object.keys(vals)){
    const v=vals[id];
    const old=KeyVault.dec(a.apiKeys[id]||'');
    if(v&&v!==old){
      // Only new/changed keys get a live verification call.
      try{await verifyKeyLive(id,PROVIDERS[id].models[0].id,v);}
      catch(e){
        S.keysErr=`${PROVIDERS[id].name}: ${e.message||'key failed verification'}`;
        return render();
      }
    }
    a.apiKeys[id]=KeyVault.enc(v);
  }

function downloadText(name,content){

/* ── Pure-JS ZIP writer (store method, no deps, no compression) ──
   Builds a valid .zip in the browser so multi-file projects download
   as one archive — works offline, no external library. */
function _crcTable(){if(!_crcTable.t){_crcTable.t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;_crcTable.t[n]=c>>>0;}}return _crcTable.t;}
function crcUpdate(crc,bytes){const t=_crcTable();for(let i=0;i<bytes.length;i++)crc=t[(crc^bytes[i])&0xFF]^(crc>>>8);return crc>>>0;}
/* Streaming ZIP writer (store method). When File System Access is available we
   write the archive straight to disk chunk-by-chunk, so a project of any size
   downloads without ever holding the whole .zip in memory. Falls back to an
   in-memory Blob otherwise. Each file's content may be a string or a Blob. */
async function downloadZip(zipName,files){
  const enc=new TextEncoder();
  const u16=n=>Uint8Array.of(n&0xFF,(n>>8)&0xFF);
  const u32=n=>Uint8Array.of(n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF);
  let w=null,parts=null;
  try{
    if(fsSupported()){
      try{const h=await window.showSaveFilePicker({suggestedName:zipName});w=await h.createWritable();}
      catch(e){if(e.name==='AbortError')return;}
    }
    if(!w)parts=[];
    const put=async(b)=>{if(w)await w.write(b);else parts.push(b.slice());};
    let offset=0;const central=[];const seen={};
    for(const f of files){
      let name=(f.name||'file.txt').replace(/^\/+/,'');
      if(seen[name]){seen[name]++;name=name.replace(/(\.[^.]*)?$/,'-'+seen[name]+'$1');}else seen[name]=1;
      const nameB=enc.encode(name);
      const src=(f.content instanceof Blob)?f.content:enc.encode(String(f.content||''));
      const size=(src instanceof Blob)?src.size:src.length;
      // CRC — computed in a streaming pass over the bytes (chunked for Blobs)
      let crc=0xFFFFFFFF;
      if(src instanceof Blob){const rd=src.stream().getReader();for(;;){const{done,value}=await rd.read();if(done)break;crc=crcUpdate(crc,value);}}
      else crc=crcUpdate(crc,src);
      crc=(crc^0xFFFFFFFF)>>>0;
      await put(u32(0x04034b50));await put(u16(20));await put(u16(0));await put(u16(0));await put(u16(0));await put(u16(0));
      await put(u32(crc));await put(u32(size));await put(u32(size));await put(u16(nameB.length));await put(u16(0));
      await put(nameB);
      if(src instanceof Blob){const rd=src.stream().getReader();for(;;){const{done,value}=await rd.read();if(done)break;await put(value);}}
      else await put(src);
      central.push({crc,size,nameB,offset});
      offset+=30+nameB.length+size;
    }
    let cdirSize=0;const cdirStart=offset;
    for(const c of central){
      await put(u32(0x02014b50));await put(u16(20));await put(u16(20));await put(u16(0));await put(u16(0));await put(u16(0));await put(u16(0));
      await put(u32(c.crc));await put(u32(c.size));await put(u32(c.size));await put(u16(c.nameB.length));await put(u16(0));await put(u16(0));await put(u16(0));await put(u16(0));await put(u32(0));await put(u32(c.offset));
      await put(c.nameB);cdirSize+=46+c.nameB.length;
    }
    await put(u32(0x06054b50));await put(u16(0));await put(u16(0));await put(u16(central.length));await put(u16(central.length));await put(u32(cdirSize));await put(u32(cdirStart));await put(u16(0));
    if(w){await w.close();toast(`Saved ${files.length} files to ${zipName}`);}
    else{const blob=new Blob(parts,{type:'application/zip'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=zipName;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1500);toast(`Downloaded ${files.length} files as ${zipName}`);}
  }catch(err){if(w)try{await w.close();}catch(_){}toast('Zip failed: '+err.message);}
}

/* Robust media download: data: URLs save directly; cross-origin URLs (e.g. the
   free image generator) are fetched to a blob first — and if that's blocked by
   CORS we open the image in a new tab so it can still be saved. */
async function downloadMedia(url,name){
  try{
    if(url.startsWith('data:')||url.startsWith('blob:')){
      const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
      return;
    }
    const r=await fetch(url,{mode:'cors'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const blob=await r.blob();
    const obj=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=obj;a.download=name;document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(obj);a.remove();},1500);
    toast('Saved '+name);
  }catch(err){
    window.open(url,'_blank','noopener');
    toast('Opened the image in a new tab — long-press or right-click there to save it.');
  }
}

// ── Send message ───────────────────────────────────────────────
/* PROJECT INTELLIGENCE — build a compact digest of a shared project so
   the model understands architecture, dependencies and conventions
   WITHOUT the user re-explaining. Stored on the account and injected
   into every later request (see buildExtra), so it doubles as
   long-term project memory across sessions. */
function buildProjectDigest(atts){
  const files=atts.filter(a=>a.text&&!(a.type||'').startsWith('image/'));
  if(files.length<2)return null;
  const deps=new Set();const langs={};let entry='';
  const nameList=files.map(f=>f.name);
  files.forEach(f=>{
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    langs[ext]=(langs[ext]||0)+1;
    const t=f.text||'';
    // dependency detection
    (t.match(/(?:import|require)\s*\(?\s*['"]([^'".][^'"]*)['"]/g)||[]).forEach(m=>{
      const p=(m.match(/['"]([^'"]+)['"]/)||[])[1];
      if(p&&!p.startsWith('.')&&!p.startsWith('/'))deps.add(p.split('/')[0]);
    });
    if(/package\.json$/i.test(f.name)){try{const j=JSON.parse(t);Object.keys(j.dependencies||{}).forEach(d=>deps.add(d));Object.keys(j.devDependencies||{}).forEach(d=>deps.add(d));}catch(_){}}
    if(/requirements\.txt$/i.test(f.name))t.split('\n').forEach(l=>{const p=l.split(/[=<>~ ]/)[0].trim();if(p)deps.add(p);});
    if(/\b(main|index|app|server)\.[a-z]+$/i.test(f.name)&&!entry)entry=f.name;
  });
  // convention sniffing
  const sample=files.map(f=>f.text).join('\n').slice(0,20000);
  const indent=/\n  \S/.test(sample)&&!/\n    \S/.test(sample)?'2-space':/\n    \S/.test(sample)?'4-space':/\n\t/.test(sample)?'tabs':'mixed';
  const quotes=(sample.match(/'/g)||[]).length>(sample.match(/"/g)||[]).length?'single':'double';
  const semis=/;\s*\n/.test(sample)?'semicolons used':'no semicolons';
  const langStr=Object.entries(langs).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}×${v}`).join(', ');
  return [
    `Files (${files.length}): ${nameList.slice(0,40).join(', ')}${nameList.length>40?' …':''}`,
    `Languages: ${langStr}`,
    entry?`Likely entry point: ${entry}`:'',
    deps.size?`Dependencies: ${[...deps].slice(0,40).join(', ')}`:'No external dependencies detected',
    `Style conventions: ${indent} indent, ${quotes} quotes, ${semis}`,
    `Keep new code consistent with the above; don't introduce a different style or break cross-file imports.`
  ].filter(Boolean).join('\n');
}

/* ── PROJECT INDEX + RETRIEVAL (deep understanding) ─────────────
   Store the shared project's files so LATER questions can pull in the
   RELEVANT ones automatically — without the user re-attaching them, and
   without dumping the whole project into every request (which wastes
   tokens and dilutes focus). Each file also gets a quick symbol list
   (functions/classes) so the model knows what's where. Capped so
   storage stays small. */
function extractSymbols(text){
  const s=new Set();
  const src=String(text||'');
  for(const m of src.matchAll(/(?:function|class)\s+([A-Za-z_$][\w$]*)/g))s.add(m[1]);
  for(const m of src.matchAll(/(?:const|let|var)\s+([A-Za-z_$][\w$]*)\s*=\s*(?:async\s*)?(?:\([^)]*\)|[A-Za-z_$][\w$]*)\s*=>/g))s.add(m[1]);
  for(const m of src.matchAll(/def\s+([A-Za-z_$][\w$]*)/g))s.add(m[1]);           // python
  return [...s].slice(0,40);
}
function indexProjectFiles(atts){
  const a=acct();if(!a)return;
  const files=(atts||[]).filter(f=>f.text&&!(f.type||'').startsWith('image/'));
  if(files.length<2)return;
  let budget=200000;   // ~200KB of project text kept for retrieval
  const idx=[];
  for(const f of files){
    const body=f.text.slice(0,40000);
    if(budget-body.length<0)break;
    budget-=body.length;
    idx.push({name:f.name,content:body,symbols:extractSymbols(body)});
  }
  a.projectFiles=idx;a.projectFilesAt=Date.now();
}
/* Score stored files against the query (term overlap + symbol/name hits)
   and return the most relevant few, as context. */
function retrieveRelevant(query,maxFiles=3,maxChars=24000){
  const a=acct();const idx=a&&a.projectFiles;
  if(!idx||!idx.length||!query)return'';
  const terms=[...new Set(String(query).toLowerCase().match(/[a-z0-9_]{3,}/g)||[])];
  if(!terms.length)return'';
  const scored=idx.map(f=>{
    const hay=(f.name+' '+f.symbols.join(' ')+' '+f.content).toLowerCase();
    let score=0;
    for(const t of terms){
      if(f.name.toLowerCase().includes(t))score+=5;
      if(f.symbols.some(s=>s.toLowerCase()===t))score+=4;
      const c=hay.split(t).length-1;score+=Math.min(c,6);
    }
    return{f,score};
  }).filter(x=>x.score>0).sort((x,y)=>y.score-x.score).slice(0,maxFiles);
  if(!scored.length)return'';
  let out='',used=0;
  for(const {f} of scored){
    const chunk=`--- ${f.name} ---\n${f.content}\n`;
    if(used+chunk.length>maxChars)break;
    out+=chunk;used+=chunk.length;
  }
  return out?`## Relevant project files (auto-retrieved for this question)\n${out}`:'';
}

function attachmentContext(atts){
  const parts=[];
  for(const a of atts){
    const isImg=(a.type||'').startsWith('image/');
    if(a.text){
      const note=a.truncated?' (NOTE: only the first part is shown because the file is very large — ask the user to paste the rest before rewriting it, do NOT invent or drop the missing part)':'';
      parts.push(`--- Attached file: ${a.name} (${a.type}) — this is the FULL current file${note}. If asked to change or push it, edit THIS content: keep every line intact and change only what's needed, then return the complete file. ---\n${a.text}\n--- end of ${a.name} ---`);
    }
    else if(isImg)continue; // sent to the model as a vision image
    else parts.push(`[User attached a file: ${a.name}, type ${a.type||'unknown'}, ${fmtSize(a.size||0)}. It is available to the user as a downloadable file; describe or work with it as best you can.]`);
  }
  return parts.join('\n\n');
}

/* Identity guard — a normal account claiming to be the developer is challenged;
   a wrong answer wipes that account. Returns true if the turn was handled here. */
async function identityGuard(text,sess){
  const a=acct();
  if(a.pendingChallenge){
    a.pendingChallenge=false;saveAccts();
    if(await sha256(normId(text))===_ID.chalH){
      a.devVerified=true;saveAccts();
      sess.messages.push({role:'assistant',content:'Verified — welcome back. How can I help you today?'});
      render();return true;
    }
    sess.messages.push({role:'assistant',content:'That is not the right answer. Access denied.'});
    saveAccts();render();
    setTimeout(()=>deleteOwnAccount('Identity verification failed — this account has been removed.'),1500);
    return true;
  }
  if(!S.isAdmin&&!a.isDev&&normId(text).includes(normId(devName()))){
    a.pendingChallenge=true;saveAccts();
    sess.messages.push({role:'assistant',content:'Before we go on — what is salima?'});
    render();return true;
  }
  return false;
}

/* ════════════════════════════════════════════════════════════
   AUTOPILOT — autonomous run → read errors → fix → repeat.
   No backend: we execute the model's own HTML/JS inside a
   throwaway sandboxed iframe, capture runtime errors, and feed
   them back for a fix. Loops until the code runs clean or the
   round budget is spent. Purely client-side, opt-in.
   ════════════════════════════════════════════════════════════ */
const AP_MAX_ROUNDS=3;
/* Pull the primary runnable web artifact from a reply, if any. */
function runnableArtifact(text){
  const parts=parseMsgContent(text);
  const files=parts.filter(p=>p.t==='code'&&p.file);
  // Prefer a full HTML document (self-contained → runnable as-is).
  const html=files.find(p=>/\.html?$/i.test(p.file||'')&&/<html|<!doctype/i.test(p.v))
           ||parts.find(p=>p.t==='code'&&/^html$/i.test(p.lang||'')&&/<html|<!doctype/i.test(p.v));
  if(html)return {kind:'html',code:html.v,file:html.file||'index.html'};
  // Otherwise a standalone JS snippet we can run headless.
  const js=files.find(p=>/\.m?js$/i.test(p.file||'')&&!/^\s*(import|export)\b/m.test(p.v))
         ||parts.find(p=>p.t==='code'&&/^(js|javascript)$/i.test(p.lang||'')&&!/^\s*(import|export)\b/m.test(p.v));
  if(js)return {kind:'js',code:js.v,file:js.file||'script.js'};
  return null;
}
/* Run an artifact in a sandboxed iframe; resolve with captured errors. */
function runInSandbox(art,timeoutMs=2500){
  return new Promise(resolve=>{
    const errs=[];
    const probe=`<script>
      (function(){
        var send=function(m){parent.postMessage({__lewaRun:1,msg:m},'*');};
        window.onerror=function(m,s,l,c,e){send((e&&e.stack)?String(e.stack).split('\\n')[0]:m+' (line '+l+')');return true;};
        window.addEventListener('unhandledrejection',function(ev){send('Unhandled promise rejection: '+(ev.reason&&ev.reason.message||ev.reason));});
        var oe=console.error;console.error=function(){send(Array.prototype.slice.call(arguments).join(' '));oe.apply(console,arguments);};
        window.addEventListener('load',function(){setTimeout(function(){send('__DONE__');},400);});
      })();
    <\/script>`;
    let src;
    if(art.kind==='html'){
      src=/<head[^>]*>/i.test(art.code)?art.code.replace(/<head[^>]*>/i,m=>m+probe)
         :probe+art.code;
    }else{
      src=`<!doctype html><html><head><meta charset="utf-8">${probe}</head><body><script>
        try{\n${art.code}\n}catch(e){window.onerror(e.message,'',0,0,e);}
      <\/script></body></html>`;
    }
    const iframe=document.createElement('iframe');
    iframe.style.cssText='position:fixed;left:-9999px;top:-9999px;width:1024px;height:768px;border:0';
    iframe.sandbox='allow-scripts';
    let done=false;
    const finish=()=>{if(done)return;done=true;window.removeEventListener('message',onMsg);try{iframe.remove();}catch(_){}resolve(errs);};
    const onMsg=e=>{
      if(!e.data||!e.data.__lewaRun)return;
      if(e.data.msg==='__DONE__')return finish();
      if(errs.length<8)errs.push(e.data.msg);
    };
    window.addEventListener('message',onMsg);
    iframe.srcdoc=src;
    document.body.appendChild(iframe);
    setTimeout(finish,timeoutMs);
  });
}
/* After a reply, if autopilot is on and the reply has runnable code,
   test it and auto-fix runtime errors up to AP_MAX_ROUNDS. */
async function autopilotLoop(sess,sys,ac){
  if(!S.autopilot)return;
  for(let round=1;round<=AP_MAX_ROUNDS;round++){
    if(ac.signal.aborted)return;
    const last=sess.messages[sess.messages.length-1];
    if(!last||last.role!=='assistant')return;
    const art=runnableArtifact(last.content);
    if(!art)return;                                  // nothing runnable → done
    S.apStatus={round,max:AP_MAX_ROUNDS,msg:'Running the code…'};render();
    const errs=await runInSandbox(art);
    if(!errs.length){                                // clean run
      S.apStatus={round,max:AP_MAX_ROUNDS,msg:'✓ Ran with no errors'};render();
      setTimeout(()=>{S.apStatus=null;render();},2200);
      return;
    }
    if(round===AP_MAX_ROUNDS){                        // out of rounds — report honestly
      sess.messages.push({role:'assistant',content:`⚠️ **Autopilot:** after ${round} attempts, \`${art.file}\` still reports:\n\n\`\`\`\n${errs.slice(0,5).join('\n')}\n\`\`\`\n\nThis one needs your eyes — I didn't want to keep guessing.`});
      S.apStatus=null;saveAccts();render();return;
    }
    S.apStatus={round,max:AP_MAX_ROUNDS,msg:`Found ${errs.length} error${errs.length>1?'s':''} — fixing (round ${round})…`};render();
    // Feed the real runtime errors back for a fix.
    const fixMsgs=[...sess.messages,{role:'user',content:
      `I ran ${art.file} and it threw these real runtime errors:\n\n${errs.slice(0,6).map(e=>'- '+e).join('\n')}\n\nFix the actual cause and return the COMPLETE corrected file (full contents, no elisions). Briefly say what was wrong first.`}];
    S.stream={text:'',reasoning:''};S.loading=true;render();
    const onDelta=(k,c)=>{if(!S.stream)return;if(k==='reasoning')S.stream.reasoning+=c;else S.stream.text+=c;updateStreamDOM();};
    let res;
    try{res=await streamAI(fixMsgs,sess.provider,sess.model,sys,ac.signal,onDelta);}
    catch(e){if(e.name==='AbortError'){S.apStatus=null;S.loading=false;S.stream=null;return;}
      try{res=await callAI(fixMsgs,sess.provider,sess.model,sys,ac.signal);}catch(_){S.apStatus=null;S.loading=false;S.stream=null;render();return;}}
    let r2=0;
    while(res.truncated&&r2<6&&!ac.signal.aborted){r2++;
      const soFar=S.stream.text||'';
      try{const cont=await streamAI([...fixMsgs,{role:'assistant',content:soFar},{role:'user',content:'Continue from EXACTLY where you stopped, no repeats.'}],sess.provider,sess.model,sys,ac.signal,onDelta);res.truncated=cont.truncated;}
      catch(_){break;}
    }
    const fixText=cleanModelOutput((S.stream.text||'').trim()||res.text||'');
    const u=recordUsage(sess.provider,sess.model,res.usage&&(res.usage.tin||res.usage.tout)?res.usage:{tin:200,tout:estTokens(fixText)});
    sess.messages.push({role:'assistant',content:fixText,meta:u});
    S.stream=null;S.loading=false;saveAccts();render();
    // loop continues → re-run the newly fixed artifact
  }
}

async function sendMsg(isVoice){
  const ta=document.getElementById('uinput');
  if(!ta)return;
  const text=ta.value.trim();
  if((!text&&S.pending.length===0)||S.loading)return;

  const a=acct();
  if(!a.currentId||!curSess())newSess();
  const sess=curSess();

  const atts=S.pending;S.pending=[];
  ta.value='';ta.style.height='auto';

  // Project intelligence: a 2+-file drop becomes a persistent project
  // digest (architecture, deps, conventions) — remembered across sessions.
  const digest=buildProjectDigest(atts);
  if(digest){a.projectDigest=digest;a.projectDigestAt=Date.now();indexProjectFiles(atts);saveAccts();}
  S._curQuery=text;   // used by retrieval to pick the most relevant stored files
  learnPrefs(text);   // quietly remember languages/style you tend to work in (local only)

  const fileCtx=attachmentContext(atts);
  const content=text+(fileCtx?(text?'\n\n':'')+fileCtx:'');
  sess.messages.push({role:'user',content:content||'(attached files)',attachments:atts,voice:!!isVoice});
  if(sess.title==='New Chat')sess.title=(isVoice?'🎙️ ':'')+trunc(text||atts[0]?.name||'Files',45);

  // Developer-identity challenge takes priority over calling the model.
  if(text&&await identityGuard(text,sess))return;

  // Sending always jumps to the newest message — even if you'd scrolled up
  // to read history (that used to leave the view stuck above the new turn).
  S.atBottom=true;S._noScrollBot=false;S.msgShow=Math.max(S.msgShow||30,30);
  const _hdr=document.getElementById('appHeader');if(_hdr)_hdr.classList.remove('hidden');
  await generateReply(sess,{text,content,isVoice,atts});
}

/* The AI-reply core, factored out of sendMsg so the offline auto-resend can
   reuse it: fire a queued turn the moment the connection returns. */
async function generateReply(sess,opts){
  opts=opts||{};
  const text=opts.text||'', content=(opts.content!=null?opts.content:text), isVoice=!!opts.isVoice, atts=opts.atts||[];
  const a=acct();
  S.loading=true;S.stream={text:'',reasoning:''};saveAccts();render();
  startStatus(inferPhases(text,atts));   // local narration until real thoughts arrive

  const ac=new AbortController();S.abort=ac;
  let paintT=0;
  const paint=()=>{const now=Date.now();if(now-paintT<60)return;paintT=now;updateStreamDOM();};
  const onDelta=(kind,chunk)=>{
    if(!S.stream)return;
    if(kind==='reasoning')S.stream.reasoning+=chunk; else S.stream.text+=chunk;
    if(S.statusTimer)stopStatus();   // real output replaces the fake phase text
    paint();
  };
  try{
    let apiMsgs=[...sess.messages];
    if(a.cfg.webSearch&&text){
      const ind=document.getElementById('search-ind');
      if(ind)ind.innerHTML='<div class="search-ind"><span class="search-spin">🔍</span> Searching the web…</div>';
      const results=await webSearch(text);
      if(ind)ind.innerHTML='';
      if(results&&!results.includes('[Web search unavailable')){
        const lastIdx=apiMsgs.length-1;
        apiMsgs=[...apiMsgs.slice(0,lastIdx),{...apiMsgs[lastIdx],content:apiMsgs[lastIdx].content+'\n\n'+results}];
      }
    }
    const sys=SYS(a.memory,buildRecall(),buildExtra());
    // Smart routing (Auto strategy): pick the cheapest capable model for this turn.
    const route=routeModel(text,sess.provider,sess.model);
    const useProvider=route.provider,useModel=route.model;
    let res;
    try{
      res=await streamAI(apiMsgs,useProvider,useModel,sys,ac.signal,onDelta);
    }catch(streamErr){
      if(streamErr.name==='AbortError')throw streamErr;
      // Streaming unsupported/blocked → fall back to a normal (non-streamed) call.
      res=await callAI(apiMsgs,useProvider,useModel,sys,ac.signal);
      if(res.text&&!S.stream.text){S.stream.text=res.text;updateStreamDOM();}
    }
    /* AUTO-CONTINUE: if the model hit its output limit mid-answer, seamlessly
       resume from EXACTLY where it stopped and append to the same message —
       so long files finish in one bubble instead of restarting. */
    let rounds=0;
    while(res.truncated&&rounds<6&&!ac.signal.aborted){
      rounds++;
      startStatus(['Continuing where it left off']);
      const soFar=S.stream.text||'';
      const contMsgs=[...apiMsgs,
        {role:'assistant',content:soFar},
        {role:'user',content:'Continue your previous message from EXACTLY where it stopped. Do not repeat any character already written, do not restart, do not re-explain, output no preamble — just resume the remaining content (finish the file/code) and keep going until it is complete.'}];
      let cont;
      try{cont=await streamAI(contMsgs,useProvider,useModel,sys,ac.signal,onDelta);}
      catch(e){if(e.name==='AbortError')throw e;break;}
      res.truncated=cont.truncated;
      res.usage={tin:(res.usage?.tin||0)+(cont.usage?.tin||0),tout:(res.usage?.tout||0)+(cont.usage?.tout||0)};
      stopStatus();
    }
    const finalText=cleanModelOutput((S.stream.text&&S.stream.text.trim())?S.stream.text:(res.text||''));
    const usage=res.usage&&(res.usage.tin||res.usage.tout)?res.usage:{tin:estTokens(content),tout:estTokens(finalText)};
    const u=recordUsage(useProvider,useModel,usage);
    noteModelUse(sess.provider,sess.model);   // track your favourite model (local only)
    const amsg={role:'assistant',content:finalText,meta:u,at:Date.now()};
    const reason=(res.reasoning||S.stream.reasoning||'').trim();
    if(reason)amsg.reasoning=reason;
    // Regenerate flow: keep the earlier answer(s) as switchable versions.
    if(S._pendingVersions){
      amsg.versions=S._pendingVersions.concat([{content:finalText,reasoning:reason,meta:u,at:amsg.at}]);
      amsg.vIdx=amsg.versions.length-1;
      S._pendingVersions=null;
    }
    sess.messages.push(amsg);
    S.stream=null;S.loading=false;S.abort=null;stopStatus();saveAccts();render();
    guardFakeActionClaim(sess,amsg);   // flag "I changed your repo" with no real action
    if(a.cfg.notify&&document.hidden)notify('Lewa Coder','Your reply is ready.');
    if(a.cfg.tts)speak(finalText,null,sess.messages.length-1);
    // Autonomous execution: run the code, read errors, fix, repeat.
    if(S.autopilot){const ac2=new AbortController();S.abort=ac2;await autopilotLoop(sess,sys,ac2);S.abort=null;S.loading=false;}
  }catch(err){
    S.loading=false;S.abort=null;stopStatus();
    if(err.name==='AbortError'){
      const partial=(S.stream&&S.stream.text||'').trim();
      const reason=(S.stream&&S.stream.reasoning||'').trim();
      if(partial){const m={role:'assistant',content:partial+'\n\n_(stopped)_'};if(reason)m.reasoning=reason;sess.messages.push(m);}
      S.stream=null;toast('Stopped.');saveAccts();render();
    }else if(isNetworkError(err)){
      // Offline / dropped connection → queue this turn and auto-send later.
      S.stream=null;
      queueOfflineTurn(sess);
      sess.messages.push({role:'assistant',content:'📴 **You appear to be offline.** I saved your message and will send it automatically as soon as you\'re back online. Your chats are all still here to read in the meantime.'});
      saveAccts();render();
    }else{
      S.stream=null;
      sess.messages.push({role:'assistant',content:`❌ **${err.message}**`});saveAccts();render();
    }
  }
}
function isNetworkError(err){
  if(!navigator.onLine)return true;
  const m=(err&&err.message||'').toLowerCase();
  return /failed to fetch|networkerror|network request failed|load failed|err_internet|err_network|err_connection|err_name_not_resolved|timed out|timeout/.test(m)&&!/api|429|401|403/.test(m);
}
/* Remember the pending turn so it fires when the connection returns. */
function queueOfflineTurn(sess){
  const a=acct();if(!a)return;
  a.offlineQueue=a.offlineQueue||[];
  a.offlineQueue.push({sessionId:sess.id,at:Date.now()});
  saveAccts();
}
/* Connection returned → fire every queued turn automatically, replacing the
   "📴 offline" placeholder with the real reply. */
async function resendOfflineQueue(){
  const a=acct();
  if(!a||!a.offlineQueue||!a.offlineQueue.length||!navigator.onLine||S.loading)return;
  const queue=a.offlineQueue;a.offlineQueue=[];saveAccts();
  for(const item of queue){
    if(!navigator.onLine){a.offlineQueue.push(item);saveAccts();continue;}
    const sess=(a.sessions||[]).find(s=>s.id===item.sessionId);
    if(!sess)continue;
    const last=sess.messages[sess.messages.length-1];
    if(last&&last.role==='assistant'&&/📴/.test(last.content||''))sess.messages.pop();
    const lastUser=[...sess.messages].reverse().find(m=>m.role==='user');
    if(!lastUser)continue;
    a.currentId=sess.id;saveAccts();render();
    toast('Back online — sending your queued message…');
    try{await generateReply(sess,{text:lastUser.content||'',content:lastUser.content||'',isVoice:!!lastUser.voice,atts:lastUser.attachments||[]});}
    catch(e){/* still offline → generateReply re-queues it */}
  }
}
window.addEventListener('online',()=>setTimeout(resendOfflineQueue,800));
/* Live update of the streaming bubble without a full re-render (fast). */
function updateStreamDOM(){
  if(!S.stream)return;
  const hasThinkPanel=!!document.getElementById('think-live');
  if(S.stream.reasoning&&!hasThinkPanel){render();return;} // first thoughts → switch to thinking panel
  const tb=document.getElementById('think-body');
  if(tb)tb.textContent=S.stream.reasoning;
  const st=document.getElementById('stream-text');
  if(st)st.innerHTML=S.stream.text?esc(S.stream.text).replace(/\n/g,'<br>')+'<span class="cursor">▍</span>':'<span class="cursor">▍</span>';
  if(S.stream.text){const as=document.getElementById('ai-status');if(as)as.style.display='none';}
  /* Gentle follow: only keep the view pinned to the newest text if the
     user is ALREADY at the bottom, and do it with a plain (non-smooth)
     assignment. This stops the jarring up/down thrash that happened when
     a smooth scroll animation fought a forced jump on every token. If the
     user has scrolled up to read, we leave their position alone. */
  if(S.atBottom!==false){
    const el=document.getElementById('msgs');
    if(el)el.scrollTop=el.scrollHeight;
  }
}
/* Detect a message that claims a GitHub/device write happened without any action
   actually running, and attach a visible warning so the user is not misled. */
function claimsWrite(t){
  return /\b(i(?:'ve| have)?\s*(?:just\s*)?(committed|pushed|created (?:the|a|your) (?:repo|repository|file|branch|pull request|pr)|opened (?:a )?(?:pull request|pr)|enabled (?:github )?pages|deployed|updated (?:your|the) (?:repo|repository|file)|saved .* to your (?:repo|github)))/i.test(t)
    ||/\b(successfully|now) (committed|pushed|created|deployed|opened|enabled)/i.test(t)
    ||/\bhas been (committed|pushed|created|deployed|merged|pushed to)/i.test(t);
}
function guardFakeActionClaim(sess,amsg){
  const t=amsg.content||'';
  if(!claimsWrite(t))return;
  const hasBlock=/```(?:lewa-action)/i.test(t);
  const recentResult=sess.messages.slice(-5).some(m=>m.role==='user'&&/^\[Action result\]/.test(m.content||''));
  if(hasBlock||recentResult)return;
  amsg.warn='Heads up: Lewa Coder can only change GitHub or your device by running an action card that you approve — and none ran here. This message just describes a change; it did NOT happen. Ask it to “do it as an action” (and connect GitHub in 🔗 Integrations first), then click Run.';
  saveAccts();render();
}

// ── Init ───────────────────────────────────────────────────────
/* Launched from the home-screen widget or the quick-settings tile with
   a "start talking" intent — the native side calls this once the app
   is on the coding screen. Kicks off a voice call automatically. */
window._lewaLaunchVoice=false;
window.lewaStartVoice=function(){
  window._lewaLaunchVoice=true;
  let waited=0;
  const tryStart=()=>{
    if(!window._lewaLaunchVoice)return;              // cancelled
    if(S.screen==='app'){window._lewaLaunchVoice=false;startCall();return;}
    // Still on splash / lock / auth / setup — keep waiting (up to 3 min)
    // so the call fires the moment the user finishes signing in.
    waited+=500;
    if(waited>180000){window._lewaLaunchVoice=false;return;}
    setTimeout(tryStart,500);
  };
  setTimeout(tryStart,400);
};

function init(){
  render(); // splash
  initNotifySW(); // hosted + sw.js present → device-tray notifications
  // Honor a pending voice launch once we reach the app screen.
  if(window._lewaLaunchVoice)window.lewaStartVoice();

  /* Returning from the OpenRouter "Connect" redirect? The URL carries
     ?code=… — exchange it for a real key automatically. */
  const urlCode=new URLSearchParams(window.location.search).get('code');
  if(urlCode){
    completeOpenRouterConnect(urlCode).then(key=>{
      window.history.replaceState(null,'',window.location.pathname);
      if(S.user&&S.accounts[S.user]){
        const a=S.accounts[S.user];
        a.apiKeys.openrouter=KeyVault.enc(key);
        a.cfg.provider='openrouter';a.cfg.model=OR_FREE_MODEL;
        saveAccts();refreshCredits();startLoading();
      }else{
        S.pendingORKey=key;S.setupProvider='openrouter';
        S.user=null;S.screen='auth';S.authMode='signup';render();
      }
    }).catch(e=>{
      window.history.replaceState(null,'',window.location.pathname);
      S.authErr=e.message||'Could not complete the OpenRouter connection — paste a key manually.';
      S.user=null;S.screen='auth';render();
    });
    return;
  }

  _splashTimer=setTimeout(leaveSplash,5000); // roll-in + settle (3.6s), then a beat to enjoy it
}
/* Advance past the splash (also called when the user double-taps to skip). */
let _splashTimer=null,_splashLeft=false;
function leaveSplash(){
  if(_splashLeft)return;_splashLeft=true;
  if(_splashTimer){clearTimeout(_splashTimer);_splashTimer=null;}
  stopSplashSfx();
  if(S.screen!=='splash')return;
  // Stay signed in: a remembered account goes STRAIGHT into the workspace.
  if(S.user&&S.accounts[S.user]){S.locked=false;startLoading();}
  else{S.user=null;S.screen='auth';render();}
}

/* ════════════════════════════════════════════════════════════
   SOURCE PROTECTION
   ────────────────────────────────────────────────────────────
   Deters copying/editing the page: blocks selection-copy, the
   context menu, and view-source / save / devtools shortcuts.
   Editing is unlockable only with the developer password
   (Ctrl+Shift+U), which is stored solely as a SHA-256 hash — the
   password itself never appears anywhere in this source. Typing
   and pasting inside the chat box and form fields stay fully
   usable. (No client-side scheme is unbreakable; this is a
   strong deterrent, not DRM.)
   ════════════════════════════════════════════════════════════ */
(function protectSource(){
  let unlocked=false;
  const editable=t=>t&&(t.tagName==='TEXTAREA'||t.tagName==='INPUT'||t.isContentEditable);
  const block=e=>{if(unlocked)return;if(editable(e.target))return;e.preventDefault();e.stopPropagation();};
  ['copy','cut','contextmenu','dragstart'].forEach(ev=>document.addEventListener(ev,block,{capture:true}));
  document.addEventListener('keydown',async e=>{
    const k=(e.key||'').toLowerCase();
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&k==='u'){        // unlock editing
      e.preventDefault();
      const pw=prompt('Developer password to unlock editing:');
      if(pw==null)return;
      if(await sha256(pw)===_ID.codeH){unlocked=true;toast('Editing unlocked for this session.');}
      else toast('Incorrect password.');
      return;
    }
    if(unlocked)return;
    if(e.key==='F12'){e.preventDefault();return;}
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return;} // devtools
    if((e.ctrlKey||e.metaKey)&&['s','u','p'].includes(k)){e.preventDefault();return;}             // save/view-source/print
    if((e.ctrlKey||e.metaKey)&&['c','x','a'].includes(k)&&!editable(e.target)){e.preventDefault();} // page copy/select-all
  },{capture:true});
})();

init();
