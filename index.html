function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

// Copy + download buttons on code blocks (delegated)
document.addEventListener('click',e=>{
  const cp=e.target.closest?e.target.closest('.cb-copy'):null;
  if(cp){
    const code=decodeURIComponent(cp.dataset.code||'');
    navigator.clipboard.writeText(code).then(()=>{
      cp.textContent='✓ copied';cp.classList.add('done');
      setTimeout(()=>{cp.textContent='copy';cp.classList.remove('done');},1800);
    });
    return;
  }
  const dl=e.target.closest?e.target.closest('.cb-dl'):null;
  if(dl){
    const code=decodeURIComponent(dl.dataset.code||'');
    const name=dl.dataset.name||'lewa-file.txt';
    const blob=new Blob([code],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1200);
    dl.textContent='✓ saved';setTimeout(()=>{dl.textContent='download';},1600);
    return;
  }
  // Media download (generated/produced images, audio, video). Reads the URL
  // from the sibling media element so we never duplicate huge data URLs.
  const md=e.target.closest?e.target.closest('.media-dl'):null;
  if(md){
    const wrap=md.closest('.out-media,.gen-img');
    const el=wrap&&wrap.querySelector('img,video,audio,source');
    const url=md.dataset.url||(el&&(el.currentSrc||el.src));
    if(url){md.textContent='saving…';downloadMedia(url,md.dataset.name||'lewa-file').finally(()=>{md.textContent='download';});}
    return;
  }
  const ar=e.target.closest?e.target.closest('.act-run'):null;
  if(ar){
    executeAction(decodeURIComponent(ar.dataset.action||''),ar.dataset.id,+ar.dataset.mi,ar);
    return;
  }
  // Download a single named file card
  const fd=e.target.closest?e.target.closest('.file-dl'):null;
  if(fd){
    const nm=(fd.dataset.name||'file.txt').split('/').pop();  // browsers sanitize path in single downloads
    downloadText(nm,decodeURIComponent(fd.dataset.code||''));
    fd.textContent='✓ Downloaded';setTimeout(()=>{fd.textContent='⬇ Download file';},1600);
    return;
  }
  // Download every file in a message as a .zip
  const za=e.target.closest?e.target.closest('.zip-all'):null;
  if(za){
    const files=filesInMessage(curSess()?.messages[+za.dataset.mi]);
    if(files.length){za.textContent='zipping…';downloadZip((curSess().title||'lewa-project').replace(/[^\w.-]+/g,'-').slice(0,40)+'.zip',files).finally(()=>{za.textContent='⬇ Download all as .zip';});}
    return;
  }
  // Commit a single file to GitHub
  const fcm=e.target.closest?e.target.closest('.file-commit'):null;
  if(fcm){openCommit([{name:fcm.dataset.name,content:decodeURIComponent(fcm.dataset.code||'')}]);return;}
  // Commit all files in a message to GitHub
  const zcm=e.target.closest?e.target.closest('.zip-commit'):null;
  if(zcm){openCommit(filesInMessage(curSess()?.messages[+zcm.dataset.mi]));return;}
  // Download a full attached file (streamed from its retained Blob — GB-safe)
  const adl=e.target.closest?e.target.closest('.att-dl'):null;
  if(adl){
    const blob=_blobs.get(adl.dataset.id);
    if(blob){adl.textContent='saving…';saveToDisk(adl.dataset.name||'file',blob).finally(()=>{adl.innerHTML=`📎 ${esc(adl.dataset.name)} · download`;});}
    else toast('This file was attached in an earlier session and is no longer held in memory — re-attach it to download.');
    return;
  }
});
function downloadText(name,content){
  const blob=new Blob([content],{type:'application/octet-stream'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1200);
}
/* ── Pure-JS ZIP writer (store method, no deps, no compression) ──
   Builds a valid .zip in the browser so multi-file projects download
   as one archive — works offline, no external library. */
function _crcTable(){if(!_crcTable.t){_crcTable.t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;_crcTable.t[n]=c>>>0;}}return _crcTable.t;}
function crcUpdate(crc,bytes){const t=_crcTable();for(let i=0;i<bytes.length;i++)crc=t[(crc^bytes[i])&0xFF]^(crc>>>8);return crc>>>0;}
/* Streaming ZIP writer (store method). When File System Access is available we
   write the archive straight to disk chunk-by-chunk, so a project of any size
   downloads without ever holding the whole .zip in memory. Falls back to an
   in-memory Blob otherwise. Each file's content may be a string or a Blob. */
async function downloadZip(zipName,files){
  const enc=new TextEncoder();
  const u16=n=>Uint8Array.of(n&0xFF,(n>>8)&0xFF);
  const u32=n=>Uint8Array.of(n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF);
  let w=null,parts=null;
  try{
    if(fsSupported()){
      try{const h=await window.showSaveFilePicker({suggestedName:zipName});w=await h.createWritable();}
      catch(e){if(e.name==='AbortError')return;}
    }
    if(!w)parts=[];
    const put=async(b)=>{if(w)await w.write(b);else parts.push(b.slice());};
    let offset=0;const central=[];const seen={};
    for(const f of files){
      let name=(f.name||'file.txt').replace(/^\/+/,'');
      if(seen[name]){seen[name]++;name=name.replace(/(\.[^.]*)?$/,'-'+seen[name]+'$1');}else seen[name]=1;
      const nameB=enc.encode(name);
      const src=(f.content instanceof Blob)?f.content:enc.encode(String(f.content||''));
      const size=(src instanceof Blob)?src.size:src.length;
      // CRC — computed in a streaming pass over the bytes (chunked for Blobs)
      let crc=0xFFFFFFFF;
      if(src instanceof Blob){const rd=src.stream().getReader();for(;;){const{done,value}=await rd.read();if(done)break;crc=crcUpdate(crc,value);}}
      else crc=crcUpdate(crc,src);
      crc=(crc^0xFFFFFFFF)>>>0;
      await put(u32(0x04034b50));await put(u16(20));await put(u16(0));await put(u16(0));await put(u16(0));await put(u16(0));
      await put(u32(crc));await put(u32(size));await put(u32(size));await put(u16(nameB.length));await put(u16(0));
      await put(nameB);
      if(src instanceof Blob){const rd=src.stream().getReader();for(;;){const{done,value}=await rd.read();if(done)break;await put(value);}}
      else await put(src);
      central.push({crc,size,nameB,offset});
      offset+=30+nameB.length+size;
    }
    let cdirSize=0;const cdirStart=offset;
    for(const c of central){
      await put(u32(0x02014b50));await put(u16(20));await put(u16(20));await put(u16(0));await put(u16(0));await put(u16(0));await put(u16(0));
      await put(u32(c.crc));await put(u32(c.size));await put(u32(c.size));await put(u16(c.nameB.length));await put(u16(0));await put(u16(0));await put(u16(0));await put(u16(0));await put(u32(0));await put(u32(c.offset));
      await put(c.nameB);cdirSize+=46+c.nameB.length;
    }
    await put(u32(0x06054b50));await put(u16(0));await put(u16(0));await put(u16(central.length));await put(u16(central.length));await put(u32(cdirSize));await put(u32(cdirStart));await put(u16(0));
    if(w){await w.close();toast(`Saved ${files.length} files to ${zipName}`);}
    else{const blob=new Blob(parts,{type:'application/zip'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=zipName;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1500);toast(`Downloaded ${files.length} files as ${zipName}`);}
  }catch(err){if(w)try{await w.close();}catch(_){}toast('Zip failed: '+err.message);}
}

/* ── Commit produced files straight to a GitHub repo ───────────── */
function openCommit(files){
  files=(files||[]).filter(f=>f&&f.name);
  if(!files.length){toast('No files to commit.');return;}
  if(!ghConnected()){toast('Connect GitHub in 🔗 Integrations first.');openModal('integrations');return;}
  S.commit={files,repo:'',branch:'',msg:`Add ${files.length===1?files[0].name:files.length+' files'} via Lewa Coder`,busy:false,err:'',done:[]};
  S.modal='commit';render();
  // populate repo suggestions in the background
  ghListRepos().then(rs=>{if(S.modal==='commit'){S.commit.repos=rs;render();}}).catch(()=>{});
}

async function doCommitFiles(){
  const c=S.commit;if(!c)return;
  const repo=(document.getElementById('cm-repo').value||'').trim();
  c.branch=(document.getElementById('cm-branch').value||'').trim();
  c.msg=(document.getElementById('cm-msg').value||'').trim()||'Add files via Lewa Coder';
  c.repo=repo;
  const m=repo.match(/^([^\/\s]+)\/([^\/\s]+)$/);
  if(!m){c.err='Enter the repo as owner/repo (e.g. you/my-project).';return render();}
  c.err='';c.busy=true;c.done=[];render();
  for(const f of c.files){
    try{
      const r=await ghPutFile(m[1],m[2],f.name,f.content,c.msg,c.branch||undefined);
      c.done.push({name:f.name,ok:true,url:r.url});
    }catch(e){c.done.push({name:f.name,ok:false,err:e.message});}
    render();
  }
  c.busy=false;
  const okN=c.done.filter(d=>d.ok).length;
  toast(`Committed ${okN}/${c.files.length} file(s) to ${repo}.`);
  render();
}
/* Robust media download: data: URLs save directly; cross-origin URLs (e.g. the
   free image generator) are fetched to a blob first — and if that's blocked by
   CORS we open the image in a new tab so it can still be saved. */
async function downloadMedia(url,name){
  try{
    if(url.startsWith('data:')||url.startsWith('blob:')){
      const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
      return;
    }
    const r=await fetch(url,{mode:'cors'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const blob=await r.blob();
    const obj=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=obj;a.download=name;document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(obj);a.remove();},1500);
    toast('Saved '+name);
  }catch(err){
    window.open(url,'_blank','noopener');
    toast('Opened the image in a new tab — long-press or right-click there to save it.');
  }
}

// ── Send message ───────────────────────────────────────────────
function attachmentContext(atts){
  const parts=[];
  for(const a of atts){
    const isImg=(a.type||'').startsWith('image/');
    if(a.text){
      const note=a.truncated?' (NOTE: only the first part is shown because the file is very large — ask the user to paste the rest before rewriting it, do NOT invent or drop the missing part)':'';
      parts.push(`--- Attached file: ${a.name} (${a.type}) — this is the FULL current file${note}. If asked to change or push it, edit THIS content: keep every line intact and change only what's needed, then return the complete file. ---\n${a.text}\n--- end of ${a.name} ---`);
    }
    else if(isImg)continue; // sent to the model as a vision image
    else parts.push(`[User attached a file: ${a.name}, type ${a.type||'unknown'}, ${fmtSize(a.size||0)}. It is available to the user as a downloadable file; describe or work with it as best you can.]`);
  }
  return parts.join('\n\n');
}

/* Identity guard — a normal account claiming to be the developer is challenged;
   a wrong answer wipes that account. Returns true if the turn was handled here. */
async function identityGuard(text,sess){
  const a=acct();
  if(a.pendingChallenge){
    a.pendingChallenge=false;saveAccts();
    if(await sha256(normId(text))===_ID.chalH){
      a.devVerified=true;saveAccts();
      sess.messages.push({role:'assistant',content:'Verified — welcome back. How can I help you today?'});
      render();return true;
    }
    sess.messages.push({role:'assistant',content:'That is not the right answer. Access denied.'});
    saveAccts();render();
    setTimeout(()=>deleteOwnAccount('Identity verification failed — this account has been removed.'),1500);
    return true;
  }
  if(!S.isAdmin&&!a.isDev&&normId(text).includes(normId(devName()))){
    a.pendingChallenge=true;saveAccts();
    sess.messages.push({role:'assistant',content:'Before we go on — what is salima?'});
    render();return true;
  }
  return false;
}

async function sendMsg(isVoice){
  const ta=document.getElementById('uinput');
  if(!ta)return;
  const text=ta.value.trim();
  if((!text&&S.pending.length===0)||S.loading)return;

  const a=acct();
  if(!a.currentId||!curSess())newSess();
  const sess=curSess();

  const atts=S.pending;S.pending=[];
  ta.value='';ta.style.height='auto';

  const fileCtx=attachmentContext(atts);
  const content=text+(fileCtx?(text?'\n\n':'')+fileCtx:'');
  sess.messages.push({role:'user',content:content||'(attached files)',attachments:atts,voice:!!isVoice});
  if(sess.title==='New Chat')sess.title=(isVoice?'🎙️ ':'')+trunc(text||atts[0]?.name||'Files',45);

  // Developer-identity challenge takes priority over calling the model.
  if(text&&await identityGuard(text,sess))return;

  S.loading=true;S.stream={text:'',reasoning:''};saveAccts();render();
  startStatus(inferPhases(text,atts));   // local narration until real thoughts arrive

  const ac=new AbortController();S.abort=ac;
  let paintT=0;
  const paint=()=>{const now=Date.now();if(now-paintT<60)return;paintT=now;updateStreamDOM();};
  const onDelta=(kind,chunk)=>{
    if(!S.stream)return;
    if(kind==='reasoning')S.stream.reasoning+=chunk; else S.stream.text+=chunk;
    if(S.statusTimer)stopStatus();   // real output replaces the fake phase text
    paint();
  };
  try{
    let apiMsgs=[...sess.messages];
    if(a.cfg.webSearch&&text){
      const ind=document.getElementById('search-ind');
      if(ind)ind.innerHTML='<div class="search-ind"><span class="search-spin">🔍</span> Searching the web…</div>';
      const results=await webSearch(text);
      if(ind)ind.innerHTML='';
      if(results&&!results.includes('[Web search unavailable')){
        const lastIdx=apiMsgs.length-1;
        apiMsgs=[...apiMsgs.slice(0,lastIdx),{...apiMsgs[lastIdx],content:apiMsgs[lastIdx].content+'\n\n'+results}];
      }
    }
    const sys=SYS(a.memory,buildRecall(),buildExtra());
    let res;
    try{
      res=await streamAI(apiMsgs,sess.provider,sess.model,sys,ac.signal,onDelta);
    }catch(streamErr){
      if(streamErr.name==='AbortError')throw streamErr;
      // Streaming unsupported/blocked → fall back to a normal (non-streamed) call.
      res=await callAI(apiMsgs,sess.provider,sess.model,sys,ac.signal);
      if(res.text&&!S.stream.text){S.stream.text=res.text;updateStreamDOM();}
    }
    /* AUTO-CONTINUE: if the model hit its output limit mid-answer, seamlessly
       resume from EXACTLY where it stopped and append to the same message —
       so long files finish in one bubble instead of restarting. */
    let rounds=0;
    while(res.truncated&&rounds<6&&!ac.signal.aborted){
      rounds++;
      startStatus(['Continuing where it left off']);
      const soFar=S.stream.text||'';
      const contMsgs=[...apiMsgs,
        {role:'assistant',content:soFar},
        {role:'user',content:'Continue your previous message from EXACTLY where it stopped. Do not repeat any character already written, do not restart, do not re-explain, output no preamble — just resume the remaining content (finish the file/code) and keep going until it is complete.'}];
      let cont;
      try{cont=await streamAI(contMsgs,sess.provider,sess.model,sys,ac.signal,onDelta);}
      catch(e){if(e.name==='AbortError')throw e;break;}
      res.truncated=cont.truncated;
      res.usage={tin:(res.usage?.tin||0)+(cont.usage?.tin||0),tout:(res.usage?.tout||0)+(cont.usage?.tout||0)};
      stopStatus();
    }
    const finalText=cleanModelOutput((S.stream.text&&S.stream.text.trim())?S.stream.text:(res.text||''));
    const usage=res.usage&&(res.usage.tin||res.usage.tout)?res.usage:{tin:estTokens(content),tout:estTokens(finalText)};
    const u=recordUsage(sess.provider,sess.model,usage);
    const amsg={role:'assistant',content:finalText,meta:u};
    const reason=(res.reasoning||S.stream.reasoning||'').trim();
    if(reason)amsg.reasoning=reason;
    sess.messages.push(amsg);
    S.stream=null;S.loading=false;S.abort=null;stopStatus();saveAccts();render();
    guardFakeActionClaim(sess,amsg);   // flag "I changed your repo" with no real action
    if(a.cfg.notify&&document.hidden)notify('Lewa Coder','Your reply is ready.');
    if(a.cfg.tts)speak(finalText,null,sess.messages.length-1);
  }catch(err){
    S.loading=false;S.abort=null;stopStatus();
    if(err.name==='AbortError'){
      const partial=(S.stream&&S.stream.text||'').trim();
      const reason=(S.stream&&S.stream.reasoning||'').trim();
      if(partial){const m={role:'assistant',content:partial+'\n\n_(stopped)_'};if(reason)m.reasoning=reason;sess.messages.push(m);}
      S.stream=null;toast('Stopped.');saveAccts();render();
    }else{
      S.stream=null;
      sess.messages.push({role:'assistant',content:`❌ **Error:** ${err.message}`});saveAccts();render();
    }
  }
}
/* Live update of the streaming bubble without a full re-render (fast). */
function updateStreamDOM(){
  if(!S.stream)return;
  const hasThinkPanel=!!document.getElementById('think-live');
  if(S.stream.reasoning&&!hasThinkPanel){render();return;} // first thoughts → switch to thinking panel
  const tb=document.getElementById('think-body');
  if(tb)tb.textContent=S.stream.reasoning;
  const st=document.getElementById('stream-text');
  if(st)st.innerHTML=S.stream.text?esc(S.stream.text).replace(/\n/g,'<br>')+'<span class="cursor">▍</span>':'<span class="cursor">▍</span>';
  if(S.stream.text){const as=document.getElementById('ai-status');if(as)as.style.display='none';}
  const el=document.getElementById('msgs');if(el)el.scrollTop=el.scrollHeight;
}
/* Detect a message that claims a GitHub/device write happened without any action
   actually running, and attach a visible warning so the user is not misled. */
function claimsWrite(t){
  return /\b(i(?:'ve| have)?\s*(?:just\s*)?(committed|pushed|created (?:the|a|your) (?:repo|repository|file|branch|pull request|pr)|opened (?:a )?(?:pull request|pr)|enabled (?:github )?pages|deployed|updated (?:your|the) (?:repo|repository|file)|saved .* to your (?:repo|github)))/i.test(t)
    ||/\b(successfully|now) (committed|pushed|created|deployed|opened|enabled)/i.test(t)
    ||/\bhas been (committed|pushed|created|deployed|merged|pushed to)/i.test(t);
}
function guardFakeActionClaim(sess,amsg){
  const t=amsg.content||'';
  if(!claimsWrite(t))return;
  const hasBlock=/```(?:lewa-action)/i.test(t);
  const recentResult=sess.messages.slice(-5).some(m=>m.role==='user'&&/^\[Action result\]/.test(m.content||''));
  if(hasBlock||recentResult)return;
  amsg.warn='Heads up: Lewa Coder can only change GitHub or your device by running an action card that you approve — and none ran here. This message just describes a change; it did NOT happen. Ask it to “do it as an action” (and connect GitHub in 🔗 Integrations first), then click Run.';
  saveAccts();render();
}

// ── Init ───────────────────────────────────────────────────────
function init(){
  render(); // splash

  /* Returning from the OpenRouter "Connect" redirect? The URL carries
     ?code=… — exchange it for a real key automatically. */
  const urlCode=new URLSearchParams(window.location.search).get('code');
  if(urlCode){
    completeOpenRouterConnect(urlCode).then(key=>{
      window.history.replaceState(null,'',window.location.pathname);
      if(S.user&&S.accounts[S.user]){
        const a=S.accounts[S.user];
        a.apiKeys.openrouter=KeyVault.enc(key);
        a.cfg.provider='openrouter';a.cfg.model=OR_FREE_MODEL;
        saveAccts();refreshCredits();startLoading();
      }else{
        S.pendingORKey=key;S.setupProvider='openrouter';
        S.user=null;S.screen='auth';S.authMode='signup';render();
      }
    }).catch(e=>{
      window.history.replaceState(null,'',window.location.pathname);
      S.authErr=e.message||'Could not complete the OpenRouter connection — paste a key manually.';
      S.user=null;S.screen='auth';render();
    });
    return;
  }

  setTimeout(()=>{
    // Account stays remembered, but for privacy we DON'T auto-enter it —
    // the returning user must unlock with their password first.
    if(S.user&&S.accounts[S.user]){S.locked=true;S.screen='lock';render();}
    else{S.user=null;S.screen='auth';render();}
  },2200);
}

/* ════════════════════════════════════════════════════════════
   SOURCE PROTECTION
   ────────────────────────────────────────────────────────────
   Deters copying/editing the page: blocks selection-copy, the
   context menu, and view-source / save / devtools shortcuts.
   Editing is unlockable only with the developer password
   (Ctrl+Shift+U), which is stored solely as a SHA-256 hash — the
   password itself never appears anywhere in this source. Typing
   and pasting inside the chat box and form fields stay fully
   usable. (No client-side scheme is unbreakable; this is a
   strong deterrent, not DRM.)
   ════════════════════════════════════════════════════════════ */
(function protectSource(){
  let unlocked=false;
  const editable=t=>t&&(t.tagName==='TEXTAREA'||t.tagName==='INPUT'||t.isContentEditable);
  const block=e=>{if(unlocked)return;if(editable(e.target))return;e.preventDefault();e.stopPropagation();};
  ['copy','cut','contextmenu','dragstart'].forEach(ev=>document.addEventListener(ev,block,{capture:true}));
  document.addEventListener('keydown',async e=>{
    const k=(e.key||'').toLowerCase();
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&k==='u'){        // unlock editing
      e.preventDefault();
      const pw=prompt('Developer password to unlock editing:');
      if(pw==null)return;
      if(await sha256(pw)===_ID.codeH){unlocked=true;toast('Editing unlocked for this session.');}
      else toast('Incorrect password.');
      return;
    }
    if(unlocked)return;
    if(e.key==='F12'){e.preventDefault();return;}
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return;} // devtools
    if((e.ctrlKey||e.metaKey)&&['s','u','p'].includes(k)){e.preventDefault();return;}             // save/view-source/print
    if((e.ctrlKey||e.metaKey)&&['c','x','a'].includes(k)&&!editable(e.target)){e.preventDefault();} // page copy/select-all
  },{capture:true});
})();

init();
</script>
