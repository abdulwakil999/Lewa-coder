<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Lewa Coder</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0a'/><text x='50' y='68' font-size='46' text-anchor='middle' fill='%23f59e0b' font-family='monospace' font-weight='bold'>&lt;/&gt;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;color:#d4d4d4;font-family:'IBM Plex Sans',sans-serif;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
::selection{background:#f59e0b33}
button{font-family:inherit;touch-action:manipulation}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes splashIn{0%{opacity:0;transform:scale(.6)}60%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 5px #f59e0b14}50%{text-shadow:0 0 9px #f59e0b22}}
@keyframes dotBounce{0%,100%{transform:translateY(0) scale(.85);opacity:.5}50%{transform:translateY(-14px) scale(1.15);opacity:1}}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 #f59e0b1f}100%{box-shadow:0 0 0 24px #f59e0b00}}

/* ── Layout ── */
#root{height:100vh;height:100dvh;display:flex;flex-direction:column}
.app{display:flex;height:100vh;height:100dvh;overflow:hidden;position:relative}

/* ── Splash ── */
.splash{height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(ellipse at center,#141005 0%,#0a0a0a 65%)}
.splash-icon{font-family:'JetBrains Mono',monospace;font-size:74px;font-weight:700;color:#f59e0b;letter-spacing:-4px;animation:splashIn .9s ease,glowPulse 2.4s ease-in-out infinite}
.splash-name{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:#f5f5f5;letter-spacing:5px;animation:fadeUp 1s ease .3s both}
.splash-tag{font-size:12px;color:#555;font-family:'JetBrains Mono',monospace;letter-spacing:1px;animation:fadeUp 1s ease .6s both}

/* ── Auth / Setup ── */
.gate{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;padding:20px;overflow-y:auto}
.card{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:14px;padding:28px 26px;width:100%;max-width:440px;animation:fadeUp .45s ease}
.card-top{text-align:center;margin-bottom:24px}
.card-icon{font-size:38px;font-family:'JetBrains Mono',monospace;color:#f59e0b;font-weight:700;letter-spacing:-2px;margin-bottom:10px}
.card-name{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;color:#f5f5f5;margin-bottom:4px;letter-spacing:2px}
.card-sub{font-size:13px;color:#555}
.fg{margin-bottom:14px}
.flabel{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#666;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.finput{width:100%;background:#080808;border:1px solid #1f1f1f;border-radius:7px;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 12px;outline:none;transition:border-color .15s}
.finput:focus{border-color:#f59e0b55}
select.finput{appearance:none;-webkit-appearance:none;cursor:pointer}
textarea.finput{min-height:90px;resize:vertical;line-height:1.6;font-family:'IBM Plex Sans',sans-serif;font-size:13px}
.fhint{font-size:11px;color:#3a3a3a;margin-top:4px;line-height:1.5}
.krow{display:flex;gap:7px}
.krow .finput{flex:1;min-width:0}
.btn-p{width:100%;background:#f59e0b;border:none;border-radius:8px;color:#0a0a0a;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;padding:13px 0;margin-top:6px;transition:opacity .2s}
.btn-p:hover{opacity:.85}
.btn-s{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:6px;color:#777;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 13px;transition:all .15s}
.btn-s:hover{border-color:#2a2a2a;color:#aaa}
.gate-err{color:#f87171;font-size:12px;font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:10px;min-height:15px}
.switch-link{font-size:12px;color:#555;text-align:center;margin-top:16px;font-family:'JetBrains Mono',monospace}
.switch-link span{color:#f59e0b;cursor:pointer;text-decoration:underline}
.auth-tabs{display:flex;gap:6px;margin-bottom:20px}
.auth-tab{flex:1;background:#080808;border:1px solid #1f1f1f;border-radius:7px;color:#555;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 0;transition:all .15s}
.auth-tab.on{border-color:#f59e0b66;color:#f59e0b;background:#110e00}
.p-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* ── Loading dots ── */
.loadwrap{height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;background:radial-gradient(ellipse at center,#141005 0%,#0a0a0a 65%)}
.load-icon{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:700;color:#f59e0b;letter-spacing:-2px;animation:glowPulse 2s ease-in-out infinite}
.polka{display:flex;gap:16px;align-items:center}
.pdot{width:16px;height:16px;border-radius:50%;animation:dotBounce 1.1s ease-in-out infinite}
.load-msg{font-family:'JetBrains Mono',monospace;font-size:11px;color:#666;letter-spacing:2px;animation:pulse 1.6s ease-in-out infinite}

/* ── Sidebar ── */
.sidebar{width:238px;min-width:238px;background:#070707;border-right:1px solid #141414;display:flex;flex-direction:column;overflow:hidden;transition:transform .25s,width .2s,min-width .2s;z-index:40}
.sidebar.closed{width:0;min-width:0;border-right:none}
.sb-backdrop{display:none}
.sb-head{padding:12px 10px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:6px}
.sb-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;letter-spacing:1px;flex:1}
.new-chat{background:#111;border:1px solid #1f1f1f;border-radius:5px;color:#888;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;transition:all .15s;white-space:nowrap}
.new-chat:hover{border-color:#f59e0b44;color:#f59e0b}
.sessions{flex:1;overflow-y:auto;padding:6px}
.session-item{padding:9px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:6px;transition:all .15s;border:1px solid transparent}
.session-item:hover{background:#111;border-color:#1a1a1a}
.session-item.active{background:#110e00;border-color:#f59e0b33;border-left:2px solid #f59e0b}
.session-label{font-size:12px;color:#666;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item.active .session-label{color:#ccc}
.session-del{background:none;border:none;color:#333;cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px;line-height:1;flex-shrink:0}
.session-del:hover{color:#f87171}
.no-sessions{padding:14px 10px;color:#2a2a2a;font-size:11px;font-family:'JetBrains Mono',monospace;text-align:center}
.sb-foot{border-top:1px solid #141414;padding:10px;display:flex;align-items:center;gap:8px}
.sb-user{flex:1;min-width:0}
.sb-uname{font-size:12px;color:#bbb;font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-plan{font-size:10px;color:#444;font-family:'JetBrains Mono',monospace}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:#f59e0b;color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.logout-btn{background:none;border:1px solid #1a1a1a;border-radius:5px;color:#555;cursor:pointer;font-size:11px;padding:5px 8px;font-family:'JetBrains Mono',monospace}
.logout-btn:hover{border-color:#f8717155;color:#f87171}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.header{border-bottom:1px solid #141414;padding:0 12px;height:50px;display:flex;align-items:center;gap:7px;background:#0a0a0a;flex-shrink:0;overflow-x:auto;transition:height .25s ease,opacity .2s ease,transform .25s ease}
.header.hidden{height:0;padding-top:0;padding-bottom:0;opacity:0;transform:translateY(-8px);overflow:hidden;border-bottom-color:transparent}
.header::-webkit-scrollbar{height:0}
.sb-toggle{background:none;border:none;color:#555;cursor:pointer;padding:6px;font-size:17px;line-height:1;flex-shrink:0}
.sb-toggle:hover{color:#999}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;box-shadow:0 0 3px #f59e0b33;animation:pulse 3s ease-in-out infinite}
.logo-name{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#f5f5f5;letter-spacing:1px}
.h-gap{flex:1}
.h-select{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:5px;color:#999;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 8px;cursor:pointer;outline:none;max-width:190px;text-overflow:ellipsis}
.h-select:hover{border-color:#2a2a2a}
.h-btn{background:none;border:1px solid #1a1a1a;border-radius:5px;color:#555;cursor:pointer;padding:6px 9px;font-size:13px;line-height:1;transition:all .15s;white-space:nowrap;flex-shrink:0}
.h-btn:hover{border-color:#2a2a2a;color:#888}
.h-btn.on{border-color:#f59e0b66;color:#f59e0b;background:#110e00}
.usage-pill{font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b;background:#110e00;border:1px solid #f59e0b33;border-radius:20px;padding:4px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* ── Messages ── */
.msgs{flex:1;overflow-y:auto;padding:20px 14px;-webkit-overflow-scrolling:touch}
.msgs-inner{max-width:820px;margin:0 auto}
.empty{text-align:center;padding-top:60px;animation:fadeUp .5s ease}
.empty-icon{font-size:36px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;color:#f59e0b;letter-spacing:-2px}
.empty-title{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#f0f0f0;margin-bottom:6px}
.empty-sub{color:#444;font-size:13px;margin-bottom:28px}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.chip{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:6px;color:#666;cursor:pointer;font-size:12px;padding:8px 13px;transition:all .2s}
.chip:hover{border-color:#f59e0b66;color:#f59e0b;background:#110e00}
.msg{display:flex;gap:11px;margin-bottom:18px;animation:fadeUp .3s ease}
.msg.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.avatar.user{background:#f59e0b;color:#0a0a0a}
.avatar.ai{background:#111;color:#f59e0b;border:1px solid #222}
.bubble{max-width:80%;padding:11px 14px;font-size:14px;line-height:1.75;color:#ccc;word-break:break-word;min-width:0}
.bubble.user{background:#110e00;border:1px solid #2a1c00;border-radius:12px 2px 12px 12px}
.bubble.ai{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:2px 12px 12px 12px}
.bubble strong{color:#e8e8e8}
.bubble em{color:#a0a0a0}
.bubble .ic{background:#1a1a1a;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#f59e0b;white-space:nowrap}
.bubble .lnk{color:#60a5fa;text-decoration:none}
.msg-meta{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:#333;margin-top:7px;letter-spacing:.3px}
.att-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.att-img{max-width:180px;max-height:140px;border-radius:8px;border:1px solid #2a2a2a;display:block}
.att-file{display:inline-flex;align-items:center;gap:6px;background:#151515;border:1px solid #262626;border-radius:6px;padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#999}
.voice-tag{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b;margin-bottom:5px}

/* ── Code block ── */
.cb{margin:10px 0;border-radius:8px;overflow:hidden;border:1px solid #222;max-width:100%}
.cb-head{display:flex;justify-content:space-between;align-items:center;background:#111;padding:5px 12px;border-bottom:1px solid #1f1f1f}
.cb-lang{font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b;letter-spacing:1px;text-transform:uppercase}
.cb-copy{background:none;border:1px solid #2a2a2a;border-radius:4px;color:#555;cursor:pointer;font-size:11px;padding:2px 8px;font-family:'JetBrains Mono',monospace}
.cb-copy:hover{border-color:#444;color:#999}
.cb-copy.done{color:#4ade80;border-color:#4ade8066}
pre{margin:0;padding:13px 15px;background:#080808;overflow-x:auto;font-size:12.5px;line-height:1.75;font-family:'JetBrains Mono',monospace;color:#e2e8f0;white-space:pre-wrap;word-break:break-word}

/* ── Typing ── */
.typing{display:flex;gap:11px;margin-bottom:18px;align-items:flex-start}
.dots{display:flex;gap:6px;align-items:center;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:2px 12px 12px 12px;padding:14px 16px}
.dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.search-ind{display:flex;align-items:center;gap:7px;padding:6px 12px;background:#0d0d00;border:1px solid #2a1f00;border-radius:6px;margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#f59e0b;animation:fadeIn .3s}
.search-spin{animation:pulse 1s ease-in-out infinite}

/* ── Input ── */
.input-wrap{border-top:1px solid #141414;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:#0a0a0a;flex-shrink:0}
.input-inner{max-width:820px;margin:0 auto}
.pending-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.pend{display:inline-flex;align-items:center;gap:6px;background:#151515;border:1px solid #2a2a2a;border-radius:6px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#aaa;max-width:220px}
.pend img{width:26px;height:26px;object-fit:cover;border-radius:4px}
.pend span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pend button{background:none;border:none;color:#666;cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.pend button:hover{color:#f87171}
.input-box{display:flex;gap:8px;align-items:flex-end;background:#0d0d0d;border:1px solid #1f1f1f;border-radius:12px;padding:10px 12px;transition:border-color .2s}
.input-box:focus-within{border-color:#f59e0b44}
#uinput{flex:1;background:none;border:none;color:#e2e8f0;font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.6;max-height:180px;overflow:auto;resize:none;outline:none;min-width:0}
#uinput::placeholder{color:#333}
.input-btns{display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
.ibtn{background:none;border:1px solid #1f1f1f;border-radius:7px;color:#555;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
.ibtn:hover{border-color:#333;color:#999}
.ibtn.listening{border-color:#f59e0b;color:#f59e0b;animation:pulse 1s ease-in-out infinite}
.send-btn{background:#f59e0b;border:none;border-radius:7px;color:#0a0a0a;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:disabled{background:#1a1a1a;cursor:not-allowed}
.hint{text-align:center;font-size:10px;color:#222;margin-top:6px;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}

/* ── Call overlay ── */
.call-ov{position:fixed;inset:0;background:rgba(5,5,5,.96);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;animation:fadeIn .3s}
.call-circle{width:130px;height:130px;border-radius:50%;background:#110e00;border:2px solid #f59e0b;display:flex;align-items:center;justify-content:center;font-size:46px;animation:ringPulse 1.6s ease-out infinite}
.call-status{font-family:'JetBrains Mono',monospace;font-size:14px;color:#f59e0b;letter-spacing:2px;text-transform:uppercase}
.call-transcript{max-width:520px;width:88%;text-align:center;color:#888;font-size:14px;line-height:1.7;min-height:44px;max-height:32vh;overflow-y:auto;padding:0 10px}
.call-end{background:#dc2626;border:none;border-radius:50%;width:62px;height:62px;color:#fff;font-size:24px;cursor:pointer;transition:transform .15s}
.call-end:hover{transform:scale(1.08)}
.call-hint{font-size:11px;color:#444;font-family:'JetBrains Mono',monospace;max-width:420px;text-align:center;padding:0 16px}
.call-min{position:absolute;top:16px;left:16px;background:none;border:1px solid #2a2a2a;border-radius:20px;color:#888;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px}
.call-min:hover{border-color:#f59e0b66;color:#f59e0b}
.call-pill{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;align-items:center;gap:9px;background:#141005;border:1px solid #f59e0b55;border-radius:24px;padding:7px 9px 7px 13px;z-index:120;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.5);max-width:90%}
.call-pill-dot{font-size:15px;animation:pulse 1.4s ease-in-out infinite}
.call-pill-txt{display:flex;flex-direction:column;min-width:0;font-family:'JetBrains Mono',monospace}
.call-pill-txt b{font-size:11px;color:#f59e0b}
.call-pill-sub{font-size:10px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.call-pill-end{background:#dc2626;border:none;border-radius:50%;width:24px;height:24px;color:#fff;font-size:12px;cursor:pointer;flex-shrink:0}

/* ── Qur'an player ── */
.quran{margin:10px 0;border:1px solid #1c2a1c;background:#080b08;border-radius:12px;overflow:hidden}
.quran-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;background:#0c130c;border-bottom:1px solid #16241a;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#7dd39b;font-weight:600}
.quran-meta{padding:6px 14px 0;font-family:'JetBrains Mono',monospace;font-size:10px;color:#4a6a52}
.quran-controls{display:flex;align-items:center;gap:8px;padding:10px 14px}
.quran-btn{background:#0e1a12;border:1px solid #24422e;border-radius:7px;color:#8fe0a8;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 13px;transition:all .15s}
.quran-btn:hover{border-color:#3ea56a;color:#b6f0c6}
.quran-btn.primary{background:#1c7d47;border-color:#1c7d47;color:#eafff0;font-weight:700}
.quran-btn.primary:hover{filter:brightness(1.08)}
.quran-prog{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#4a6a52}
.quran-bism{text-align:center;font-size:22px;color:#cfe9d6;padding:10px 14px 2px;line-height:1.9;font-family:'Amiri','Scheherazade New','Traditional Arabic',serif}
.quran-text{padding:6px 16px 14px;direction:rtl;text-align:right;font-size:23px;line-height:2.5;color:#e8f3ea;font-family:'Amiri','Scheherazade New','Traditional Arabic',serif;max-height:60vh;overflow-y:auto}
.quran-ayah{cursor:pointer;border-radius:6px;padding:1px 2px;transition:background .2s}
.quran-ayah:hover{background:#12261a}
.quran-ayah.on{background:#1c7d4733;box-shadow:0 0 0 1px #1c7d4766}
.quran-num{color:#5ca877;font-size:16px;font-family:'JetBrains Mono',monospace}
.quran-note{font-size:10.5px;color:#3f5a47;line-height:1.55;padding:2px 14px 12px}
.quran-err{color:#f87171;font-family:'JetBrains Mono',monospace;font-size:12px;padding:12px 14px}

/* ── Modals ── */

/* ── File cards (downloadable files) ── */
.filecard{margin:10px 0;border:1px solid #242424;border-radius:10px;overflow:hidden;background:#0b0b0b;max-width:100%}
.fc-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#111;border-bottom:1px solid #1f1f1f}
.fc-icon{font-size:15px;flex-shrink:0}
.fc-name{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#f0f0f0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-meta{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:#555;white-space:nowrap;flex-shrink:0}
.fc-body{max-height:340px;overflow:auto;margin:0}
.fc-actions{display:flex;flex-wrap:wrap;gap:7px;padding:9px 12px;border-top:1px solid #1a1a1a;background:#0d0d0d}
.fc-btn{background:#111;border:1px solid #262626;border-radius:6px;color:#aaa;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 11px;transition:all .15s}
.fc-btn:hover{border-color:#f59e0b55;color:#f59e0b}
.fc-btn.primary{background:#f59e0b;border-color:#f59e0b;color:#0a0a0a;font-weight:700}

.zipbar{display:flex;flex-wrap:wrap;align-items:center;gap:9px;background:#0e0c06;border:1px solid #2a220c;border-radius:9px;padding:9px 12px;margin:4px 0 12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#c9a84f}
.zipbar span{flex:1;min-width:120px}
.zip-all,.zip-commit{background:#f59e0b;border:none;border-radius:6px;color:#0a0a0a;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 11px;cursor:pointer}
.zip-commit{background:#111;border:1px solid #f59e0b55;color:#f59e0b}
.zip-all:hover{filter:brightness(1.06)}
.cm-files{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;max-height:150px;overflow:auto}
.cm-file{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#bbb;background:#080808;border:1px solid #171717;border-radius:6px;padding:6px 10px;display:flex;justify-content:space-between}
.cm-file span{color:#555}

.cm-done .err{color:#f87171}

/* ── Skeleton loaders & pagination ── */
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{background:linear-gradient(100deg,#121212 30%,#1d1d1d 50%,#121212 70%);background-size:200% 100%;animation:skel 1.2s linear infinite;border-radius:7px}
.skel-row{height:38px;margin-bottom:5px}
.skel-line{height:13px;max-width:220px;margin:4px 0}
.load-more{display:block;width:100%;background:#0d0d0d;border:1px dashed #262626;border-radius:8px;color:#666;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 0;margin:4px 0 14px;transition:all .15s}
.load-more:hover{border-color:#f59e0b44;color:#f59e0b}

/* ── Live thoughts (Claude-style) ── */
.think{margin:0 0 10px;border:1px solid #1c1c1c;border-left:2px solid #f59e0b55;background:#0b0b0b;border-radius:8px;overflow:hidden}

.think-head{display:flex;align-items:center;gap:7px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#f59e0b;cursor:pointer;user-select:none}
.think.done .think-head{color:#7a6a3a}
.think-ico{font-size:12px}
.think-caret{margin-left:auto;color:#555}
.think-live-dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;margin-left:6px;animation:pulse 1s ease-in-out infinite}
.think-body{padding:0 13px 11px;font-size:12.5px;line-height:1.65;color:#8f8f8f;font-family:'IBM Plex Sans',sans-serif;white-space:pre-wrap;max-height:280px;overflow-y:auto;word-break:break-word}

.cursor{display:inline-block;color:#f59e0b;animation:blink 1s steps(1) infinite;font-weight:700}

.msg-warn{margin-top:9px;background:#1a1205;border:1px solid #3a2c0a;border-radius:7px;padding:9px 11px;font-size:12px;line-height:1.55;color:#e0b355}

.int-block{padding:14px 0;border-bottom:1px solid #161616}
.int-title{display:flex;align-items:center;gap:7px;font-size:13.5px;color:#e8e8e8;font-weight:600;margin-bottom:5px}
.int-ok{font-family:'JetBrains Mono',monospace;font-size:10px;color:#4ade80;border:1px solid #4ade8044;border-radius:4px;padding:1px 6px;font-weight:400}
.int-sub{font-size:11.5px;color:#666;line-height:1.55;margin-bottom:9px}
.int-sub code{background:#181818;padding:0 4px;border-radius:3px;color:#aaa}
.int-warn{font-family:'JetBrains Mono',monospace;font-size:10px;color:#888;border:1px solid #333;border-radius:4px;padding:1px 6px;font-weight:400}
.ej-help-toggle{background:none;border:none;color:#f59e0b;font-family:'JetBrains Mono',monospace;font-size:11.5px;cursor:pointer;padding:2px 0;margin-bottom:8px;text-align:left}

.ej-copy:hover{border-color:#f59e0b55;color:#f59e0b}

/* ── Copy/edit protection ── */
body{-webkit-user-select:none;user-select:none}
#uinput,.finput,input,textarea,pre,.bubble{-webkit-user-select:text;user-select:text}

/* ── Diff viewer ── */
.diff-viewer{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;margin:10px 0;overflow:hidden}
.diff-head{background:#111;padding:10px 14px;border-bottom:1px solid #1a1a1a;font-family:'JetBrains Mono',monospace;font-size:12px;color:#f59e0b}
.diff-stats{padding:6px 14px;background:#080808;color:#666;font-size:11px;font-family:'JetBrains Mono',monospace}
.diff-lines{margin:0;padding:10px 14px;background:#080808;font-size:11px;max-height:300px;overflow-y:auto}
.diff-del{display:block;color:#f87171;background:#3d1c1c33;margin:2px 0;padding:2px 4px}
.diff-add{display:block;color:#4ade80;background:#1c3d1c33;margin:2px 0;padding:2px 4px}
.diff-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #1a1a1a;background:#0a0a0a}
.diff-actions .btn-s{flex:1}.diff-actions .btn-p{flex:1}

/* ── Model picker ── */
.model-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.model-btn{background:#080808;border:1px solid #1a1a1a;border-radius:6px;color:#666;cursor:pointer;padding:10px 6px;font-size:11px;font-family:'JetBrains Mono',monospace;transition:all .2s}
.model-btn:hover{border-color:#f59e0b44;color:#f59e0b}
.model-btn.on{border-color:#f59e0b;background:#110e00;color:#f59e0b}
.model-grid .modal-hint{margin-top:8px}

/* ── Project info ── */
.proj-info{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:8px;padding:12px 14px;margin-bottom:12px}
.proj-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:#f59e0b;font-weight:600;margin-bottom:8px}
.proj-stats{display:flex;gap:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#666}

.confidence{background:#0d0d0d;border-left:3px solid #f59e0b;border-right:1px solid #1a1a1a;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;border-radius:0 6px 6px 0;padding:10px 12px;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:11px}

/* ── Mobile ── */
@media(max-width:700px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(0);box-shadow:8px 0 30px rgba(0,0,0,.6)}

  .empty{padding-top:36px}
  .card{padding:22px 18px}
  .hint{display:none}
  #uinput{font-size:16px}
}

async function sha256(t){
  if(crypto.subtle){
    const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));

// ── API calls ──────────────────────────────────────────────────
/* ── Key routing — any key serves every model it possibly can ───
   Native keys call their own provider directly. An OpenRouter key
   is a UNIVERSAL key: every model in the picker has an OpenRouter
   equivalent (orId), so when a model's native key is missing the
   call is transparently re-routed through OpenRouter instead of
   failing. Pick any model — if any compatible key exists, it runs. */
function resolveRoute(provider,model){
  const a=acct();
  const native=KeyVault.dec(a?.apiKeys[provider]||'');
  if(native)return{provider,model,key:native};
  const or=KeyVault.dec(a?.apiKeys.openrouter||'');
  if(or){
    if(provider==='openrouter')return{provider,model,key:or};
    const mi=modelInfo(provider,model);
    if(mi.orId)return{provider:'openrouter',model:mi.orId,key:or};
  }
  throw new Error(`No key can reach this model. In ⚙ Settings add a ${PROVIDERS[provider]?.name||provider} key — or a single OpenRouter key, which works for every model here.`);
}
function hasRouteFor(provider){
  const a=acct();if(!a)return false;
  return !!(KeyVault.dec(a.apiKeys[provider]||'')||KeyVault.dec(a.apiKeys.openrouter||''));
}

/* ── Live model catalogues ──────────────────────────────────────
   Ask each provider's API for the full list of models it supports and
   let the user pick any of them. These list endpoints are FREE — they
   spend zero tokens — so this stays token-friendly. Results are cached
   per account. On any failure we quietly fall back to the curated list. */
async function fetchModels(provider,key){
  try{
    if(provider==='openrouter'){
      const r=await fetch('https://openrouter.ai/api/v1/models',{signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.data||[]).map(m=>({id:m.id,label:m.name||m.id,
        pin:(+m.pricing?.prompt||0)*1e6,pout:(+m.pricing?.completion||0)*1e6}))
        .sort((a,b)=>a.label.localeCompare(b.label));
    }
    if(provider==='openai'){
      const r=await fetch('https://api.openai.com/v1/models',{headers:{Authorization:'Bearer '+key},signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.data||[]).map(m=>m.id)
        .filter(id=>/^(gpt-|o1|o3|o4|chatgpt)/.test(id)&&!/(audio|realtime|embedding|tts|whisper|image|moderation|transcribe|search)/.test(id))
        .sort().map(id=>({id,label:id,pin:0,pout:0}));
    }
    if(provider==='anthropic'){
      const r=await fetch('https://api.anthropic.com/v1/models?limit=100',{headers:{'x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.data||[]).map(m=>({id:m.id,label:m.display_name||m.id,pin:0,pout:0}));
    }
    if(provider==='gemini'){
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models?key='+encodeURIComponent(key)+'&pageSize=200',{signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent')&&/gemini/i.test(m.name))
        .map(m=>({id:m.name.replace('models/',''),label:m.displayName||m.name.replace('models/',''),pin:0,pout:0}));
    }
    if(provider==='xai'){
      const r=await fetch('https://api.x.ai/v1/models',{headers:{Authorization:'Bearer '+key},signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      return (d.data||[]).map(m=>({id:m.id,label:m.id,pin:0,pout:0}));
    }
  }catch(_){}
  return null;
}
/* Fetch (once, cached ~6h) the catalogues for every provider that has a key. */
async function ensureModels(force){
  const a=acct();if(!a)return;
  a.models=a.models||{};a.modelsAt=a.modelsAt||{};
  let changed=false;
  await Promise.all(Object.keys(PROVIDERS).map(async p=>{
    const key=KeyVault.dec(a.apiKeys[p]||'');
    if(!key)return;
    const fresh=a.models[p]&&a.models[p].length&&a.modelsAt[p]&&(Date.now()-a.modelsAt[p]<216e5);
    if(fresh&&!force)return;
    const list=await fetchModels(p,key);
    if(list&&list.length){a.models[p]=list;a.modelsAt[p]=Date.now();changed=true;}
  }));
  if(changed){saveAccts();if(S.modal==='models')renderModelList();
    else if(S.screen==='app')render();}
}

// Build provider-specific message payloads. Images go as real vision inputs;
// other file types are described/inlined as text (see attachmentContext).
const imgAtts=(m)=>(m.attachments||[]).filter(x=>x.dataUrl&&(x.type||'').startsWith('image/'));
function toAnthropicMsgs(msgs){
  return msgs.map(m=>{
    const imgs=imgAtts(m);
    if(!imgs.length)return{role:m.role,content:m.content};
    return{role:m.role,content:[
      ...imgs.map(x=>({type:'image',source:{type:'base64',media_type:x.type,data:x.dataUrl.split(',')[1]}})),
      {type:'text',text:m.content||'(see attached image)'},
    ]};
  });
}
function toOpenAIMsgs(msgs){
  return msgs.map(m=>{
    const imgs=imgAtts(m);
    if(!imgs.length)return{role:m.role,content:m.content};
    return{role:m.role,content:[
      {type:'text',text:m.content||'(see attached image)'},
      ...imgs.map(x=>({type:'image_url',image_url:{url:x.dataUrl}})),
    ]};
  });
}
function toGeminiContents(msgs){
  return msgs.map(m=>{
    const parts=[];
    imgAtts(m).forEach(x=>parts.push({inlineData:{mimeType:x.type,data:x.dataUrl.split(',')[1]}}));
    parts.push({text:m.content||'(see attached image)'});
    return{role:m.role==='assistant'?'model':'user',parts};
  });
}
function usageFromOpenAI(d){return{tin:d.usage?.prompt_tokens||0,tout:d.usage?.completion_tokens||0};}

/* Anthropic requires max_tokens. Use a generous ceiling; if the chosen model's
   own maximum is lower the API 400s, so we retry once at a safe fallback. */
async function callAnthropic(msgs,key,model,sys,maxT,signal){
  const send=(mt)=>fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',signal,
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model,max_tokens:mt,system:sys,messages:toAnthropicMsgs(msgs)}),
  });
  let r=await send(maxT||CFG.ANTHROPIC_MAX);
  if(!r.ok&&!maxT){const e=await r.clone().json().catch(()=>({}));if(/max_tokens/i.test(e.error?.message||''))r=await send(CFG.ANTHROPIC_FALLBACK);}
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Anthropic error ${r.status}`);}
  const d=await r.json();
  return{text:cleanModelOutput(d.content?.filter(b=>b.type==='text').map(b=>b.text||'').join('')),
    usage:{tin:d.usage?.input_tokens||0,tout:d.usage?.output_tokens||0}};
}
async function callOpenAICompat(url,extraHeaders,msgs,key,model,sys,maxT,signal){
  const body={model,messages:[{role:'system',content:sys},...toOpenAIMsgs(msgs)],
      /* Reasoning models (Nemotron, DeepSeek R1…) otherwise burn the budget on
         hidden thoughts — keep effort minimal, don't return them on non-stream. */
      ...(url.includes('openrouter')?{reasoning:{effort:'low',exclude:true}}:{})};
  if(maxT)body.max_tokens=maxT;   // no cap unless explicitly requested (e.g. key verify)
  const r=await fetch(url,{
    method:'POST',signal,
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key,...extraHeaders},
    body:JSON.stringify(body),
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(typeof e.error==='string'?e.error:e.error?.message||`API error ${r.status}`);}
  const d=await r.json();
  const _msg=d.choices?.[0]?.message||{};
  let out=_msg.content;
  if(Array.isArray(out))out=out.map(c=>c?.text||'').join('');
  out=cleanModelOutput(out);
  /* If reasoning ate the whole budget, content comes back empty. Only salvage
     text that appears AFTER a fully closed think block — raw unfinished
     thoughts must never reach the user. */
  if(!out&&_msg.reasoning){
    const parts=String(_msg.reasoning).split(/<\/think>/i);
    out=parts.length>1?cleanModelOutput(parts.pop()):'';
  }
  return{text:out,usage:usageFromOpenAI(d)};
}
async function callGemini(msgs,key,model,sys,maxT,signal){
  const genCfg={
    /* Gemini 3 defaults to medium thinking — keep it low so tokens go to the
       reply, not to hidden processes. */
    ...(String(model).startsWith('gemini-3')?{thinkingConfig:{thinkingLevel:'low'}}:{})};
  if(maxT)genCfg.maxOutputTokens=maxT;   // no cap unless explicitly requested
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
    method:'POST',signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:toGeminiContents(msgs),systemInstruction:{parts:[{text:sys}]},generationConfig:genCfg}),
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Gemini error ${r.status}`);}
  const d=await r.json();
  return{text:cleanModelOutput(d.candidates?.[0]?.content?.parts?.filter(p=>!p.thought).map(p=>p.text||'').join('')),
    usage:{tin:d.usageMetadata?.promptTokenCount||0,tout:d.usageMetadata?.candidatesTokenCount||0}};
}

/* Unified router — every provider goes through here. */
function callProvider(provider,model,key,msgs,sys,maxT,signal){
  switch(provider){
    case 'anthropic': return callAnthropic(msgs,key,model,sys,maxT,signal);
    case 'openai':    return callOpenAICompat('https://api.openai.com/v1/chat/completions',{},msgs,key,model,sys,maxT,signal);
    case 'xai':       return callOpenAICompat('https://api.x.ai/v1/chat/completions',{},msgs,key,model,sys,maxT,signal);
    case 'gemini':    return callGemini(msgs,key,model,sys,maxT,signal);
    case 'openrouter':return callOpenAICompat('https://openrouter.ai/api/v1/chat/completions',
                        {'HTTP-Referer':'https://lewacoder.app','X-Title':'Lewa Coder'},msgs,key,model,sys,maxT,signal);
    default: throw new Error('Unknown provider: '+provider);
  }
}
async function callAI(msgs,provider,model,sys,signal){
  // Only the last CONTEXT_LIMIT messages are sent — memory recall covers the rest.
  const rt=resolveRoute(provider,model);
  return callProvider(rt.provider,rt.model,rt.key,msgs.slice(-CFG.CONTEXT_LIMIT),sys,null,signal);
}
function stopAI(){
  if(S.abort){try{S.abort.abort();}catch(_){}S.abort=null;}
}

/* ════════════════════════════════════════════════════════════
   STREAMING — live reasoning + answer, like Claude / Claude Code.
   onDelta('reasoning'|'text', chunk) fires as tokens arrive so the
   thinking panel updates in realtime and can be stopped mid-thought.
   ════════════════════════════════════════════════════════════ */
async function readSSE(r,onLine){
  const reader=r.body.getReader();const dec=new TextDecoder();let buf='';
  for(;;){
    const {done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value,{stream:true});
    let nl;
    while((nl=buf.indexOf('\n'))>=0){
      const line=buf.slice(0,nl).replace(/\r$/,'').trim();
      buf=buf.slice(nl+1);
      if(line)onLine(line);
    }
  }
  if(buf.trim())onLine(buf.trim());
}
async function streamOpenAICompat(url,extraHeaders,msgs,key,model,sys,signal,onDelta){
  const body={model,stream:true,messages:[{role:'system',content:sys},...toOpenAIMsgs(msgs)]}; // no max_tokens cap
  if(url.includes('openrouter'))body.reasoning={effort:'low'}; // stream thoughts (no exclude)
  const r=await fetch(url,{method:'POST',signal,headers:{'Content-Type':'application/json','Authorization':'Bearer '+key,...extraHeaders},body:JSON.stringify(body)});
  if(!r.ok||!r.body){const e=await r.json().catch(()=>({}));throw new Error(typeof e.error==='string'?e.error:e.error?.message||`API error ${r.status}`);}
  let text='',reasoning='',usage={tin:0,tout:0},finish='';
  await readSSE(r,line=>{
    if(!line.startsWith('data:'))return;
    const p=line.slice(5).trim();if(!p||p==='[DONE]')return;
    let j;try{j=JSON.parse(p);}catch{return;}
    if(j.usage)usage={tin:j.usage.prompt_tokens||0,tout:j.usage.completion_tokens||0};
    const ch=j.choices?.[0]||{};
    if(ch.finish_reason)finish=ch.finish_reason;
    const d=ch.delta||{};
    const rc=d.reasoning||d.reasoning_content;
    if(rc){reasoning+=rc;onDelta('reasoning',rc);}
    if(d.content){text+=d.content;onDelta('text',d.content);}
  });
  return{text:cleanModelOutput(text)||text,reasoning,usage,truncated:finish==='length'};
}
async function streamAnthropic(msgs,key,model,sys,signal,onDelta){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',signal,
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model,max_tokens:CFG.ANTHROPIC_MAX,system:sys,stream:true,messages:toAnthropicMsgs(msgs)})});
  if(!r.ok||!r.body){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Anthropic error ${r.status}`);}
  let text='',reasoning='',usage={tin:0,tout:0},stop='';
  await readSSE(r,line=>{
    if(!line.startsWith('data:'))return;
    const p=line.slice(5).trim();if(!p)return;let j;try{j=JSON.parse(p);}catch{return;}
    if(j.type==='message_start')usage.tin=j.message?.usage?.input_tokens||0;
    if(j.type==='content_block_delta'){const dl=j.delta||{};
      if(dl.type==='text_delta'&&dl.text){text+=dl.text;onDelta('text',dl.text);}
      if(dl.type==='thinking_delta'&&dl.thinking){reasoning+=dl.thinking;onDelta('reasoning',dl.thinking);}}
    if(j.type==='message_delta'){if(j.delta?.stop_reason)stop=j.delta.stop_reason;if(j.usage)usage.tout=j.usage.output_tokens||usage.tout;}
  });
  return{text:cleanModelOutput(text)||text,reasoning,usage,truncated:stop==='max_tokens'};
}
async function streamGemini(msgs,key,model,sys,signal,onDelta){
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${encodeURIComponent(key)}`,{
    method:'POST',signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:toGeminiContents(msgs),systemInstruction:{parts:[{text:sys}]}})}); // no maxOutputTokens cap
  if(!r.ok||!r.body){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Gemini error ${r.status}`);}
  let text='',reasoning='',usage={tin:0,tout:0},finish='';
  await readSSE(r,line=>{
    if(!line.startsWith('data:'))return;
    const p=line.slice(5).trim();if(!p)return;let j;try{j=JSON.parse(p);}catch{return;}
    const cand=j.candidates?.[0]||{};
    if(cand.finishReason)finish=cand.finishReason;
    (cand.content?.parts||[]).forEach(pt=>{
      if(!pt.text)return;
      if(pt.thought){reasoning+=pt.text;onDelta('reasoning',pt.text);}
      else{text+=pt.text;onDelta('text',pt.text);}
    });
    if(j.usageMetadata)usage={tin:j.usageMetadata.promptTokenCount||usage.tin,tout:j.usageMetadata.candidatesTokenCount||usage.tout};
  });
  return{text:cleanModelOutput(text)||text,reasoning,usage,truncated:finish==='MAX_TOKENS'};
}
function streamProvider(provider,model,key,msgs,sys,signal,onDelta){
  switch(provider){
    case 'anthropic': return streamAnthropic(msgs,key,model,sys,signal,onDelta);
    case 'openai':    return streamOpenAICompat('https://api.openai.com/v1/chat/completions',{},msgs,key,model,sys,signal,onDelta);
    case 'xai':       return streamOpenAICompat('https://api.x.ai/v1/chat/completions',{},msgs,key,model,sys,signal,onDelta);
    case 'gemini':    return streamGemini(msgs,key,model,sys,signal,onDelta);
    case 'openrouter':return streamOpenAICompat('https://openrouter.ai/api/v1/chat/completions',{'HTTP-Referer':'https://lewacoder.app','X-Title':'Lewa Coder'},msgs,key,model,sys,signal,onDelta);
    default: throw new Error('Unknown provider: '+provider);
  }
}
async function streamAI(msgs,provider,model,sys,signal,onDelta){
  const rt=resolveRoute(provider,model);
  return streamProvider(rt.provider,rt.model,rt.key,msgs.slice(-CFG.CONTEXT_LIMIT),sys,signal,onDelta);
}

/* Live key verification — a tiny real call proves key+model work before saving. */

/* Credits fetch — only OpenRouter exposes this. */
async function fetchCredits(key,provider){
  if(provider!=='openrouter'||!key)return null;
  try{
    const r=await fetch('https://openrouter.ai/api/v1/auth/key',{headers:{Authorization:'Bearer '+key}});
    const j=await r.json();const d=j.data||{};
    return{used:parseFloat(d.usage||0),limit:d.limit!=null?parseFloat(d.limit):null,
      remaining:d.limit!=null?parseFloat(d.limit)-parseFloat(d.usage||0):null};
  }catch(_){return null;}
}
/* Throttled: at most one credits request per 60s (was one per AI reply —
   a classic N+1-style repeated call for data that barely changes). */
let _creditsAt=0;
function refreshCredits(force){
  const a=acct();if(!a)return;
  const key=KeyVault.dec(a.apiKeys.openrouter||'');
  if(!key)return;
  if(!force&&Date.now()-_creditsAt<60000)return;
  _creditsAt=Date.now();
  fetchCredits(key,'openrouter').then(c=>{
    const cur=acct();
    if(c&&cur){cur.credits=c;saveAccts();if(S.modal==='usage')render();}
  });
}

// ── Usage / cost tracking ──────────────────────────────────────
const estTokens=(s)=>Math.ceil((s||'').length/4);
function recordUsage(provider,model,usage){
  const a=acct();if(!a)return usage;
  const mi=modelInfo(provider,model);
  const cost=usage.tin/1e6*mi.pin+usage.tout/1e6*mi.pout;
  a.usage.tin+=usage.tin;a.usage.tout+=usage.tout;a.usage.cost+=cost;a.usage.calls++;
  const key=mi.label;
  a.usage.byModel[key]=a.usage.byModel[key]||{tin:0,tout:0,cost:0,calls:0};
  const bm=a.usage.byModel[key];
  bm.tin+=usage.tin;bm.tout+=usage.tout;bm.cost+=cost;bm.calls++;
  saveAccts();
  refreshCredits(); // keep live credits in sync (no-op without an OpenRouter key)
  return{...usage,cost};
}
const fmtTok=(n)=>n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n);
const fmtCost=(c)=>'$'+(c<0.01&&c>0?c.toFixed(4):c.toFixed(2));

// ── Cross-session memory (auto recall across ALL account chats) ─
const trunc=(s,n)=>{s=(s||'').replace(/\s+/g,' ').trim();return s.length>n?s.slice(0,n)+'…':s;};
const dateLabel=(t)=>{try{return new Date(t).toLocaleDateString(undefined,{month:'short',day:'numeric'});}catch(_){return'';}};
/* Deterministic (zero-token) digest of every prior chat on this account,
   newest first. Recent chats get more detail; older ones a one-liner. The
   whole thing is capped so it stays token-friendly.
   CACHED: rebuilding on every send re-walked every message of every chat;
   now it recomputes only when the chats actually change. */
let _recallCache={key:'',val:''};
function buildRecall(){
  const a=acct();if(!a)return'';
  if(a.cfg.recall===false)return'';   // user turned cross-chat memory off
  const key=S.user+'|'+a.currentId+'|'+a.sessions.length+'|'+a.sessions.reduce((n,s)=>n+s.messages.length,0);
  if(_recallCache.key===key)return _recallCache.val;
  const val=_buildRecallRaw(a);
  _recallCache={key,val};
  return val;
}
function _buildRecallRaw(a){
  const others=a.sessions
    .filter(s=>s.id!==a.currentId&&s.messages.some(m=>m.content&&!/^❌/.test(m.content)))
    .sort((x,y)=>(y.createdAt||0)-(x.createdAt||0));
  let budget=3600;const out=[];
  others.forEach((s,idx)=>{
    if(budget<=0)return;
    const detailed=idx<4; // richer summary for the 4 most recent chats
    const turns=s.messages.filter(m=>m.content&&!/^❌/.test(m.content));
    let block=`— "${trunc(s.title,52)}"${s.createdAt?` (${dateLabel(s.createdAt)})`:''}:`;
    if(detailed){
      const pairs=[];
      for(let i=0;i<turns.length&&pairs.length<3;i++){
        if(turns[i].role==='user'){
          const u=turns[i];const nx=turns[i+1];
          pairs.push(`\n   • you asked: ${trunc(u.content,150)}`+(nx&&nx.role==='assistant'?`\n     Lewa Coder: ${trunc(nx.content,190)}`:''));
        }
      }
      block+=pairs.join('');
    }else{
      const fu=turns.find(m=>m.role==='user');
      block+=` ${trunc(fu?.content,120)}`;
    }
    if(block.length>budget)block=block.slice(0,budget)+'…';
    budget-=block.length;out.push(block);
  });
  return out.join('\n');
}
/* Extra system context — developer recognition for the admin/verified dev. */
function buildExtra(){
  const a=acct();

  if(a?.devVerified)
    return `## Note\nThis user has passed the developer identity challenge and is trusted as ${devName()}.`;
  return '';
}

async function gh(path,opts={}){

    ...opts,
    headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token,'X-GitHub-Api-Version':'2022-11-28',...(opts.headers||{})},
  });
  if(r.status===204)return{};

  if(!r.ok)throw new Error(d.message?`GitHub: ${d.message}`:`GitHub error ${r.status}`);

// ── Device files (File System Access API; falls back to download) ─
function fsSupported(){return 'showSaveFilePicker' in window;}
/* Save content to disk. When File System Access is available we STREAM it
   (writing in chunks) so even very large content never sits fully in a Blob
   in memory; otherwise we fall back to a normal blob download. `content`
   may be a string, a Blob/File, or an async iterable of chunks. */
async function saveToDisk(name,content){
  try{
    if(fsSupported()){
      const h=await window.showSaveFilePicker({suggestedName:name||'lewa-file.txt'});
      const w=await h.createWritable();
      if(content&&typeof content.stream==='function'){          // Blob/File → pipe its stream
        await content.stream().pipeTo(w);
      }else if(content&&typeof content[Symbol.asyncIterator]==='function'){
        for await(const chunk of content)await w.write(chunk);
        await w.close();
      }else{
        // string: write in 8MB slices so huge strings don't spike memory
        const s=String(content||'');const STEP=8*1024*1024;
        for(let i=0;i<s.length;i+=STEP)await w.write(s.slice(i,i+STEP));
        await w.close();
      }
      return true;
    }
  }catch(e){if(e.name==='AbortError')return false;}
  // fallback: normal blob download
  const blob=(content instanceof Blob)?content:new Blob([content],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name||'lewa-file.txt';document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1500);
  return true;
}
async function openFolderIntoChat(){
  if(!('showDirectoryPicker' in window)){toast('Opening a folder needs Chrome or Edge (desktop).');return;}
  let dir;try{dir=await window.showDirectoryPicker();}catch(e){return;}
  const texty=/\.(txt|md|js|jsx|ts|tsx|py|c|cpp|h|hpp|java|cs|go|rs|rb|php|html|css|scss|json|xml|yml|yaml|toml|ini|cfg|conf|sh|bash|sql|csv|env)$/i;
  const files=[];
  async function walk(handle,prefix,depth){
    if(depth>4||files.length>=40)return;
    for await(const [name,h] of handle.entries()){
      if(files.length>=40)break;
      if(name.startsWith('.')||name==='node_modules')continue;
      const p=prefix?prefix+'/'+name:name;
      if(h.kind==='file'&&texty.test(name)){
        try{const f=await h.getFile();if(f.size<=120000)files.push({name:p,type:f.type||'text/plain',text:(await f.text()).slice(0,24000)});}catch(_){}
      }else if(h.kind==='directory'){await walk(h,p,depth+1);}
    }
  }
  toast('Reading folder…');
  await walk(dir,'',0);
  if(!files.length){toast('No readable text/code files found in that folder.');return;}
  S.pending.push(...files.map(f=>({name:f.name,type:f.type,size:f.text.length,text:f.text})));
  renderPending();
  toast(`Loaded ${files.length} file(s) from "${dir.name}" — ask about them.`);
}

// ── Email (EmailJS provider, with mailto fallback) ─────────────
function mailtoCompose(to,subject,body){
  const url=`mailto:${encodeURIComponent(to||'')}?subject=${encodeURIComponent(subject||'')}&body=${encodeURIComponent(body||'')}`;
  window.location.href=url;
}
const emailjsReady=()=>{const ej=integ()?.emailjs;return !!(ej&&ej.service&&ej.template&&ej.pubkey);};
/* Send via EmailJS REST API. Template should expose the variables
   {{to_email}}, {{subject}}, {{message}} and (optionally) {{from_name}}. */
async function emailjsSendRaw(to,subject,body){
  const ej=integ().emailjs;
  // Trim hard — pasted keys/IDs often carry stray spaces or a trailing newline,
  // which is the usual cause of EmailJS "id not found" (404) errors.
  const clean=s=>String(s||'').replace(/[\s​]+/g,'').trim();
  const service=clean(ej.service),template=clean(ej.template),pubkey=clean(ej.pubkey),priv=clean(ej.privatekey);
  const payload={service_id:service,template_id:template,user_id:pubkey,
    template_params:{to_email:to,subject:subject||'',message:body||'',from_name:ej.from||'Lewa Coder'}};
  if(priv)payload.accessToken=priv; // required when the account has "Use Private Key" on
  const r=await fetch('https://api.emailjs.com/api/v1.0/email/send',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const t=(await r.text().catch(()=>'')).trim();
  if(!r.ok){
    const low=t.toLowerCase();
    let hint='';
    if(r.status===404||/account not found/.test(low))
      hint=' — 404 means an ID does not match an account. Most often the Public Key is wrong: re-copy it from EmailJS → Account → General (it is NOT your private key), and make sure the Service ID (service_...) and Template ID (template_...) are pasted with no extra spaces.';
    else if(/public key|user_id/.test(low))hint=' — check your Public Key.';
    else if(/template/.test(low))hint=' — check your Template ID.';
    else if(/service/.test(low))hint=' — check your Service ID.';
    else if(/private key|api calls|non-browser|forbidden/.test(low))hint=' — turn on "Allow EmailJS API" or paste your Private Key.';
    else if(/recipient|to_email|no recipients/.test(low))hint=' — your template\'s To field must be {{to_email}}.';
    throw new Error('EmailJS '+r.status+': '+(t||'request failed')+hint);
  }
  return 'sent';
}
async function emailSend(to,subject,body){
  if(emailjsReady())return emailjsSendRaw(to,subject,body);
  mailtoCompose(to,subject,body);   // no provider configured → open the mail app
  return 'compose';
}

// ── Web search (cached 10 min per query — no repeat fetches) ───
const _wsCache=new Map();
async function webSearch(q){
  const key=q.toLowerCase().trim();
  const hit=_wsCache.get(key);
  if(hit&&Date.now()-hit.t<600000)return hit.v;
  let out;
  try{
    const ddg=`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=1`;
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(ddg)}`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok)throw new Error('proxy error');
    const d=await r.json();
    const parts=[];
    if(d.AbstractText)parts.push(d.AbstractText);
    if(d.Answer)parts.push('Quick answer: '+d.Answer);
    (d.RelatedTopics||[]).slice(0,4).forEach(t=>t.Text&&parts.push('• '+t.Text));
    out=parts.length?`[Web results for "${q}"]:\n${parts.join('\n')}`:`[No web results for "${q}"]`;
  }catch(e){return `[Web search unavailable: ${e.message}]`;}   // errors are NOT cached
  if(_wsCache.size>60)_wsCache.clear();
  _wsCache.set(key,{t:Date.now(),v:out});
  return out;
}

let _voices=[];
function loadVoices(){if(window.speechSynthesis)_voices=window.speechSynthesis.getVoices()||[];}
if(window.speechSynthesis){loadVoices();window.speechSynthesis.onvoiceschanged=loadVoices;}
function pickVoice(){
  if(!_voices.length)loadVoices();
  const chosen=acct()?.cfg.voiceName;               // user-selected voice, if any
  if(chosen){const v=_voices.find(x=>x.name===chosen);if(v)return v;}
  const pref=['Google US English','Microsoft Aria Online (Natural) - English (United States)','Microsoft Jenny Online (Natural) - English (United States)','Samantha','Microsoft Aria','Microsoft Jenny','Google UK English Female','Microsoft Zira - English (United States)'];
  for(const n of pref){const v=_voices.find(x=>x.name===n);if(v)return v;}
  return _voices.find(x=>/en[-_]us/i.test(x.lang)&&/natural|aria|jenny|samantha|zira|female/i.test(x.name))
       ||_voices.find(x=>/^en/i.test(x.lang))||_voices[0]||null;
}
const voiceQuality=(v)=>/(natural|neural|online|enhanced|premium)/i.test(v.name)?'natural':(/(google|siri)/i.test(v.name)?'good':(v.localService?'basic':'good'));
function englishVoices(){
  if(!_voices.length)loadVoices();
  const en=_voices.filter(v=>/^en/i.test(v.lang));
  const seen=new Set(),out=[];
  for(const v of en){if(seen.has(v.name))continue;seen.add(v.name);out.push(v);}  // drop duplicate entries
  const rank=v=>({natural:0,good:1,basic:2}[voiceQuality(v)]);
  out.sort((a,b)=>rank(a)-rank(b)||a.name.localeCompare(b.name));                 // best-sounding first
  return out;
}
function setVoice(name){const a=acct();if(a){a.cfg.voiceName=name;saveAccts();}

/* Strip markdown AND every emoji / pictograph so the voice never says them. */
function stripForSpeech(text){
  return String(text||'')
    .replace(/```[\s\S]*?```/g,'. ')
    .replace(/!\[[^\]]*\]\([^)]*\)/g,' ')
    .replace(/\[([^\]]+)\]\([^)]*\)/g,'$1')
    .replace(/`([^`]+)`/g,'$1')
    .replace(/data:[^\s)]+/g,' ')
    .replace(/[#*_~>|]/g,' ')
    .replace(/\p{Extended_Pictographic}/gu,' ')
    .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FE0F}\u{1F1E6}-\u{1F1FF}]/gu,' ')
    .replace(/\s+/g,' ').trim();
}
/* Neural OpenAI voices sound genuinely human and are all clearly different
   from each other (unlike the flat, often-identical built-in browser voices).
   Used when the account has an OpenAI key and picks the OpenAI engine. */
const OPENAI_VOICES=[
  {id:'nova',label:'Nova — warm female'},{id:'shimmer',label:'Shimmer — bright female'},
  {id:'alloy',label:'Alloy — neutral'},{id:'echo',label:'Echo — calm male'},
  {id:'fable',label:'Fable — expressive'},{id:'onyx',label:'Onyx — deep male'},
];
let _ttsAudio=null;
const openaiTtsAvailable=()=>{const a=acct();return !!(a&&KeyVault.dec(a.apiKeys.openai||''));};
function useOpenAITTS(){const a=acct();return a&&a.cfg.ttsEngine==='openai'&&openaiTtsAvailable();}
function stopTTS(){
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(_ttsAudio){try{_ttsAudio.pause();}catch(_){}_ttsAudio.src='';_ttsAudio=null;}
  S.speakingId=null;updateSpeakButtons();
}
function speak(text,onend,id){
  const clean=stripForSpeech(text);
  if(!clean){S.speakingId=null;updateSpeakButtons();if(onend)onend();return;}
  S.speakingId=(id!=null)?id:'_';
  const done=()=>{S.speakingId=null;updateSpeakButtons();if(onend)onend();};
  if(useOpenAITTS()){speakOpenAI(clean,done);updateSpeakButtons();return;}
  // Browser speech-synthesis path
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(!window.speechSynthesis){done();return;}
  const u=new SpeechSynthesisUtterance(clean.slice(0,1800));
  const v=pickVoice();if(v)u.voice=v;
  u.lang=(v&&v.lang)||'en-US';u.rate=1;u.pitch=1.05;u.volume=1;
  u.onend=done;u.onerror=done;
  window.speechSynthesis.speak(u);
  updateSpeakButtons();
}
async function speakOpenAI(clean,done){
  const key=KeyVault.dec(acct().apiKeys.openai||'');
  const voice=acct().cfg.ttsVoice||'nova';
  try{
    if(_ttsAudio){try{_ttsAudio.pause();}catch(_){}}
    const r=await fetch('https://api.openai.com/v1/audio/speech',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'tts-1',voice,input:clean.slice(0,3800),response_format:'mp3'})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||('OpenAI TTS '+r.status));}
    const blob=await r.blob();

    if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(clean.slice(0,1800));const v=pickVoice();if(v)u.voice=v;u.onend=done;u.onerror=done;window.speechSynthesis.speak(u);}else done();
  }

// ── Voice note (STT → auto-send) ───────────────────────────────
function sttSupported(){return !!(window.SpeechRecognition||window.webkitSpeechRecognition);}
async function startSTT(){
  if(!sttSupported()){toast('Voice input needs Chrome, Edge, or Chrome on Android.');return;}
  if(!window.isSecureContext&&location.hostname!=='localhost'){
    toast('The microphone only works on an https:// address (or localhost), not a local file.');return;
  }
  // Ask for mic permission up front so failures give a clear message instead of silence.
  try{
    if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      stream.getTracks().forEach(t=>t.stop());
    }
  }catch(err){
    toast('Microphone blocked ('+(err.name||'error')+'). Allow mic access for this site in your browser settings.');
    return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR();S.recognition=rec;
  rec.lang='en-US';rec.continuous=true;rec.interimResults=true;
  let finalText='';
  rec.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)finalText+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    const ta=document.getElementById('uinput');
    if(ta){ta.value=(finalText+interim).trim();autoResize(ta);}
  };
  rec.onerror=ev=>{
    S.listening=false;updateMic();
    if(ev.error&&!['no-speech','aborted'].includes(ev.error))
      toast('Voice error: '+ev.error+(ev.error==='not-allowed'?' — enable mic permission.':''));
  };
  rec.onend=()=>{
    S.listening=false;updateMic();
    const t=finalText.trim();
    if(t){const ta=document.getElementById('uinput');if(ta){ta.value=t;autoResize(ta);}sendMsg(true);}
  };
  try{rec.start();S.listening=true;updateMic();toast('Listening… tap the mic again to send.',2200);}
  catch(err){S.listening=false;updateMic();toast('Could not start the mic: '+err.message);}
}
function stopSTT(){if(S.recognition){try{S.recognition.stop();}catch{}S.recognition=null;}S.listening=false;updateMic();}
function toggleSTT(){if(S.listening){S.recognition&&S.recognition.stop();}else startSTT();}
function updateMic(){
  const b=document.getElementById('mic-btn');

/* ── Large-file handling ────────────────────────────────────────

   reference to a multi-GB file costs almost no memory — we only pay
   when we READ it. So: keep every attached file's Blob in a session
   store (never serialized to localStorage), give the MODEL only a
   text excerpt (its context window is a few MB at most — no model

   by streaming it back from the retained Blob. */

  const tail=await file.slice(file.size-TEXT_TAIL).text();
  return{text:head+`\n\n… [${fmtSize(file.size-TEXT_HEAD-TEXT_TAIL)} of this file omitted from the model — ask for a specific part by line/section] …\n\n`+tail,truncated:true};

// ── PROJECT ANALYZER ──
// Automatically index uploaded project files to understand structure, dependencies, and estimate complexity.
function analyzeProject(files){
  const idx={files:[],structure:{},deps:new Set(),estimate:0};
  const langCounts={};
  files.forEach(f=>{
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    if(!langCounts[ext])langCounts[ext]=0;
    langCounts[ext]++;
    idx.files.push({name:f.name,size:f.size,ext,type:f.type});
    idx.estimate+=Math.log(f.size+1);
    // Quick parse for common dependencies
    const text=f.text||'';
    if(/import|require|from ['"]/.test(text)){
      const pkgs=text.match(/(?:import|require)\s*\(?\s*['"]([^'"]+)['"]/g)||[];
      pkgs.forEach(p=>{const m=p.match(/['"]([^'"]+)['"]/);if(m)idx.deps.add(m[1]);});
    }
  });
  idx.structure={langs:langCounts,fileCount:idx.files.length,depCount:idx.deps.size};
  idx.deps=Array.from(idx.deps);
  return idx;
}

// ── DIFF GENERATOR ──
// Create a minimal unified diff to show changes before applying.
function genDiff(original,proposed,lang='text'){
  if(!original||!proposed)return null;
  const origLines=original.split('\n');const propLines=proposed.split('\n');
  const changes={added:0,removed:0,modified:0,lines:[]};
  let i=0,j=0;
  while(i<origLines.length||j<propLines.length){
    if(origLines[i]===propLines[j]){i++;j++;continue;}
    if(i<origLines.length){changes.lines.push({type:'del',line:origLines[i],num:i+1});changes.removed++;i++;}
    if(j<propLines.length&&(i>=origLines.length||propLines[j]!==origLines[i])){
      changes.lines.push({type:'add',line:propLines[j],num:j+1});changes.added++;j++;
    }
  }
  changes.percent=origLines.length>0?Math.round(100*(changes.removed+changes.added)/origLines.length):0;
  return changes;
}

// ── SYNTAX VALIDATOR ──
// Quick pre-flight checks on generated code.
function validateSyntax(code,lang){
  const errs=[];
  if(lang==='js'||lang==='javascript'||lang==='ts'||lang==='typescript'){
    try{new Function(code);}catch(e){errs.push({type:'syntax',msg:e.message.split('\n')[0].slice(0,100)});}
    if(!code.match(/\S/))errs.push({type:'empty',msg:'Empty code block'});
    if(code.match(/console\.log/gi))errs.push({type:'warn',msg:'Contains console.log — remove for production'});
  }else if(lang==='json'){
    try{JSON.parse(code);}catch(e){errs.push({type:'syntax',msg:'Invalid JSON: '+e.message.slice(0,80)});}
  }else if(lang==='html'||lang==='xml'){
    const unclosed=code.match(/<\w+(?![^>]*\/>)(?![^>]*<\/)/g);if(unclosed)errs.push({type:'warn',msg:`${unclosed.length} possibly unclosed tags`});
  }
  return errs;
}

function pickModelTier(taskType='general'){
  const provider=S.setupProvider||'anthropic';
  const models=PROVIDERS[provider]?.models||[];
  if(S.modelStrategy==='fast')return models.find(m=>m.label?.includes('Haiku'))||models[0];
  if(S.modelStrategy==='reasoning')return models.find(m=>m.label?.includes('Opus'))||models[models.length-1];
  if(S.modelStrategy==='cheap')return models.find(m=>m.id?.includes('free'))||models[0];
  if(taskType==='explain'||taskType==='debug')return models.find(m=>m.label?.includes('Sonnet'))||models[Math.floor(models.length/2)];
  return models[models.length-1]; // default: strongest
}

function render(){
  const root=document.getElementById('root');
  switch(S.screen){
    case 'splash': root.innerHTML=renderSplash();break;
    case 'lock':   root.innerHTML=renderLock();break;
    case 'auth':   root.innerHTML=renderAuth();break;
    case 'setup':  root.innerHTML=renderSetup();break;
    case 'loading':root.innerHTML=renderLoading();break;
    case 'app':    root.innerHTML=renderApp();renderPending();wireScroll();updateSpeakButtons();resolvePendingImages();if(S.modal==='models')renderModelList();scrollBot();break;
  }
}
function scrollBot(){
  if(S._noScrollBot){S._noScrollBot=false;return;}   // don't jump when paging up
  setTimeout(()=>{const a=document.getElementById('bot');if(a)a.scrollIntoView({behavior:'smooth'});},50);
}
function autoResize(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,180)+'px';}
/* Auto-hide the header on scroll-down and reveal it on scroll-up; show the
   jump-to-latest arrow whenever we're not near the bottom of the chat. */
function wireScroll(){
  const el=document.getElementById('msgs');if(!el)return;
  let last=el.scrollTop;
  el.onscroll=()=>{
    const st=el.scrollTop;
    const nearBottom=el.scrollHeight-st-el.clientHeight<48;
    const btn=document.getElementById('scroll-down');
    if(btn)btn.classList.toggle('show',!nearBottom);
    const hdr=document.getElementById('appHeader');
    if(hdr){
      if(st>last+6&&st>56)hdr.classList.add('hidden');      // scrolling down → hide
      else if(st<last-6)hdr.classList.remove('hidden');     // scrolling up → reveal
    }
    last=st;
  };
}
function jumpToLatest(){
  const el=document.getElementById('msgs');
  if(el)el.scrollTo({top:el.scrollHeight,behavior:'smooth'});
  const hdr=document.getElementById('appHeader');if(hdr)hdr.classList.remove('hidden');
}

function maskUser(u){
  u=String(u||'');
  if(u.length<=2)return u[0]?u[0]+'•':'•';
  return u[0]+'•'.repeat(Math.min(u.length-2,6))+u[u.length-1];
}

/* Build the (searchable) model list from each keyed provider's live catalogue. */
function renderModelList(){
  const box=document.getElementById('model-list');if(!box)return;
  const a=acct();
  const q=(document.getElementById('model-search')?.value||'').toLowerCase().trim();
  const provs=Object.keys(PROVIDERS).filter(hasKey);
  if(!provs.length){box.innerHTML='<div class="no-sessions">Add an API key in ⚙ Settings to load models.</div>';return;}
  let html='';let total=0;
  provs.forEach(p=>{
    const loading=!(a.models&&a.models[p]&&a.models[p].length);
    let list=modelsFor(p);
    if(q)list=list.filter(m=>(m.label+' '+m.id).toLowerCase().includes(q));
    if(!list.length&&!loading)return;
    html+=`<div class="ml-group"><div class="ml-head"><span class="model-dot" style="background:${PROVIDERS[p].color}"></span>${PROVIDERS[p].name}${loading?' <span class="ml-loading">fetching full list…</span>':` · ${list.length}`}</div>`;

    if(loading)html+=`<div class="skel skel-row"></div><div class="skel skel-row"></div><div class="skel skel-row"></div>`;
    const CAP=q?1000:600;
    html+=list.slice(0,CAP).map(m=>{
      const on=a.cfg.provider===p&&a.cfg.model===m.id;
      const price=m.pin?`${fmtCost(m.pin)}/${fmtCost(m.pout)} per 1M`:'';
      return `<button class="ml-item ${on?'on':''}" onclick="selectModelById('${p}','${esc(m.id).replace(/'/g,"\\'")}')">
        <span class="ml-label">${esc(m.label)}</span>
        <span class="ml-meta">${price}${on?' ✓':''}</span></button>`;
    }).join('');
    if(list.length>CAP)html+=`<div class="fhint" style="padding:6px 4px">Showing ${CAP} of ${list.length} — search to narrow.</div>`;
    html+='</div>';
    total+=list.length;
  });
  box.innerHTML=html||'<div class="no-sessions">No models match your search.</div>';
}

function attachHtml(atts){
  if(!atts||!atts.length)return '';
  return `<div class="att-strip">${atts.map(a=>{
    const t=a.type||'';const href=a.dataUrl||'';
    const hasBlob=!!(_blobs.get(a.id)||href);

    if(href&&t.startsWith('audio/'))return `<span class="att-file">🎵 ${esc(a.name)} <audio controls src="${href}"></audio></span>`;
    if(href&&t.startsWith('video/'))return `<span class="att-file"><video controls src="${href}" style="max-width:180px;border-radius:6px"></video></span>`;
    const tag=a.truncated?' · excerpt sent':'';
    return hasBlob
      ? `<button class="att-file att-dl" data-id="${esc(a.id||'')}" data-name="${esc(a.name)}">📎 ${esc(a.name)} · ${fmtSize(a.size||0)} · download${tag}</button>`

  }).join('')}</div>`;

function renderMsg(m,i){
  const isU=m.role==='user';
  const meta=m.meta&&(m.meta.tin||m.meta.tout)?`<div class="msg-meta">${fmtTok(m.meta.tin)} in · ${fmtTok(m.meta.tout)} out · ${fmtCost(m.meta.cost||0)}</div>`:'';
  const listen=!isU?`<button class="spk-btn" data-spk="${i}" onclick="speakMsg(${i})" title="Listen to this reply" aria-label="Listen">▶</button>`:'';
  const open=S.thinkOpen&&S.thinkOpen[i];
  const think=m.reasoning?`<div class="think done"><div class="think-head" onclick="toggleThink(${i})"><span class="think-ico">💭</span>Thought process <span class="think-caret">${open?'▾':'▸'}</span></div>${open?`<div class="think-body">${esc(m.reasoning)}</div>`:''}</div>`:'';
  const warn=m.warn?`<div class="msg-warn">${esc(m.warn)}</div>`:'';
  const files=filesInMessage(m);
  const zipbar=files.length>1?`<div class="zipbar"><span>📦 ${files.length} files in this message</span>
    <button class="zip-all" data-mi="${i}">⬇ Download all as .zip</button>
    ${ghConnected()?`<button class="zip-commit" data-mi="${i}">⑂ Commit all to GitHub…</button>`:''}</div>`:'';
  const conf=!isU?extractConfidence(m.content):null;
  const confHtml=conf?`<div class="confidence" style="border-left-color:${{HIGH:'#4ade80',MEDIUM:'#f59e0b',LOW:'#f87171'}[conf.level]||'#f59e0b'}"><strong>Confidence: ${conf.level}</strong>${conf.note?`<div class="conf-note">${esc(conf.note.slice(0,120))}</div>`:''}</div>`:'';
  return `<div class="msg ${isU?'user':''}">
    <div class="avatar ${isU?'user':'ai'}">${isU?'U':'AI'}</div>
    <div class="bubble ${isU?'user':'ai'}">
      ${m.voice?'<div class="voice-tag">🎙️ voice</div>':''}
      ${think}${attachHtml(m.attachments)}${zipbar}${renderParts(parseMsgContent(m.content),i)}${confHtml}${warn}${meta}${listen}
    </div></div>`;
}

/* Local, zero-token progress narration under the dots. Phases are inferred from
   the user's request — no API call is made to produce these. */
function inferPhases(text,atts){
  const t=(text||'').toLowerCase();const ph=[];
  if(atts&&atts.length)ph.push('Reading your files');
  ph.push('Thinking');
  if(/\b(image|picture|logo|illustration|draw|icon|diagram|art|render)\b/.test(t))ph.push('Generating an image');
  if(/\b(fix|bug|error|debug|crash|broken|fail)\b/.test(t))ph.push('Analyzing the problem','Tracing the issue');
  if(/\b(build|create|make|write|code|function|script|app|component|website|page|api|class)\b/.test(t))ph.push('Writing code');
  if(/\b(review|refactor|optimi[sz]e|improve|clean)\b/.test(t))ph.push('Reviewing the code');
  if(/\b(explain|how|why|what|difference|compare)\b/.test(t))ph.push('Working it out');
  ph.push('Composing the reply','Finishing up');
  return [...new Set(ph)];
}
function startStatus(phases){
  stopStatus();
  S._phases=phases&&phases.length?phases:['Thinking','Composing the reply'];
  S._pi=0;updateStatusText();
  S.statusTimer=setInterval(()=>{
    if(S._pi<S._phases.length-1){S._pi++;updateStatusText();}
  },1700);
}
function stopStatus(){if(S.statusTimer){clearInterval(S.statusTimer);S.statusTimer=null;}S._phases=null;S._pi=0;}
function updateStatusText(){const el=document.getElementById('ai-status');if(el&&S._phases)el.textContent=S._phases[S._pi]+'…';}

async function saveKeys(){

  });
  const btn=document.getElementById('save-keys-btn');
  if(btn){btn.disabled=true;btn.textContent='Verifying…';}
  S.keysErr='';
  for(const id of Object.keys(vals)){
    const v=vals[id];
    const old=KeyVault.dec(a.apiKeys[id]||'');
    if(v&&v!==old){
      // Only new/changed keys get a live verification call.
      try{await verifyKeyLive(id,PROVIDERS[id].models[0].id,v);}
      catch(e){
        S.keysErr=`${PROVIDERS[id].name}: ${e.message||'key failed verification'}`;
        return render();

    a.apiKeys[id]=KeyVault.enc(v);
  }
  saveAccts();refreshCredits();ensureModels(true);closeModal();
}

  if(!confirm('Delete this chat?'))return;
  const a=acct();
  a.sessions=a.sessions.filter(s=>s.id!==id);
  if(a.currentId===id)a.currentId=a.sessions[0]?.id||null;
  saveAccts();render();
}
